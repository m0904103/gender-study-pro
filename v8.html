    <style>
        :root { 
            --primary: #fbbf24; --danger: #ef4444; --bg: #020617; --text: #f8fafc; 
            --safe-top: env(safe-area-inset-top, 50px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .header { 
            position: fixed; top: 0; left: 0; right: 0; padding-top: var(--safe-top); height: calc(88px + var(--safe-top));
            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; 
            padding-left: calc(15px + env(safe-area-inset-left)); padding-right: calc(15px + env(safe-area-inset-right)); z-index: 2000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
        }
        .wrapper { display: flex; height: 100%; padding-top: calc(88px + var(--safe-top)); box-sizing: border-box; }
        .sidebar { 
            position: fixed; left: -110%; top: 0; bottom: 0; width: 320px; background: rgba(11, 15, 26, 0.99); border-right: 1px solid rgba(251, 191, 36, 0.3); 
            z-index: 3000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding-top: calc(100px + var(--safe-top)); backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
        }
        .sidebar.open { left: 0; box-shadow: 40px 0 100px rgba(0,0,0,1); }
        .course-nav { height: 100%; overflow-y: auto; padding: 25px; }
        .nav-cat { font-size: 0.75rem; color: var(--primary); margin: 30px 0 15px 5px; font-weight: 950; border-left: 5px solid var(--primary); padding-left: 12px; }
        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; background: rgba(255,255,255,0.06); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 1000; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(230px + var(--safe-bottom)); }
        .screen { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #slide-view { width: 100%; height: 100%; background-size: contain; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .label-unit { position: absolute; background: linear-gradient(135deg, #ef4444, #991b1b); color: #fff; padding: 18px 40px; border-radius: 20px; font-weight: 1000; font-size: 2.2rem; border: 4.5px solid #fff; box-shadow: 0 30px 80px rgba(0,0,0,1); z-index: 1001; text-align: center; }
        .console { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 23, 42, 0.98); padding: 28px; 
            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.35rem; line-height: 1.65; height: 110px; overflow-y: auto; color: #fff; font-weight: 500; margin: 15px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 400px) { .header-info { font-size: 0.85rem !important; } .label-unit { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <div id="splash" onclick="goStudy()">
        <div style="width: 85%">
            <p style="color:var(--primary); font-weight:1000; letter-spacing:8px; margin-bottom:15px; font-size:0.9rem;">114-2 MIDTERM PREP</p>
            <h1 style="font-size:2.8rem; line-height:1.2; margin:15px 0; background:linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:1000;">性別、健康與多元文化<br><span style="font-size:2.2rem; color:var(--primary); text-shadow:0 0 20px rgba(251,191,36,0.3);">期中考考前特訓</span></h1>
            <div style="background:var(--danger); color:white; padding:10px 35px; border-radius:12px; font-size:1.3rem; font-weight:900; display:inline-block; margin-top:10px;">36 頁視覺增強版 | V9.6</div>
            <br><button class="btn-gold" style="margin-top:50px;">🏆 開始</button>
        </div>
    </div>
    <header class="header">
        <button onclick="toggleSidebar()" style="background:var(--primary); border:none; padding:12px 25px; border-radius:15px; font-weight:1000; font-size:0.9rem;">☰ 目錄</button>
        <div class="header-info" style="color:var(--primary); font-weight:1000; font-size:1rem; text-align:center; flex:1; padding:0 10px;">期中考考前特訓</div>
        <div style="background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:50px; border:2px solid var(--primary); display:flex; align-items:center; gap:8px;"><input type="range" id="rate" min="0.5" max="2.0" value="1.3" step="0.1" style="width:50px; accent-color:var(--primary)"></div>
    </header>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"><div class="course-nav" id="nav"></div></aside>
        <main class="viewport">
            <div class="screen"><div id="slide-view"></div><div id="overlay-layer" style="position:absolute; inset:0; pointer-events:none; display:flex; justify-content:center; align-items:center;"></div></div>
            <div class="console">
                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1rem;">考場識別指南</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 36</span></div>
                <div id="lecture-content" class="text-body">。</div>
                <div class="nav-btns">
                    <button class="control-btn" onclick="prev()">⬅ 上一頁</button>
                    <button class="control-btn" onclick="next(cuI+1)">下一頁 ➡</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "第一部分", title: "🚩 全景識別指南與否定陷阱", img: "gender_health_balance_1775873567230.png", labels: ["排除中立論"], text: "同學請注意，如果您在考場中看到選項宣稱科學中立、性別為生理決定、或健康完全是個人責任，請判定為錯誤。記住，『社會建構』與『社會梯度分析』才是學術正確的答案。" },
            { cat: "第一部分", title: "🏺 性性格與文化：米德研究", img: "ch1_mead_3_tribes_1775909916148.png", labels: ["阿:皆溫", "蒙:皆鬥", "徳:反轉"], text: "第一章重點米德研究：性格是文化編排的結果。阿拉佩什族兩性皆溫順，蒙杜古馬族兩性皆剽悍。特別注意德昌布利族角色反轉，證明性格是『文化編排』而非生理決定。" },
            { cat: "第一部分", title: "🧬 貝姆性別基模與眼鏡理論", img: "sandra_bem_schema_v9_6_user_img.png", labels: ["性別眼鏡"], text: "同學請記住這個重點：珊卓·貝姆提出『性別基模理論』。她主張孩子會戴上『性別眼鏡』來過濾訊息。我們是透過社會化的鏡片，才決定如何看待性別行為。" },
            { cat: "第二部分", title: "💡 生物性別與社會性別辨析", img: "gender_health_balance_1775873567230.png", labels: ["Gender = 社會建構"], text: "Sex 是生理硬體，Gender 是社會規範軟體。如果考卷暗示氣質是基因使然，請果斷排除。同學要認清，性別角色是被社會編寫出來的。" },
            { cat: "第二部分", title: "🧬 發展理論絕對時序", img: "ch1_master_theory_tw_1775901143741.png", special: "theory", text: "同學請背好這個時序：一、心理動力 ➔ 二、社會學習 ➔ 三、認知發展 ➔ 四、女性主義。女性主義旨在打破父權結構與二元框架。口訣：心、社、認、女。" },
            { cat: "第二部分", title: "🧒 柯爾伯格：性別恆定期", img: "ch1_master_theory_tw_1775901143741.png", special: "kohlberg", text: "孩童在 4 到 5 歲達成性別恆定。同學要了解，此階段孩子明白性別不隨外表改變：男孩即使穿上裙子，也不會變成女孩。認準 4 到 5 歲畢業期。" },
            { cat: "第三部分", title: "🍱 全球在地化：品牌在地實例", img: "ch2_rice_burger_glocal_1775909945923.png", labels: ["麥當勞米漢堡"], text: "全球在地化代表品牌融入當地細節。例如麥當勞為迎合台灣環境推出米漢堡。同學如果看到品牌與當地口味融合，請選此項。" },
            { cat: "第三部分", title: "🏺 沙拉盤模式：尊重差異", img: "salad_bowl_multiculturalism_1775873580685.png", labels: ["沙拉盤 Salad Bowl"], text: "台灣已轉向尊重差異的『沙拉盤』模式。同學記住，沙拉盤代表每種文化保持原本顏色並存，而不是強迫融合攪碎在一起。" },
            { cat: "第三部分", title: "🧥 新住民正名：去商品化", img: "ch2_political_concept_tw_1775901180201.png", labels: ["去商品化"], text: "將『外籍新娘』正名為『新住民』的意義在於去商品化。這反映了社會從貶抑色彩轉向對族群尊嚴與人權的承認，同學請特別注意這個轉變。" },
            { cat: "第四部分", title: "⚖️ CEDAW 公約：婦女權利專屬", img: "cedaw_justice_symbol_1775875313437.png", labels: ["專屬婦女"], text: "CEDAW 是消除對婦女一切形式歧視公約，追求實質平等。請注意其對象『專指婦女』，而非泛指所有弱勢。這考點非常細。" },
            { cat: "第四部分", title: "📜 CEDAW 第 4 條：暫行特別措施", img: "cedaw_article4_measures_1775988220230_1775973024454.png", labels: ["暫行特別措施"], text: "根據 CEDAW 第 4 條，為了加速達成實質平等，國家暫時給予婦女優惠措施如保障名額，這稱為『暫行特別措施』，同學要明白這不應被視為歧視。" },
            { cat: "第四部分", title: "💡 發展範式：GAD 模型與改革", img: "ch3_cedaw_articles_scroll_1775910131854.png", labels: ["制度改革"], text: "在發展範式中，GAD 模型強調翻轉不平等權力結構與制度改革。同學要區分這與僅強調增加女性負擔的 WID 模式不同。" },
            { cat: "第四部分", title: "📜 CEDAW 第 24 號一般性建議", img: "ch3_cedaw_articles_scroll_1775910131854.png", labels: ["GR 24 = 健康"], text: "CEDAW 第 24 號建議專門針對『健康權』。它要求國家確保女性在生命週期中獲取保健，同學請注意生殖健康的高度保障。" },
            { cat: "第四部分", title: "🛠️ 性別主流化六大工具", img: "ch3_gender_quota_table_1775910362721.png", labels: ["統析預評培機"], text: "主流化核心工具：統計、分析、預算、GIA、培力、機制。助教叮嚀同學：剛才提到的『暫行特別措施』並不屬於這六大工具。" },
            { cat: "第四部分", title: "📊 性別統計與分析的辨析", img: "ch3_gender_quota_table_1775910362721.png", labels: ["統計數字, 分析成因"], text: "『性別統計』呈現數字差異；『性別分析』則探究權力成因。同學要理解，這是一個從看見差異到解釋差異的接力過程。" },
            { cat: "第四部分", title: "🪑 決策門檻：1/3 性別比例下限", img: "ch3_gender_quota_table_1775901180201.png", labels: ["1/3 比例下限"], text: "政府委員會規定：單一性別比例不得低於三分之一。這是為了確保性別平衡的矯正式措施。" },
            { cat: "第五部分", title: "🔃 GIA 評估時機：事前預防", img: "gia_process_flow_1775875345608.png", labels: ["制定前進行"], text: "GIA 評估必須在政策制定『前』進行，同學請避開陷阱：若題目說政策實施後才補做評估，即為錯誤。" },
            { cat: "第五部分", title: "⚙️ GIA 六步驟與諮詢細節", img: "gia_process_flow_1775875345608.png", special: "gia", text: "口訣：需目溝行執檢。必須強調第三步『溝通』，對象『必須包含』性別專家與婦女團體，兩者缺一不可。" },
            { cat: "第五部分", title: "⚖️ 不平等與不公平的精確辨析", img: "intersectionality_health_map_1775875386888.png", labels: ["Equity 公平"], text: "生理導致壽命不同叫『不平等』；但因為可避免、不正義的差異叫『不公平 Inequity』。同學記住，Equity 公平才是我們的終極目標。" },
            { cat: "第五部分", title: "🏥 AAAQ 標準與經濟可及性", img: "ch4_aaa_standard_icons_1775909974764.png", special: "aaaq", text: "在 AAAQ 標準中，只要提到付錢能力或貧窮，皆歸類為『可及性』。同學請將此視為評估經濟面健康保障的核心指標。" },
            { cat: "第五部分", title: "⚠️ 間接歧視與隱藏偏差", img: "ch4_aaa_standard_icons_1775909974764.png", labels: ["表面中立, 結果不公"], text: "間接歧視特徵：表面對男女一致，但實質結果排擠單一性別。同學要學會識別看似公平後的制度性偏頗。" },
            { cat: "第六部分", title: "🔞 法律紅線數據：層面區分", img: "ch3_age_16_consent_1775910116195.png", labels: ["16 歲性意願線"], text: "法律關鍵：性同意 16 歲，成年 18 歲。同學請區分清楚，未滿 16 歲即使為自願，對方仍具刑事法律責任。" },
            { cat: "第六部分", title: "🛒 健康的社會梯度分析", img: "intersectionality_health_map_1775875386888.png", labels: ["地位越高越健康"], text: "社會梯度代表地位越高越健康。這說明健康不平等與階級高度相關，同學請理解這並非單純個人努力的結果。" },
            { cat: "第六部分", title: "❤️ 女性心臟病：雌激素與保護", img: "female_heart_symptoms_1775875369499.png", special: "diabetes", text: "女性心臟病平均晚發病是因為有『雌激素』保護。但同學請注意：若患有糖尿病，保護力會消失，風險飆升 3 到 7 倍。此外女性死亡率更高。" },
            { cat: "第六部分", title: "💀 骨折病死：男性數據反轉", img: "male_fragility_fracture_trap_1775875425752.png", labels: ["男死亡率 22%"], text: "大家直覺覺得女生危險，但同學請看數據：髖部骨折死亡率男性是 22%，明顯高於女性。骨鬆指標是 T-score 負二點五。" },
            { cat: "第六部分", title: "🚬 肺癌型態辨析：致病機制", img: "ch5_lung_cancer_types_1775910383105.png", labels: ["女腺男小"], text: "病理辨析：女性肺癌多為肺腺癌；男性多為菸害相關小細胞癌。同學認準『女腺男小』，兩者致病機制完全不同。" },
            { cat: "第六部分", title: "🧪 性別化創新與科學偏差", img: "gender_medicine_innovation_1775873597537.png", labels: ["修正性別盲點"], text: "科學非絕對客觀。忽略女性生理週期的研究即為『性別盲』。同學要明白，目前強調透過性別化創新來修正這些偏差。" },
            { cat: "第六部分", title: "📏 代謝症候群：腰圍魔術數字", img: "metabolic_waist_90_80_1775988167231_1775972988944.png", labels: ["男 90 女 80"], text: "同學請背好數據：代謝症候群腰圍判定為，男性大於等於 90 公分，女性大於等於 80 公分。看到 85 或 75 之類的數字要能一眼識破。" },
            { cat: "第六部分", title: "泌尿系統與泌尿道感染 UTI", img: "uti_medical_anatomy_1775988167232_1775973002392.png", labels: ["女性易染"], text: "解剖學差異：由於女性尿道較短且與肛門近，其 UTI 感染率遠高於男性。同學請了解，這是純生理構造導致的健康差異。" },
            { cat: "第六部分", title: "孕婦安全帶：設計偏誤實例", img: "pregnant_seatbelt_design_bias_1775988220231_1775973042179.png", labels: ["男性假人標準"], text: "科技偏差實例：安全帶設計多以男性假人為標準，導致孕婦缺乏保護。同學記住，這是典型的科學數據偏差例證。" },
            { cat: "第六部分", title: "🌈 酷兒理論 (Queer Theory)", img: "queer_theory_binary_break_1775988220232_1775973054955.png", labels: ["挑戰二元框架"], text: "酷兒理論旨在挑戰傳統二分框架。同學請認清，它主張性別是流動多元的，試圖打破分類，追求各自顏色並存。" },
            { cat: "大數據", title: "🍼 育嬰假與無償家務佔比", img: "ch1_male_pressure_atlas_1775910150346.png", labels: ["男性 25-30%"], text: "數據同步：目前男性申請育嬰假已達 30%。但在無償家務上，同學要看清現實：全球女性平均承擔男性的 2.5 到 3 倍之多。" },
            { cat: "第六部分", title: "🎯 影子報告：民間監督機制", img: "ch3_ngo_shadow_report_1775910181779.png", labels: ["民間 NGO 撰寫"], text: "同學請記住：影子報告必須由民間 NGO 撰寫。目的是提供監督視角，對比政府報告是否隱瞞了不平等現況。" },
            { cat: "第六部分", title: "🎯 WHO 三位一體：社會完好", img: "who_health_trinity_definition_1775988220233_1775973073187.png", labels: ["生理心理社會完好"], text: "WHO 定義健康：生理、心理與社會完好 Social Well-being。同學請認準『社會福祉』或『社會完好』才是正確標準選項。" },
            { cat: "第六部分", title: "🎯 心搏預測指標：HDL 選項", img: "hdl_cholesterol_lab_result_1775988260230_1775973096575.png", labels: ["選 HDL"], text: "醫學指標辨析：預測女性心搏健康風險時，主要參考 HDL 好膽固醇。同學若看到 LDL 誘餌或中性脂肪提示，請果斷排除。" },
            { cat: "大終局", title: "🏆 特訓完成：成績滿分凱旋", img: "final_blessing_gold_1775901221619.png", labels: ["目標 100 分"], text: "36 頁特訓全量完成。從雌激素到不公平的定義，考點皆已掌握。助教祝福各位同學期中凱旋，滿分回家！" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].special, studyPlan[i].labels);
            document.getElementById('lecture-content').innerText=studyPlan[i].text;
            const u=new SpeechSynthesisUtterance(studyPlan[i].text); u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(sp, ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(sp==='theory') its+='<div class="label-unit" style="transform:translateY(-80px)">心➔社➔認➔女</div>'; if(sp==='kohlberg') its+='<div class="label-unit">4-5 歲恆定期</div>'; if(sp==='gia') its+='<div class="label-unit">需目溝行執檢</div>'; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
