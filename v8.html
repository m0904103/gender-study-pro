        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; background: rgba(255,255,255,0.06); }

        #slide-view { width: 100%; height: 100%; background-size: contain; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }

            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.35rem; line-height: 1.65; height: 110px; overflow-y: auto; color: #fff; font-weight: 500; margin: 15px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }

        <div class="header-info" style="color:var(--primary); font-weight:1000; font-size:1rem; text-align:center; flex:1; padding:0 10px;">性別、健康與多元文化</div>

                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1.1rem;">考場識別指南</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 36</span></div>

    <script>
        const studyPlan = [
            { cat: "第一部分", title: "🚩 全景識別指南與否定陷阱", img: "gender_health_balance_1775873567230.png", labels: ["排除中立論"], text: "聽者請注意，如果您在考場中看到選項寫『健康純粹是個人努力』或是『醫療是絕對中性的』，請先保持冷靜判定為錯誤。記住，『社會建構』與『社會梯度分析』才是學術正確的答案。" },
            { cat: "第一部分", title: "🏺 性性格與文化：米德研究", img: "ch1_mead_3_tribes_1775909916148.png", labels: ["阿:皆溫", "蒙:皆鬥", "徳:反轉"], text: "第一章重點米德研究：性格是文化編排的結果。阿拉佩什族：兩性皆溫順。蒙杜古馬族：兩性皆剽悍好鬥。特別注意德昌布利族：性別角色反轉，由女性掌握權力。這證明了性別氣質並非生理決定。" },
            { cat: "第一部分", title: "🧬 貝姆性別基模與眼鏡理論", img: "ch1_master_theory_tw_1775901143741.png", labels: ["性別眼鏡"], text: "補充重點：珊卓·貝姆提出『性別基模理論』。她主張孩子會戴上『性別眼鏡』來過濾訊息。這說明我們是透過社會化的鏡片，才決定如何看待性別行為。" },
            { cat: "第二部分", title: "💡 生物性別與社會性別辨析", img: "gender_health_balance_1775873567230.png", labels: ["Gender = 社會建構"], text: "Sex 是天生的生理硬體構造，Gender 是社會後天建構的規範軟體。如果考卷暗示氣質是基因或生理使然，請果斷排除。性別角色是被社會規範編寫出來的。" },
            { cat: "第二部分", title: "🧬 發展理論絕對時序", img: "ch1_master_theory_tw_1775901143741.png", special: "theory", text: "主要的性別發展理論排序為：一、心理動力 ➔ 二、社會學習 ➔ 三、認知發展 ➔ 四、女性主義。目前的學術共識是，女性主義旨在打破父權結構與二元框架。口訣：心、社、認、女。" },
            { cat: "第二部分", title: "🧒 柯爾伯格：性別恆定期", img: "ch1_master_theory_tw_1775901143741.png", special: "kohlberg", text: "孩童在 4 到 5 歲達成性別恆定。在此階段，孩子明白性別不隨外表改變：男孩即使穿上裙子，也不會因此變成女孩。認準 4 到 5 歲這個關鍵期。" },
            { cat: "第三部分", title: "🍱 全球在地化：品牌在地實例", img: "ch2_rice_burger_glocal_1775909945923.png", labels: ["麥當勞米漢堡"], text: "全球在地化 (Glocalization) 代表全球品牌融入當地細節。例如麥當勞為迎合台灣環境推出米漢堡或沙茶雞排堡。如果題目出現知名品牌與當地口味的融合，請選此項。" },
            { cat: "第三部分", title: "🏺 沙拉盤模式：尊重差異", img: "salad_bowl_multiculturalism_1775873580685.png", labels: ["沙拉盤 Salad Bowl"], text: "台灣已從強迫同化的『大熔爐』，轉向尊重差異並存的『沙拉盤』模式。記住，沙拉盤代表每種文化都能保持其原來的顏色，在社會中和諧共處，而不是攪碎在一起。" },
            { cat: "第三部分", title: "🧥 新住民正名：去商品化", img: "ch2_political_concept_tw_1775901180201.png", labels: ["去商品化"], text: "將『外籍新娘』正名為『新住民』的關鍵意義在於去商品化與去歧視。這反映了社會對族群尊嚴的承認與制度性的尊重。" },
            { cat: "第四部分", title: "⚖️ CEDAW 公約：婦女權利專屬", img: "cedaw_justice_symbol_1775875313437.png", labels: ["專屬婦女"], text: "CEDAW 是《消除對婦女一切形式歧視公約》，其核心目標是達成婦女的實質平等。請注意，其對象條文專指『婦女』，而非泛指所有弱勢群體。這在選擇題中非常考細節。" },
            { cat: "第四部分", title: "📜 CEDAW 第 4 條：暫行特別措施", img: "ch3_cedaw_articles_scroll_1775910131854.png", labels: ["第 4 條保障名額"], text: "重要補充：根據 CEDAW 第 4 條第 1 項，為了加速達成實質平等，國家暫時給予婦女優惠措施，例如保障名額，這不應被視為對男性的歧視。" },
            { cat: "第四部分", title: "💡 發展範式：GAD 模型與改革", img: "ch3_cedaw_articles_scroll_1775910131854.png", labels: ["制度改革"], text: "在發展範式中，GAD 現為公認模型。它強調翻轉不平等的權力結構與進行制度改革。大家要區分這與僅強調增加女性負擔的 WID 模式不同。" },
            { cat: "第四部分", title: "📜 CEDAW 第 24 號一般性建議", img: "ch3_cedaw_articles_scroll_1775910131854.png", labels: ["GR 24 = 健康"], text: "CEDAW 第 24 號一般性建議專門針對『健康權』。它要求國家確保女性在整個生命週期中都能獲得保健服務，特別是生殖健康的高度保障。" },
            { cat: "第四部分", title: "🛠️ 性別主流化六大工具", img: "ch3_gender_quota_table_1775910362721.png", labels: ["統析預評培機"], text: "主流化核心工具為：性別統計、分析、預算、影響評估(GIA)、意識培力、平等機制。注意：剛才提到的『保障名額』屬於暫行措施，不屬於這六大工具。" },
            { cat: "第四部分", title: "📊 性別統計與分析的接力", img: "ch3_gender_quota_table_1775910362721.png", labels: ["統計數字, 分析成因"], text: "『性別統計』負責呈現各類資料的數字差異；『性別分析』則負責探究數據背後的權力成因。這是一個從看見差異到解釋差異的完整流程。" },
            { cat: "第四部分", title: "🪑 決策門檻：1/3 性別比例下限", img: "ch3_gender_quota_table_1775901180201.png", labels: ["1/3 比例下限"], text: "政府委員會規定：任一性別比例不得低於三分之一。這是為了確保性別平衡的矯正式、暫時性的實質平等措施。" },
            { cat: "第五部分", title: "🔃 GIA 評估時機：事前預防", img: "gia_process_flow_1775875345608.png", labels: ["制定前進行"], text: "性別影響評估 (GIA) 必須在政策制定『前』進行。其核心功能是預防性地消除隱藏的性別盲點。若題目說政策實施後才補做評估，即為錯誤。" },
            { cat: "第五部分", title: "⚙️ GIA 六步驟與諮詢細節", img: "gia_process_flow_1775875345608.png", special: "gia", text: "口訣：需、目、溝、行、執、檢。請大家強調第三步『決策溝通』，這一步規定必須諮詢性別平等專家與婦女團體，這是近年最愛考的細節。" },
            { cat: "第五部分", title: "⚖️ 不平等與不公平的精確辨析", img: "intersectionality_health_map_1775875386888.png", labels: ["Equity 公平"], text: "辨析強化：生理差異導致的壽命不同叫『不平等 (Inequality)』；但因為貧窮看不起病才叫『不公平 (Inequity)』。我們追求的是 Equity 公平，意即解決社會性的資源落差。" },
            { cat: "第五部分", title: "🏥 AAAQ 標準與經濟可及性", img: "ch4_aaa_standard_icons_1775909974764.png", special: "aaaq", text: "在 AAAQ 標準中，只要提到支付錢款、經濟負擔或貧窮，皆屬於 Accessibility (可及性)。這是評估經濟面健康保障的核心指標。" },
            { cat: "第五部分", title: "⚠️ 間接歧視與隱藏偏差", img: "ch4_aaa_standard_icons_1775909974764.png", labels: ["表面中立, 結果不公"], text: "間接歧視特徵：規定在表面上對男女一致（如身高限制），但實質運行的結果卻排擠了單一性別。大家要識別看似公平後的制度性偏頗。" },
            { cat: "第六部分", title: "🔞 法律紅線數據：精準區分", img: "ch3_age_16_consent_1775910116195.png", labels: ["16 歲性意願線"], text: "法律關鍵數據：性同意年齡為 16 歲，成年年齡為 18 歲。兩者意義完全不同。未滿 16 歲即使為自願，對方仍具備刑事法律責任。" },
            { cat: "第六部分", title: "🛒 健康的社會梯度階層", img: "intersectionality_health_map_1775875386888.png", labels: ["地位越高越健康"], text: "社會梯度 (Social Gradient) 代表社會地位越高的人群通常越健康。這說明健康不平等與階級高度交織，而非單純的個人運氣。" },
            { cat: "第六部分", title: "❤️ 女性心臟病與反直覺陷阱", img: "female_heart_symptoms_1775875369499.png", special: "diabetes", text: "女性心臟病平均比男性晚 10 年發病。大家直覺會覺得病發後的風險差不多，但統計顯示女性發作後的死亡率與預後往往比男性更差。糖尿病會抵銷自然保護力。" },
            { cat: "第六部分", title: "💀 骨折病死數據：男性反轉點", img: "male_fragility_fracture_trap_1775875425752.png", labels: ["男死亡率 22%"], text: "大家直覺會覺得女生骨頭比較細更危險，但在髖部骨折一年內死亡率上，男性是 22%，明顯高於女性的 15%。此外，骨鬆確診數據為 T-score 小於負二點五。" },
            { cat: "第六部分", title: "🚬 肺肺癌病理與組織型態", img: "ch5_lung_cancer_types_1775910383105.png", labels: ["女腺男小"], text: "病理辨析：女性肺癌患者 90% 不抽菸，多為肺腺癌；男性患者則多為與菸害高度相關的小細胞癌。兩者在致病機制與組織型態上完全不同。" },
            { cat: "第六部分", title: "🧪 性別化創新與科學修正", img: "gender_medicine_innovation_1775873597537.png", labels: ["修正性別盲點"], text: "科學並非絕對客觀。過去忽略女性生理週期的研究即為性別盲。目前強調透過性別化創新來修正偏差。醫療科技與科學並非絕對刻觀中立。" },
            { cat: "第六部分", title: "📏 代謝症候群：腰圍魔術數字", img: "ch4_aaa_standard_icons_1775909974764.png", labels: ["男 90 女 80"], text: "補充數據：代謝症候群的腰圍判定標準為，男性大於等於 90 公分，女性大於等於 80 公分。大家如果看到考卷出 85 或 75 之類的數字，請一眼識破。" },
            { cat: "第六部分", title: "泌尿系統與泌尿道感染 (UTI)", img: "gender_health_balance_1775873567230.png", labels: ["女性易染"}, text: "解剖學差異：由於女性尿道較短且與肛門距離較近，其泌尿道感染 (UTI) 的機率遠高於男性。這是純粹生理構造導致的健康差異。" },
            { cat: "第六部分", title: "孕婦安全帶：設計偏誤實例", img: "female_heart_symptoms_1775875369499.png", labels: ["男性假人標準"], text: "科技偏差實例：汽車安全帶與座墊設計多以『男性假人』為標準測試，導致孕婦在車禍中缺乏專屬的安全保護。這是典型的科學數據偏差例證。" },
            { cat: "第六部分", title: "🌈 酷兒理論 (Queer Theory)", img: "salad_bowl_multiculturalism_1775873580685.png", labels: ["挑戰二元框架"], text: "酷兒理論 (Queer) 旨在挑戰傳統的二元區分（男/女）與標準化。它主張性別與慾望是流動且多元的，試圖打破僵化的分類與權力壓迫。" },
            { cat: "大數據", title: "🍼 育嬰假與無酬家務時間", img: "ch1_male_pressure_atlas_1775910150346.png", labels: ["男性 25-30%"], text: "數據同步：男性申請留職停薪的百分比已達 25% 到 30%。但在無酬家務時間上，全球女性平均仍承擔男性的 2.5 到 3 倍之多。" },
            { cat: "第六部分", title: "🎯 影子報告：民主監督機制", img: "ch3_ngo_shadow_report_1775910181779.png", labels: ["由民間 NGO 撰寫"], text: "影子報告由民間 NGO 針對公約落實撰寫。它提供了一種有別於官方文件的民主監督視角，用來對比政府是否隱瞞了真實的不平等現況。" },
            { cat: "第六部分", title: "🎯 WHO 三位一體健康定義", img: "gender_health_balance_1775873567230.png", labels: ["生理心理社會適應"], text: "WHO 完美健康定義：必須同時具備生理良好的完整狀態、心理良好、以及社會適應良好。若選項寫單純身體沒有疾病，皆應判定為錯誤。" },
            { cat: "第六部分", title: "🎯 心搏預測指標：HDL 選項", img: "female_heart_symptoms_1775875369499.png", labels: ["選 HDL"], text: "醫學指標辨析：預測女性心搏健康風險時，主要參考 HDL (高密度脂蛋白/好膽固醇)。若題目中出現 LDL 誘餌，請果斷排除。認準 HDL。" },
            { cat: "大終局", title: "🏆 特訓完成：成績滿分凱旋", img: "final_blessing_gold_1775901221619.png", labels: ["目標 100 分"], text: "36 頁特訓內容已全量就位。從貝姆的眼鏡理論到 90 與 80 的代謝數字，所有核心考點皆已掌握。祝您在 4 月 25 日的考試中取得滿分佳績。祝福各位。" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].special, studyPlan[i].labels);
            document.getElementById('lecture-content').innerText=studyPlan[i].text;
            const u=new SpeechSynthesisUtterance(studyPlan[i].text); u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(sp, ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(sp==='theory') its+='<div class="label-unit" style="transform:translateY(-80px)">心➔社➔認➔女</div>'; if(sp==='kohlberg') its+='<div class="label-unit">4-5 歲恆定期</div>'; if(sp==='gia') its+='<div class="label-unit">需目溝行執檢</div>'; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
