    <script>
        const studyPlan = [
            { cat: "【標準釋義：名詞篇】", title: "1. 周哈里窗 (Johari Window)", img: "johari_window_modern_diagram_1776040990674.png", ls: ["己知他知 / 己不知他知 / ..."], txt: "標準定義：由兩位心理學家提出，整合個體自覺與他人知覺的對稱模型。包含：開放區(1)、盲目區(2)、隱藏區(3)、未知區(4)。學術邏輯：透過「自我袒露」縮小隱藏，透過「他人回饋」縮小盲目，旨在擴大開放區面積。" },
            { cat: "【標準釋義：名詞篇】", title: "2. 社會再適應量表 (SRRS)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["200-299 = 中度 | 300+ = 高度"], txt: "標準定義：Holmes提出之壓力計量工具。數值定錨：低於150(低風險)；150-199(輕度/30%病發)；200-299(中度/50%病發)；300分以上(高度/80%病發)。主要預測「未來兩年內」因壓力引發重大身心疾病之風險。" },
            { cat: "【標準釋義：名詞篇】", title: "3. 仰巴腳效應 (Pratfall Effect)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["地位適配：僅對能力強者有效"], txt: "標準定義：又稱出醜效應。指能力卓越、具高社會地位者若偶爾犯下平庸小錯，反而會增加人性親和力，提升吸引力。反之，若能力本就平庸，犯錯則會被視為無能表現。關鍵在於「卓越與瑕疵的強烈對比」。" },
            { cat: "【標準釋義：名詞篇】", title: "4. 月暈效應 (Halo Effect)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["以點帶面 / 以偏概全"], txt: "標準定義：一種認知偏差。知覺者傾向因對方單一顯著優點（如外貌佳），而推論其其餘人格特質（如誠實、勤奮）亦同樣優秀，產生以點帶面的正面評價。教科書筆錄：反向偏差為「角效應」。" },
            { cat: "【標準釋義：名詞篇】", title: "5. 印象整飾 (Impression Mgt)", img: "goffman_dramaturgy_theater_stage_1776041066626.png", ls: ["高夫曼戲劇理論 | 前台控制"], txt: "標準定義：戈夫曼(Goffman)視社會互動為舞台表演。個體意圖控制他人對己之自知覺。包含：形象整飾(Impression formation)與場景管理。旨在維護個人在社會場域中的尊嚴(MFace)與角色期望。" },
            { cat: "【標準釋義：名詞篇】", title: "6. 自我概念 (Self-Concept)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["特定他人反映 vs 一般他人規則"], txt: "標準定義：個人對己概括性看板。來源一：特定他人（如父母家人）的評價反映。來源二：一般他人（如社會文化、法規、道德）的角色期望內化。自我包含生理、認知、社會、道德四大維度。" },
            { cat: "【標準釋義：名詞篇】", title: "7. 歸因理論 (Attribution Theory)", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內在配置 vs 外在情境"], txt: "標準定義：推論行為原因的心理歷程。區分為內在歸因（能力、性格、努力）與外在歸因（任務難度、社會壓力、運氣）。正確歸因有助於情緒控制與未來行為預測。" },
            { cat: "【標準釋義：名詞篇】", title: "8. 艾里斯不合理信念 (Rational ABC)", img: "albert_ellis_rational_emotive_background_1775990617583.png", ls: ["我必須、一定要 ➔ 我希望、期許"], txt: "標準定義：理情行為療法。核心在於認知中存在的「絕對化要求」。修正方式：當「必須(Must)」變成「希望(Wish)」時，個體的災難化思考(Awfulizing)即會降低，進而減少身心負擔。" },
            { cat: "【標準釋義：名詞篇】", title: "9. 防衛機制 (Defense Mechanism)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["合理化 / 投射 / 退化 / 昇華"], txt: "標準定義：潛意識保護自我價值感之反應。常見機制：合理化（為失敗找正當藉口）、投射（責怪他人）、退化（幼稚化）、反向表現（內心恨表面愛）。其目的是暫時緩解焦慮，防止崩潰。" },
            { cat: "【標準釋義：名詞篇】", title: "10. 自我袒露 (Self-Disclosure)", img: "johari_window_modern_diagram_1776040990674.png", ls: ["相互性原則 | 深度與廣度"], txt: "標準定義：分享真實心路歷程與資訊。受相互性原則支配。功能：發洩情緒、獲得認可、增進關係深度。教科書分類：描述性(事實) vs 評估性(感受)。" },
            { cat: "【標準解析：問答大題】", title: "11. 馬斯洛需求層次理論", img: "maslow_pyramid_stomach_to_god_1776041006784.png", ls: ["從肚子到神仙的五階梯"], txt: "標準答題：五層：生理、安全、社會、自尊、自我實現。動態邏輯：需求具「階梯屬性」，滿足低層肚子世界（匱乏需求）後，始能產生追求高層神仙世界（成長需求）的吸力。若底層不穩，高層發動機即缺乏驅動力。" },
            { cat: "【標準解析：問答大題】", title: "12. 獲得健康的兩大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["生理修復 + 心理回彈"], txt: "標準答題：一生理修復：運動(333原則/心跳130)、睡眠 8 小時(建議右側臥有利排毒)、均衡飲食。二心理回彈：發展複元力(Resilience)、發展能力管理、壓力緩解與社會支持系統介入。" },
            { cat: "【標準解析：問答大題】", title: "13. 圓融人際六要訣 (權威版)", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["尊孝口心度腳 | 全量詳解"], txt: "標準答題：尊(頭軟/尊重)、笑(面笑/感恩)、口(口圓/讚美)、心(心正/誠懇)、度(肚大/包容)、腳(腳勤/積極好觀眾)。此為管理個人利益心、感情心與價值系統的綜合社交智慧。" },
            { cat: "【標準解析：問答大題】", title: "14. 影響人際知覺的三要素與過程", img: "nonverbal_mircro_expressions_eye_1776041233563.png", ls: ["知覺者/被知覺/情境 | 詮釋歷程"], txt: "標準答題：要素：被知覺者（外觀/非語言）、知覺者（動機/情緒/偏見）、情境（場合社交規則）。教科書過程：感覺接收 ➔ 選擇 ➔ 組織(格式塔) ➔ 評價詮釋。四者形成最終的主觀知覺評估。" },
            { cat: "【標準解析：問答大題】", title: "15. 知覺組織的五大原則", img: "gestalt_connectedness_dumbbell_principle_1776043234567_1776051269067.png", ls: ["接近/相似/連續/閉合/連接"], txt: "標準答題：格式塔心理學。接近性(近則同組)、相似性(像則同組)、連續、閉合(自動完滿)。面授補強：連接性(啞鈴效應)。人類天生具備將碎片化訊息整合為意義單律之本能。" },
            { cat: "【標準解析：問答大題】", title: "16. 壓力管理的權威策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["問題導向 vs 情緒導向"], txt: "標準答題：一消除壓力源(治本)。二發現幽默轉換。三社會支持介入。四調整認知(轉變事件評價)。五練習放鬆技術。學術架構分為：問題導向策略(解決問題)與情緒導向策略(調節心情)。" },
            { cat: "【標準解析：問答大題】", title: "17. 非語言溝通特質與 93% 定律", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["梅拉賓定律數據對稱性"], txt: "標準答題：梅拉賓數據：訊息佔比為 7%文字 + 38%語音 + 55%表情。非語言共佔 93%。特質：具備多重管道性、模糊性、持續性、強烈情感表現力及顯著的文化特異性。" },
            { cat: "【標準解析：問答大題】", title: "18. TA 溝通分析三狀態型態", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["平行互補 / 交錯斷裂 / 隱藏隱喻"], txt: "標準答題：型態一：互補式(順暢)。型態二：交錯式(狀態背離引發衝突)。型態三：隱藏式(心理遊戲)。人格三狀態：父母態(威嚴)、成人態(理性邏輯)、兒童態(衝動)。一致答語應致力追求 A-A 到位。" },
            { cat: "【標準解析：問答大題】", title: "19. 華人文化的人情與面子深度", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["杜月笙之三碗麵 | 情理法融會"], txt: "標準答題：人情包含情感、資源與規範三層意涵。面子代表社會地位聲望。三碗麵：人面、場面、情面。處理層次為：情重於理，理重於法。強調人際關係之和諧更甚於契約規範。 " },
            { cat: "【標準解析：問答大題】", title: "20. 影響人際吸引的標準因素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["情境接近 / 個人魅力 / 適配互補"], txt: "標準答題：一情境要素：空間接近與高頻曝光。二個人要素：外貌魅力與能力強度(含仰巴腳效應)。三適配要素：態度價值觀相似性、情感需求的互補性。核心追求獎賞與公平之平衡。" },
            { cat: "【標準解析：問答大題】", title: "21. 凱利三維歸因模型數據", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["區別性 / 一致性 / 普遍性"], txt: "標準答題：判定原因之三指標：一、區別性(針對不同對象)。二、一致性(不同時間)。三、普遍性(他人反應)。若三高則歸因於外部情境；若一致性高而其餘低則歸因於內在人格。" },
            { cat: "【最後保命心法】", title: "22. SRRS 重要數據反射", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["150(低) / 200(中) / 300(高)"], txt: "精確數據：中度危機點為 200-299。對位未來兩年發病風險。當分數超過 300 時，疾病發生率高達 80% 。記住大數據：中度是 200 的跳板。" },
            { cat: "【最後保命心法】", title: "23. 親密空間與梅拉賓數據", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["1.5呎距離 / 93% 情感影響力"], txt: "精確數據：人際距離學之親密帶為 1.5 呎(約 45 公分)。梅拉賓 7/38/55 定律。此數據代表非語言溝通在真實情感表達中之絕對主體地位。 " },
            { cat: "【最後保命心法】", title: "24. 應考戰術：大標優先與囉唆解釋", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["意譯大於死背 | 結構穩定即高分"], txt: "標準答題守則：問答題守住教科書大標題（權重 75%）。內容用囉唆且邏輯一致的文字填滿（如生理修復需包含運動睡眠）。解釋名詞則注重定義關鍵字與學者學名。絕對不空白。" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat + " | " + studyPlan[i].title;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].ls);
            document.getElementById('lecture-content').innerText=studyPlan[i].txt;
            const u=new SpeechSynthesisUtterance(studyPlan[i].title + "。 " + studyPlan[i].txt); 
            u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
