<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>人際關係與協商 | 封神最終戰 V11.0</title>
    <style>
        :root { 
            --primary: #fbbf24; --danger: #ef4444; --bg: #020617; --text: #f8fafc; 
            --safe-top: env(safe-area-inset-top, 50px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .header { 
            position: fixed; top: 0; left: 0; right: 0; padding-top: var(--safe-top); height: calc(88px + var(--safe-top));
            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; 
            padding-left: calc(15px + env(safe-area-inset-left)); padding-right: calc(15px + env(safe-area-inset-right)); z-index: 2000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
        }
        .wrapper { display: flex; height: 100%; padding-top: calc(88px + var(--safe-top)); box-sizing: border-box; }
        .sidebar { 
            position: fixed; left: -110%; top: 0; bottom: 0; width: 320px; background: rgba(11, 15, 26, 0.99); border-right: 1px solid rgba(251, 191, 36, 0.3); 
            z-index: 3000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding-top: calc(100px + var(--safe-top)); backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
        }
        .sidebar.open { left: 0; box-shadow: 40px 0 100px rgba(0,0,0,1); }
        .course-nav { height: 100%; overflow-y: auto; padding: 25px; }
        .nav-cat { font-size: 0.75rem; color: var(--primary); margin: 30px 0 15px 5px; font-weight: 950; border-left: 5px solid var(--primary); padding-left: 12px; }
        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; background: rgba(255,255,255,0.06); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 1000; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(230px + var(--safe-bottom)); }
        .screen { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #slide-view { width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .label-unit { position: absolute; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: var(--primary); padding: 15px 35px; border-radius: 20px; font-weight: 1000; font-size: 1.65rem; border: 3px solid var(--primary); box-shadow: 0 30px 80px rgba(0,0,0,0.8); z-index: 1001; text-align: center; max-width: 85%; }
        .console { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 23, 42, 0.98); padding: 28px; 
            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.3rem; line-height: 1.6; height: 110px; overflow-y: auto; color: #fff; font-weight: 500; margin: 15px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 400px) { .header-info { font-size: 0.85rem !important; } .label-unit { font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div id="splash" onclick="goStudy()">
        <div style="width: 85%">
            <p style="color:var(--primary); font-weight:1000; letter-spacing:8px; margin-bottom:15px; font-size:0.9rem;">1142 | V11.0 SEAL OF GOD FINAL BATTLE</p>
            <h1 style="font-size:3rem; line-height:1.2; margin:15px 0; background:linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:1000;">人際關係與協商<br><span style="font-size:2.2rem; color:var(--primary); text-shadow:0 0 20px rgba(251,191,36,0.3);">封神最終戰版本</span></h1>
            <div style="background:var(--danger); color:white; padding:10px 35px; border-radius:12px; font-size:1.3rem; font-weight:900; display:inline-block; margin-top:10px;">直拳攻擊 | 大標對了就給分</div>
            <br><button class="btn-gold" style="margin-top:50px;">🏆 凱旋開始</button>
        </div>
    </div>
    <header class="header">
        <button onclick="toggleSidebar()" style="background:var(--primary); border:none; padding:12px 25px; border-radius:15px; font-weight:1000; font-size:0.9rem;">☰ 戰鬥索引(24)</button>
        <div class="header-info" style="color:var(--primary); font-weight:1000; font-size:1rem; text-align:center; flex:1; padding:0 10px;">心法：解釋名詞抓關鍵，問答大題守大標</div>
        <div style="background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:50px; border:2px solid var(--primary); display:flex; align-items:center; gap:8px;"><input type="range" id="rate" min="0.5" max="2.0" value="1.3" step="0.1" style="width:50px; accent-color:var(--primary)"></div>
    </header>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"><div class="course-nav" id="nav"></div></aside>
        <main class="viewport">
            <div class="screen"><div id="slide-view"></div><div id="overlay-layer" style="position:absolute; inset:0; pointer-events:none; display:flex; justify-content:center; align-items:center;"></div></div>
            <div class="console">
                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1rem;" id="cat-title">-</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 24</span></div>
                <div id="lecture-content" class="text-body">。</div>
                <div class="nav-btns">
                    <button class="control-btn" onclick="prev()">⬅ 上一頁</button>
                    <button class="control-btn" onclick="next(cuI+1)">下一頁 ➡</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "【解釋名詞】(25%)", title: "1. 周哈里窗 (Johari Window)", img: "johari_window_modern_diagram_1776040990674.png", ls: ["袒露縮隱藏 / 回饋縮盲目"], txt: "分析自我覺察之模型。開放區（己知、他知）、盲目區（己不知、他知）、隱藏區（己知、他不知）、未知區（己不知、他不知）。心法：袒露縮小隱藏，回饋縮小盲目。" },
            { cat: "【解釋名詞】(25%)", title: "2. 月暈效應 (Halo Effect)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["以偏概全的評價迷思"], txt: "認知偏誤。指因對方單一顯著優點（如外貌）而產生的整體正面評價，導致「以點帶面」的以偏概全。反面則為角效應。" },
            { cat: "【解釋名詞】(25%)", title: "3. 仰巴腳效應 (Pratfall Effect)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["優秀者的瑕疵美"], txt: "能力卓越者若偶爾犯下小錯誤，反而能消弭隔閡感，增加親和力與吸引力。但若能力平庸者犯錯，則會降低吸引力。" },
            { cat: "【解釋名詞】(25%)", title: "4. 社會再適應量表 (SRRS)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["數據：200-299 = 中度危機"], txt: "量化壓力的工具。關鍵數據是 200 到 299 分屬於中度生活危機。主要用於預測「未來兩年內」引發身心疾病的風險。" },
            { cat: "【解釋名詞】(25%)", title: "5. 印象整飾 (Impression Mgt)", img: "goffman_dramaturgy_theater_stage_1776041066626.png", ls: ["高夫曼 | 前台控制"], txt: "個體意圖控制他人對自己知覺的心理與溝通歷程。包含戈夫曼提到的「前台」形象整飾與「後台」真實自我表現。" },
            { cat: "【解釋名詞】(25%)", title: "6. 自我概念 (Self-Concept)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["特定他人與一般他人"], txt: "個人對自己概括性的看法。來源包括「特定他人」（家、重要他人）的反映，以及「一般他人」（社會規則）的內化。" },
            { cat: "【解釋名詞】(25%)", title: "7. 歸因 (Attribution)", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內在特質 vs. 外在情境"], txt: "推論行為原因的心理歷程。分為內在性格歸因（如能力、性格）與外在環境歸因（如任務難度、社會壓力、運氣）。" },
            { cat: "【解釋名詞】(25%)", title: "8. 不合理信念 (ABC)", img: "albert_ellis_rational_emotive_background_1775990617583.png", ls: ["絕對化語詞的修正"], txt: "艾里斯（Ellis）提出。核心在於認知中的「絕對化」（如：我必須、一定要）。修正方式是將其轉化為相對要求的「我希望」。" },
            { cat: "【解釋名詞】(25%)", title: "9. 防衛機制 (Defense Mechanism)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["合理/投射/退化機制"], txt: "面臨焦慮時採取的潛意識保護手段。常見包含：合理化（為失敗找藉口）、投射（責怪他人）、退化（表現幼稚行为）。" },
            { cat: "【解釋名詞】(25%)", title: "10. 自我袒露 (Self-Disclosure)", img: "johari_window_modern_diagram_1776040990674.png", ls: ["相互性原則支配"], txt: "分享內心真實感受與訊息的溝通過程。受「相互性原則」支配。功能包含情緒發洩、自我澄清與深化人際關係的滲透深度。" },
            { cat: "【問答大題】(75%)", title: "11. 馬斯洛需求層次 (必考題)", img: "maslow_pyramid_stomach_to_god_1776041006784.png", ls: ["肚子世界 ➔ 神仙世界"], txt: "內容：生理、安全、社會、自尊、自我實現。邏輯：需求具備基礎階梯屬性，滿足低層「肚子世界」後，始追求高層「神仙世界」。" },
            { cat: "【問答大題】(75%)", title: "12. 獲得健康的兩大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["生理修復 + 心理回彈"], txt: "生理修復：適度運動(333)、理想睡眠 8 小時(右側臥)、均衡飲食。心理回彈：發展複元力（修復力與容忍力）、發展能力、壓力管理。" },
            { cat: "【問答大題】(75%)", title: "13. 圓融人際六要訣 (送分題)", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["尊、笑、口、心、度、腳"], txt: "口訣：尊、笑、口、心、度、腳。詳解：頭軟(尊重)、面笑(笑臉)、口圓(讚美)、心正(真心)、肚大(寬容)、腳勤(主動)。" },
            { cat: "【問答大題】(75%)", title: "14. 影響人際知覺的三要素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["被知覺/知覺者/互動情境"], txt: "一、被知覺者（外觀、非語言表情）。二、知覺者（動機、情緒狀態、偏見）。三、情境（當下的場合背景）。三方形成主觀知覺。" },
            { cat: "【問答大題】(75%)", title: "15. 知覺組織的五大原則", img: "gestalt_connectedness_dumbbell_principle_1776043234567_1776051269067.png", ls: ["連接性/啞鈴效應"], txt: "內容：接近性（距離近）、相似性（特徵像）、連續性、閉合性（自動補全）、以及連接性（啞鈴圖案，獨立物件被連線鎖定為單元）。" },
            { cat: "【問答大題】(75%)", title: "16. 壓力管理的五大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["消除源與認知調整"], txt: "一、消除壓力源（治本）。二、發現幽默。三、尋求社會支持網絡。四、調整認知（改變看法與評價）。五、練習生理放鬆技巧。" },
            { cat: "【問答大題】(75%)", title: "17. 非語言溝通特質與數據", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["梅拉賓定律數據 93%"], txt: "數據：梅拉賓定律。情感訊息 = 7%文字 + 38%語音 + 55%表情組成。特性：模糊、持續、多重管道、展現深層情感、跨文化差異。" },
            { cat: "【問答大題】(75%)", title: "18. 溝通分析 (TA) 與 PAC", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["致力 A-A 成人交流"], txt: "型態：互補式（平行順暢）、交錯式（引發衝突）、隱藏式（心理遊戲）。PAC：父母(P)、成人(A/理性、處理事實)、兒童(C/衝動、依賴)。" },
            { cat: "【問答大題】(75%)", title: "19. 華人文化個人情與面子", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["杜月笙之三碗麵"], txt: "三碗麵：人面（地位身分）、場面（正式尊嚴）、情面（情感聯繫）。處理邏輯：兼顧情、理、法平衡。強調關係維護重於純粹契約。" },
            { cat: "|【問答大題】(75%)", title: "20. 影響人際吸引的因素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["接近/外表/相似互補"], txt: "一、情境因素（空間接近、熟悉感）。二、個人因素（外貌吸引力、能力仰巴腳）。三、適配因素（態度價值觀相似性、需求互補性）。" },
            { cat: "【數據與心法】", title: "21. SRRS 數據指標", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["200 - 299 中度危機"], txt: "專業反射：中度生活危機區間為 200 到 299 分。是用於預測未來兩年內引發身心健康問題風險的關鍵閾值。" },
            { cat: "【數據與心法】", title: "22. 親密距離數據", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["1.5 英尺 (45 公分)"], txt: "專業反射：人際溝通中，最親近之界線為 1.5 英尺（約 45 公分）以內。超越此界則進入人際溝通之防衛與安全緩衝帶。" },
            { cat: "【數據與心法】", title: "23. 情感佔比 93% 定律", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["表情與聲調之力量"], txt: "專業反射：在人際情感互動中，非語言訊息（表情與聲調）的綜合影響力高達 93% 。僅有 7% 來自於純粹的文字內容。" },
            { cat: "【數據與心法】", title: "24. 應考戰術：不空白底線", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["大標優先 | 結構至上"], txt: "戰術守則：解釋名詞注重定義關鍵字（抓名詞、記定義）。問答大題注重標題結構（寫大標、填內肉）。絕對不可留白，維持 100% 答題率。" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat + " | " + studyPlan[i].title;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].ls);
            document.getElementById('lecture-content').innerText=studyPlan[i].txt;
            const u=new SpeechSynthesisUtterance(studyPlan[i].title + "。 " + studyPlan[i].txt); 
            u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
