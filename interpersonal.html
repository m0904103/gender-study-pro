    <script>
        const studyPlan = [
            { cat: "基礎概念", title: "1. 人際關係定義", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["廣義與狹義定義"], txt: "人際關係即人情關係，是指人與人之間交互影響的社會歷程。狹義指同才與同事之互動；廣義則涵蓋大環境的社會化影響。" },
            { cat: "基礎概念", title: "2. 溝通定義", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["溝通的正式定義"], txt: "經由語言或非語言管道，將意見、態度、情感傳遞給對方的歷程。是人際網絡中訊息交換的核心機制。" },
            { cat: "基礎概念", title: "3. 溝通歷程模式", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["發送/管道/噪音/回饋"], txt: "溝通要素包含：傳送者、信息、管道、接收者。噪音是干擾溝通效能的關鍵變項，回饋則決定溝通是否達成閉環。" },
            { cat: "自我覺察", title: "4. 周哈里窗 (Johari Window)", img: "johari_window_modern_diagram_1776040990674.png", ls: ["周哈里窗四個區域"], txt: "分析自我覺察之模型。包含四個主要扇區：開放區、盲目區、隱藏區、以及潛力所在的未知區。" },
            { cat: "自我覺察", title: "5. 艾里斯 10 大不合理信念", img: "albert_ellis_rational_emotive_background_1775990617583.png", ls: ["艾里斯不合理信念"], txt: "理性情緒治療的核心內容。常見信念偏誤包含：要求每個人都愛我、一定要樣樣精通才有價值，以及過度誇大問題的嚴重性。" },
            { cat: "自我覺察", title: "6. 自我概念 (Self-Concept)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["自我概念學術定義"], txt: "個人對自己持有的概括性看法，即定義「我是怎樣的人」。受特定他人評價、社會規範與自我省思共同塑造。" },
            { cat: "人格/認知", title: "7. 內控性格 vs. 外控性格", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內控 vs. 外控性格"], txt: "內控者相信個人努力可掌控命運。外控者相信命運受環境、天命或不可抗力等第三者控制。外控者在壓力下情境適應力通常較弱。" },
            { cat: "人格/認知", title: "8. 負面情感 (Negative Affect)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["負面情感傾向"], txt: "指個體容易產生焦慮、緊張、憂慮或憤怒情緒狀態的人格特點。此類傾向者在壓力源面前展現出較高的身心反應度。" },
            { cat: "人格/認知", title: "9. 場地獨立與依賴型", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["場地獨立與依賴型"], txt: "知覺風格分析。場地獨立型不受周遭視覺背景與情境資訊干擾；場地依賴型易受環境場域與他人意見左右感官判斷。" },
            { cat: "人格/認知", title: "10. 沉思型與衝動型", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["沉思型與衝動型"], txt: "反應時間與準確性的取捨風格。沉思型決策節奏慢但準確度高；衝動型反應節奏快但易產生較多錯誤判斷。" },
            { cat: "人格/認知", title: "11. 環化型與簡化型認知", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["環化型與簡化型"], txt: "資訊處理層次差異。環化型傾向將訊息意義複雜化，易產生多重解讀；簡化型按表面字意與邏輯直接處理，流程較單一。" },
            { cat: "知覺過程", title: "12. 知覺產生三步驟", img: "nonverbal_mircro_expressions_eye_1776041233563.png", ls: ["知覺產生三步驟"], txt: "認知歷程：感覺(感官接觸物理刺激) ➔ 組織(邏輯分類與簡化) ➔ 評價(賦予意義並形成心理印象)。" },
            { cat: "知覺過程", title: "13. 接近原則與相似原則", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["接近原則與相似原則"], txt: "接近原則：時空距離相近的看成一組。相似原則：物理特徵、形狀相同的看成一個整體。為大腦組織知覺的基礎。" },
            { cat: "知覺過程", title: "14. 連續原則與閉合原則", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["連續原則與閉合原則"], txt: "連續原則：知覺傾向流動的線段。閉合原則：將具缺口或不完整的刺激在認知上補全，呈現完整心理圖像。" },
            { cat: "知覺過程", title: "15. 第一印象 (Initial Impression)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["第一印象"], txt: "初次接觸根據對方的衣著、談吐、非語言行為所建立的綜合評價。外觀特質對初始印象路徑具有強大主導權。" },
            { cat: "知覺過程", title: "16. 連接性原則 (連貫性)", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["連接性原則 (連貫性)"], txt: "知覺組織進階原則。若兩個不相干的物件被線條或桿子連結，在視覺與心理上會被直接視為一個運作單元。" },
            { cat: "知覺評價", title: "17. 月暈效應與刻板印象", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["月暈效應與刻板印象"], txt: "月暈效應：因單一強烈特質而過度推論整體。刻板印象：將群體標記簡化並固著在特定個體上，易導致評價偏誤。" },
            { cat: "知覺評價", title: "18. 知覺對比效應 (Contrast)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["知覺對比效應"], txt: "知覺評價會受參考背景強烈影響。顯著的高度、亮度或行為差異，在不同背景對比下會產生截然不同的知覺寬度。" },
            { cat: "知覺評價", title: "19. 核心特質研究 (熱誠/冷淡)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["核心特質實驗分析"], txt: "核心特質是決定整體印象架構的基石。研究顯示，熱誠與冷淡的訊息對人格形成的效應，遠超乎禮貌或粗魯等周邊特質。" },
            { cat: "歸因理論", title: "20. 內在歸因與外在歸因", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內在歸因與外在歸因"], txt: "行為原因的邏輯推導。內在歸因為性格、情緒或能力因素；外在歸因為環境、壓力或運氣等情境因素。" },
            { cat: "歸因理論", title: "21. 凱利三維歸因論", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["凱利三維歸因論指標"], txt: "科學歸因指標：區別性(對這事不同?)、一致性(以前都這樣?)、普遍性(別人都這樣?)。三者交織決定推論結果。" },
            { cat: "印象管理", title: "22. 印象整飾之功能", img: "goffman_dramaturgy_theater_stage_1776041066626.png", ls: ["印象整飾之五大功能"], txt: "社會互動中控制他人對我們知覺的歷程。包含：維持自尊、界定權力、發揮影響力、角色適配以及強化形象穩定。" },
            { cat: "壓力管理", title: "23. 社會再適應量表 (SRRS)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["社會再適應量表量化指標"], txt: "壓力負荷等級。數據統計指出：200-299 分區間屬中度生活危機。能有效量化生活重大變故對身心的長期負荷。" },
            { cat: "壓力管理", title: "24. 壓力管理策略分析", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["壓力管理正式策略"], txt: "緩解身心衝擊的策略：消除壓力源(最有效治本)、幽默調適、社會支持系統、認知重組、以及放鬆技巧運用。" },
            { cat: "人際吸引", title: "25. 人際吸引影響因素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["人際吸引影響因素類別"], txt: "吸引力之影響變項：一、情境因素(時空接近)。二、個人因素(外表、性格、能力)。三、適配因素(相似度、互補性)。" },
            { cat: "人際吸引", title: "26. 仰巴腳效應 (Pratfall)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["仰巴腳效應 (出醜效應)"], txt: "學術考點：能力卓越的人物偶爾顯露的小失誤或不完美，反而縮短心理距離，增加親和力與廣泛吸引力。" },
            { cat: "人際吸引", title: "27. 海德 POX 平衡理論", img: "heider_pox_balance_triad_1776041038324.png", ls: ["海德 POX 平衡理論"], txt: "認知相符理論。三方關係(個人-他人-事物)乘積為「正」代表結構平衡穩定，否則會產生心理張力促使態度改變。" },
            { cat: "愛情研究", title: "28. 愛情三因論 (Sternberg)", img: "sternberg_love_triangle_diagram_1776041022011.png", ls: ["愛情三項成份理論"], txt: "愛情構成元素：激情(生理)、親密(情感)、責任(決心)。不同年齡與文化背景下，三者的黃金比例會有顯著變動。" },
            { cat: "愛情研究", title: "29. 愛情六型態分析", img: "sternberg_love_triangle_diagram_1776041022011.png", ls: ["雷斯愛情六型態"], txt: "社會學研究分類。包含：友誼之愛、激情之愛、佔有欲之愛、無私之愛、現實之愛、以及情人之愛。" },
            { cat: "溝通技能", title: "30. 圓融人際六要訣", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["圓融人際六要訣總結"], txt: "優化互動品質之守則：尊(尊重本體)、笑(情境親和)、口(言語正向)、心(真誠導向)、度(寬厚視野)、腳(積極參與)。" },
            { cat: "溝通技能", title: "31. 非語言溝通特質 (93%)", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["非語言溝通與情感佔比"], txt: "梅拉賓定律指出，情感訊息傳遞中非語言佔比 93%。其具備模糊性、持續性、多重管道與強烈情感表達等特質。" },
            { cat: "溝通技能", title: "32. 溝通分析 PAC 心理狀態", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["溝通分析人格狀態指標"], txt: "心理交互作用分析。評估互動中的狀態：父母(權威規範)、成人(理性客觀)、兒童(衝動情感)。互補則穩定，交錯則衝突。" },
            { cat: "溝通技能", title: "33. 職場電話留言三要素", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["專業電話留言三要素"], txt: "職場溝通實務點：前 30 秒決定專業好感。有效的留言訊息必須包含：對方姓名、聯絡電話、具體辦理或留言事由。" },
            { cat: "社會文化", title: "34. 人情意涵與面子性格論", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["人情三意涵與面子性格"], txt: "中國文化互動核心。人情包含：情感交換、社會資源借貸與社會動態規範。面子則是社會地位與聲望的象徵指標。" },
            { cat: "社會文化", title: "35. 得寸進尺與漫天要價策略", img: "foot_in_the_door_vs_face_concept_1776042490769.png", ls: ["社會影響策略對照"], txt: "影響力心理技術。得寸進尺（由小入大的請求引導）；漫天要價（由大入小，利用退讓感促成目標）。依賴於公共形象機制。" },
            { cat: "最終叮嚀", title: "36. 期中考學術寫作戰術", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["學術應試戰術叮嚀"], txt: "應試核心：大標題邏輯精確度。解釋名詞注重學術定義與英文名稱；問答題注重架構條列與數據準確性。避免留白是基本原則。" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat + " | " + studyPlan[i].title;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].ls);
            document.getElementById('lecture-content').innerText=studyPlan[i].txt;
            const u=new SpeechSynthesisUtterance(studyPlan[i].title + "。" + studyPlan[i].txt); u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
