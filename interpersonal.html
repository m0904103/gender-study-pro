<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>人際關係與協商 | 面授封神最終版 V5.0</title>
    <style>
        :root { 
            --primary: #fbbf24; --danger: #ef4444; --bg: #020617; --text: #f8fafc; 
            --safe-top: env(safe-area-inset-top, 50px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .header { 
            position: fixed; top: 0; left: 0; right: 0; padding-top: var(--safe-top); height: calc(88px + var(--safe-top));
            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; 
            padding-left: calc(15px + env(safe-area-inset-left)); padding-right: calc(15px + env(safe-area-inset-right)); z-index: 2000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
        }
        .wrapper { display: flex; height: 100%; padding-top: calc(88px + var(--safe-top)); box-sizing: border-box; }
        .sidebar { 
            position: fixed; left: -110%; top: 0; bottom: 0; width: 320px; background: rgba(11, 15, 26, 0.99); border-right: 1px solid rgba(251, 191, 36, 0.3); 
            z-index: 3000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding-top: calc(100px + var(--safe-top)); backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
        }
        .sidebar.open { left: 0; box-shadow: 40px 0 100px rgba(0,0,0,1); }
        .course-nav { height: 100%; overflow-y: auto; padding: 25px; }
        .nav-cat { font-size: 0.75rem; color: var(--primary); margin: 30px 0 15px 5px; font-weight: 950; border-left: 5px solid var(--primary); padding-left: 12px; }
        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; background: rgba(255,255,255,0.06); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 1000; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(230px + var(--safe-bottom)); }
        .screen { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #slide-view { width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .label-unit { position: absolute; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: var(--primary); padding: 15px 35px; border-radius: 20px; font-weight: 1000; font-size: 1.6rem; border: 3px solid var(--primary); box-shadow: 0 30px 80px rgba(0,0,0,0.8); z-index: 1001; text-align: center; max-width: 85%; }
        .console { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 23, 42, 0.98); padding: 28px; 
            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.3rem; line-height: 1.6; height: 110px; overflow-y: auto; color: #fff; font-weight: 500; margin: 15px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 400px) { .header-info { font-size: 0.85rem !important; } .label-unit { font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div id="splash" onclick="goStudy()">
        <div style="width: 85%">
            <p style="color:var(--primary); font-weight:1000; letter-spacing:8px; margin-bottom:15px; font-size:0.9rem;">1142 | FINAL EXAM LEAK EDITION</p>
            <h1 style="font-size:2.8rem; line-height:1.2; margin:15px 0; background:linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:1000;">人際關係與協商<br><span style="font-size:2.2rem; color:var(--primary); text-shadow:0 0 20px rgba(251,191,36,0.3);">面授封神最終版 V5.0</span></h1>
            <div style="background:var(--danger); color:white; padding:10px 35px; border-radius:12px; font-size:1.3rem; font-weight:900; display:inline-block; margin-top:10px;">老師認證：25% 名詞 / 75% 問答</div>
            <br><button class="btn-gold" style="margin-top:50px;">🏆 就緒</button>
        </div>
    </div>
    <header class="header">
        <button onclick="toggleSidebar()" style="background:var(--primary); border:none; padding:12px 25px; border-radius:15px; font-weight:1000; font-size:0.9rem;">☰ 考點導航</button>
        <div class="header-info" style="color:var(--primary); font-weight:1000; font-size:1rem; text-align:center; flex:1; padding:0 10px;">面授重點：只考大標，內容意思對就給分！</div>
        <div style="background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:50px; border:2px solid var(--primary); display:flex; align-items:center; gap:8px;"><input type="range" id="rate" min="0.5" max="2.0" value="1.3" step="0.1" style="width:50px; accent-color:var(--primary)"></div>
    </header>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"><div class="course-nav" id="nav"></div></aside>
        <main class="viewport">
            <div class="screen"><div id="slide-view"></div><div id="overlay-layer" style="position:absolute; inset:0; pointer-events:none; display:flex; justify-content:center; align-items:center;"></div></div>
            <div class="console">
                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1rem;" id="cat-title">解釋名詞 25%</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 32</span></div>
                <div id="lecture-content" class="text-body">。</div>
                <div class="nav-btns">
                    <button class="control-btn" onclick="prev()">⬅ 上一頁</button>
                    <button class="control-btn" onclick="next(cuI+1)">下一頁 ➡</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "解釋名詞 (25%)", title: "📝 艾里斯 10 大不合理信念", img: "albert_ellis_rational_emotive_background_1775990617583.png", labels: ["不合理信念"], text: "艾里斯 10 大信念關鍵字：每個人都要愛我、樣樣精通才有價值、事情不如意就很糟、不快樂來自外在、提心吊膽、逃避問題、過去決定現在、求完美解答。老師強調這些是主觀偏誤。" },
            { cat: "解釋名詞 (25%)", title: "📝 自我概念 (Self-Concept)", img: "defense_mechanism_crystal_shield_1776041117465.png", labels: ["概括性看法"], text: "自我概念：是指個人對自己持有的概括性看法，即認為「自己是怎樣的人」。受人際、文化、特定他人與一般他人多重影響。" },
            { cat: "解釋名詞 (25%)", title: "📝 內控性格 vs. 外控性格", img: "attribution_theory_cause_effect_links_1776041098952.png", labels: ["命運掌控者"], text: "內控性格：相信努力可控制命運，操之在我。外控性格：相信命運受天命、神等第三者控制。錄音提到：外控者面對不可控壓力時更容易焦慮。" },
            { cat: "解釋名詞 (25%)", title: "📝 特定他人 vs. 一般他人", img: "first_impression_spark_labels_1776042502128.png", labels: ["重要他人"], text: "特定他人：如父母兄弟、阿公阿嬤（隔代教養）。一般他人：代表社會整體觀點與規範的內化。" },
            { cat: "解釋名詞 (25%)", title: "📝 月暈效應 (Halo Effect)", img: "halo_effect_glowing_aura_bias_1776041171942.png", labels: ["以偏概全"], text: "月暈效應：因單一顯著特質（如外貌）而擴張評價，高估整體。錄音強調：我們會認為俊男美女學歷更高、能力更強。" },
            { cat: "解釋名詞 (25%)", title: "📝 第一印象 vs. 刻板印象", img: "halo_effect_glowing_aura_bias_1776041171942.png", labels: ["外顯評價"], text: "第一印象：初次接觸之外顯行為綜合評價。刻板印象：將概括特徵標記在團體上。老師提到：以前男主外女主內，現在不同了。" },
            { cat: "解釋名詞 (25%)", title: "📝 印象整飾 (Impression Management)", img: "goffman_dramaturgy_theater_stage_1776041066626.png", labels: ["控制形象"], text: "印象整飾：意圖去「控制」別人的知覺，進而影響他人對我們形成印象的過程。包含符合角色期望、維持自尊等功能。" },
            { cat: "解釋名詞 (25%)", title: "📝 A 型性格 (Type A)", img: "stress_measurement_gauge_srrs_1776041191104.png", labels: ["競爭與緊繃"], text: "A 型性格：強烈急迫感、競爭性與緊繃。老師提到：這種性格的面授學生面對面試或上台時壓力特別大。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 馬斯洛需求層級理論", img: "maslow_pyramid_stomach_to_god_1776041006784.png", labels: ["生理➔自我實現"], text: "馬斯洛五層次：生理、安全、社會、自尊、自我實現。低層「肚子世界」滿足後，才追求高層「神仙世界」。面授強調：生理包含食慾與還原下一代的性。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 圓融人際六要訣", img: "roundness_secrets_enso_circle_1776041217719.png", labels: ["尊笑口心度腳"], text: "圓融六要訣：一、尊：尊重。二、笑：笑臉。三、口：口圓(讚美)。四、心：心正(誠意)。五、度：大度(寬容)。六、腳：腳勤與腳蹲(謙虛)。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 知覺組織四大原則", img: "attribution_theory_cause_effect_links_1776041098952.png", labels: ["接/相/連/閉"], text: "組織大標：一、接近性。二、相似性。三、連續性。四、閉合性。錄音解釋：雖然線段有缺口，我們仍看成完整三角形，就是閉合性。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 知覺評價與對比效應", img: "halo_effect_glowing_aura_bias_1776041171942.png", labels: ["對比/恆常/整體"], text: "評價特徵：一、知覺對比（鶴立雞群）。二、知覺選擇性（花瓶與人臉）。三、知覺恆常性（門半開仍是門）。四、知覺整體性。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 凱利歸因三維論", img: "attribution_theory_cause_effect_links_1776041098952.png", labels: ["區別/一致/普遍"], text: "歸因推論大標：一、區別性（這件事跟別件不同嗎）。二、一致性（以前也這樣嗎）。三、普遍性/統一性（別人也這樣嗎）。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 壓力管理的五大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", labels: ["消除/幽默/支持"], text: "壓力策略大標：一、消除壓力源。二、發現幽默。三、社會支持。四、調整認知。五、放鬆技巧（如呼吸法、肌肉鬆弛）。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 影響人際吸引的因素", img: "heider_pox_balance_triad_1776041022011.png", labels: ["時空/個人/適配"], text: "吸引大標：一、情境因素（時空接近）。二、個人因素（外表、性格、能力）。三、適配因素（相似性與互補性）。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 得寸進尺 vs. 漫天要價", img: "foot_in_the_door_vs_face_concept_1776042490769.png", labels: ["小要求➔大要求"], text: "得寸進尺：先提小要求再大（小狗上床）。漫天要價：先提大被拒再收小。老師提醒：這兩者是維持公共形象的社會策略。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 中國人的人情與面子", img: "roundness_secrets_enso_circle_1776041217719.png", labels: ["人情/面子"], text: "中國人性格大標：人情包含人的情緒、社會資源與社會規範。面子是社會聲望與地位指標。杜月笙三碗麵：人面、場面、情面。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 TA 溝通分析的三型態", img: "ta_pac_model_diagram_circles_1776041140078.png", labels: ["互補/交錯/隱藏"], text: "TA 三型態：一、互補式。二、交錯式（衝突來源）。三、隱藏式（話中有話）。錄音強調成人理性能化解衝突。" },
            { cat: "錄音補強數據", title: "📊 運動 333 定義", img: "stress_measurement_gauge_srrs_1776041191104.png", labels: ["週3/30分/130次"], text: "運動 333：一週 3 次、每次 30 分鐘(消耗熱量)、心跳 130 下(心肺運動)。老師說這比 3K 跑更能維持健康。" },
            { cat: "錄音補強數據", title: "📊 SRRS 中度生活危機", img: "stress_measurement_gauge_srrs_1776041191104.png", labels: ["200-299 分"], text: "數據：200-299 分屬中度危機。錄音強調配偶死亡壓力 100 分，是最高且最重要的指標。" },
            { cat: "錄音補強數據", title: "📊 梅拉賓定律 93%", img: "nonverbal_emblems_hand_gestures_1776041154779.png", labels: ["非語言佔 93%"], text: "非語言數據：在溝通中情感傳遞，非語言訊息佔比 93%。" },
            { cat: "錄音補強數據", title: "📊 理想睡眠與心親密距離", img: "roundness_secrets_enso_circle_1776041217719.png", labels: ["8 小時 / 1.5 英尺"], text: "數據：理想睡眠 8 小時，右側臥。親密距離 1.5 英尺以內。" },
            { cat: "最終魔鬼叮嚀", title: "🏆 千萬不可留白", img: "exam_success_golden_trophy_100_1776041250115.png", labels: ["寫大標必拿分"], text: "戰術：不可留白！老師親口承諾：意思對七八成就給分。他會根據關鍵字與大標來抓分數。" },
            { cat: "最終魔鬼叮嚀", title: "🏆 閉卷考試心法", img: "exam_success_golden_trophy_100_1776041250115.png", labels: ["掃描封神榜"], text: "戰術：閉卷不難，只要記大標。祝志剛社長與陳同學 100 分凱旋！" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].special, studyPlan[i].labels);
            document.getElementById('lecture-content').innerText=studyPlan[i].text;
            const u=new SpeechSynthesisUtterance(studyPlan[i].text); u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(sp, ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
