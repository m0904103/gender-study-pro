<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>1142 | 人際關係與協商 Elite 36-Slides V5.2</title>
    <style>
        :root { 
            --primary: #fbbf24; --danger: #ef4444; --bg: #020617; --text: #f8fafc; 
            --safe-top: env(safe-area-inset-top, 50px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .header { 
            position: fixed; top: 0; left: 0; right: 0; padding-top: var(--safe-top); height: calc(88px + var(--safe-top));
            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; 
            padding-left: calc(15px + env(safe-area-inset-left)); padding-right: calc(15px + env(safe-area-inset-right)); z-index: 2000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
        }
        .wrapper { display: flex; height: 100%; padding-top: calc(88px + var(--safe-top)); box-sizing: border-box; }
        .sidebar { 
            position: fixed; left: -110%; top: 0; bottom: 0; width: 320px; background: rgba(11, 15, 26, 0.99); border-right: 1px solid rgba(251, 191, 36, 0.3); 
            z-index: 3000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding-top: calc(100px + var(--safe-top)); backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
        }
        .sidebar.open { left: 0; box-shadow: 40px 0 100px rgba(0,0,0,1); }
        .course-nav { height: 100%; overflow-y: auto; padding: 25px; }
        .nav-cat { font-size: 0.75rem; color: var(--primary); margin: 30px 0 15px 5px; font-weight: 950; border-left: 5px solid var(--primary); padding-left: 12px; }
        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; background: rgba(255,255,255,0.06); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 1000; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(230px + var(--safe-bottom)); }
        .screen { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #slide-view { width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .label-unit { position: absolute; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: var(--primary); padding: 15px 35px; border-radius: 20px; font-weight: 1000; font-size: 1.6rem; border: 3px solid var(--primary); box-shadow: 0 30px 80px rgba(0,0,0,0.8); z-index: 1001; text-align: center; max-width: 85%; }
        .console { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 23, 42, 0.98); padding: 28px; 
            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.3rem; line-height: 1.6; height: 110px; overflow-y: auto; color: #fff; font-weight: 500; margin: 15px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 400px) { .header-info { font-size: 0.85rem !important; } .label-unit { font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div id="splash" onclick="goStudy()">
        <div style="width: 85%">
            <p style="color:var(--primary); font-weight:1000; letter-spacing:8px; margin-bottom:15px; font-size:0.9rem;">1142 | ELITE 36-SLIDES EDITION</p>
            <h1 style="font-size:2.8rem; line-height:1.2; margin:15px 0; background:linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:1000;">人際關係與協商<br><span style="font-size:2.2rem; color:var(--primary); text-shadow:0 0 20px rgba(251,191,36,0.3);">全量 36 頁 Elite 版 V5.2</span></h1>
            <div style="background:var(--danger); color:white; padding:10px 35px; border-radius:12px; font-size:1.3rem; font-weight:900; display:inline-block; margin-top:10px;">面授實錄地毯式覆蓋 | 100% 視覺對位</div>
            <br><button class="btn-gold" style="margin-top:50px;">🏆 就緒</button>
        </div>
    </div>
    <header class="header">
        <button onclick="toggleSidebar()" style="background:var(--primary); border:none; padding:12px 25px; border-radius:15px; font-weight:1000; font-size:0.9rem;">☰ 36 考點索引</button>
        <div class="header-info" style="color:var(--primary); font-weight:1000; font-size:1rem; text-align:center; flex:1; padding:0 10px;">警告：本版含錄音中所有冷門大標，週六必見！</div>
        <div style="background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:50px; border:2px solid var(--primary); display:flex; align-items:center; gap:8px;"><input type="range" id="rate" min="0.5" max="2.0" value="1.3" step="0.1" style="width:50px; accent-color:var(--primary)"></div>
    </header>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"><div class="course-nav" id="nav"></div></aside>
        <main class="viewport">
            <div class="screen"><div id="slide-view"></div><div id="overlay-layer" style="position:absolute; inset:0; pointer-events:none; display:flex; justify-content:center; align-items:center;"></div></div>
            <div class="console">
                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1rem;" id="cat-title">-</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 36</span></div>
                <div id="lecture-content" class="text-body">。</div>
                <div class="nav-btns">
                    <button class="control-btn" onclick="prev()">⬅ 上一頁</button>
                    <button class="control-btn" onclick="next(cuI+1)">下一頁 ➡</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "基礎概念", title: "1. 人際關係之定義", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["廣義 vs 狹義"], txt: "人際關係即人情關係。狹義指朋友、同才、同事的互動。廣義則指社會影響的歷程。" },
            { cat: "基礎概念", title: "2. 溝通之定義", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["多元訊息傳遞"], txt: "溝通是經由語言或非語言管道，將意見、態度、情感傳遞給對方的歷程。" },
            { cat: "基礎概念", title: "3. 溝通歷程模式", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["發信➔噪音➔接收"], txt: "溝通要素：傳送者、信息、管道、接收者、噪音、回饋。噪音是干擾溝通的障礙。" },
            { cat: "自我覺察", title: "4. 周哈里窗四區", img: "johari_window_modern_diagram_1776040990674.png", ls: ["開放/盲目/隱藏/未知"], txt: "老師明示：此為必考重點。掌握自我與他人重疊的四個扇區。" },
            { cat: "自我覺察", title: "5. 艾里斯 10 大不合理信念", img: "albert_ellis_rational_emotive_background_1775990617583.png", ls: ["樣樣精通/過去決定"], txt: "解釋名詞考點：樣樣精通才有價值、事情不如意就很糟、逃避問題、過去決定現在。" },
            { cat: "自我覺察", title: "6. 自我概念 (Self-Concept)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["概括性看法"], txt: "個人對自己持有的概括性看法，即定義「我是怎樣的人」。" },
            { cat: "人格/認知", title: "7. 內控性格 vs. 外控性格", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["命運掌控者"], txt: "內控：操之在我。外控：操之在天、神。錄音強調外控者壓力較大。" },
            { cat: "人格/認知", title: "8. 負面情感 (Negative Affect)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["情緒趨力"], txt: "指一個人容易產生厭惡、緊張、憂慮或憤怒情緒狀態的傾向。" },
            { cat: "人格/認知", title: "9. 場地獨立 vs. 場地依賴", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["認知依賴度"], txt: "場地獨立型不受外界干擾；場地依賴型易受環境與他人意見左右。" },
            { cat: "人格/認知", title: "10. 沉思型 vs. 衝動型", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["決策反應"], txt: "沉思型決策慢但準確率高；衝動型反應快但易出錯。錄音中老師提到的個體差異。" },
            { cat: "人格/認知", title: "11. 環化型 vs. 簡化型", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["訊息處理"], txt: "環化型把訊息想得複雜；簡化型直來直往、按字面解讀。" },
            { cat: "知覺過程", title: "12. 知覺產生的三步驟", img: "nonverbal_mircro_expressions_eye_1776041233563.png", ls: ["感覺➔組織➔評價"], txt: "知覺流程：感覺(五官)➔組織(整理)➔評價(形成印象)。" },
            { cat: "知覺過程", title: "13. 組織原則：接近/相似", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["接近性/相似性"], txt: "接近性：距離近的看成一組。相似性：形狀相同的看成一組。" },
            { cat: "知覺過程", title: "14. 組織原則：連續/閉合", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["連續性/閉合性"], txt: "連續性：看成連續線段。閉合性：將有缺口的三角形補全看成整體。" },
            { cat: "知覺過程", title: "15. 組織原則：連接性 (啞鈴)", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["連接性原則"], txt: "錄音亮點：兩個圓加一槓像啞鈴，會被看成一組。這是面授強調的第 5 原則。" },
            { cat: "知覺評價", title: "16. 知覺對比 (阿部效應)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["190公分例子"], txt: "解釋名詞考點：190公分在凡人中很高，在NBA球員中顯矮。知覺會受背景對比影響。" },
            { cat: "知覺評價", title: "17. 月暈效應與刻板印象", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["以偏概全"], txt: "月暈：因單一優點擴大評價。刻板：將特徵標記在團體，如男主外女主內。" },
            { cat: "知覺評價", title: "18. 第一印象 (外顯行為)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["綜合評價"], txt: "初次接觸根據衣著、談吐、外顯行為做出的綜合性評價。" },
            { cat: "知覺評價", title: "19. 核心特質實驗 (熱誠/冷淡)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["決定性印象"], txt: "錄音強調：熱誠/冷淡能徹底改變人的評價，禮貌/粗魯則相對次要。" },
            { cat: "歸因理論", title: "20. 內在歸因 vs. 外在歸因", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["推論原因"], txt: "歸因即推論行為背後原因。內在歸因為性格/能力；外在歸因為環境/運氣。" },
            { cat: "歸因理論", title: "21. 凱利三維歸因論", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["區別/一致/普遍"], txt: "解釋名詞考點：區別性(對這事不同嗎?)、一致性(以前都這樣嗎?)、普遍性(別人都這樣嗎?)。" },
            { cat: "印象管理", title: "22. 印象整飾之功能", img: "goffman_dramaturgy_theater_stage_1776041066626.png", ls: ["維持自尊/形象"], txt: "五大功能：維持自尊、界定互動關係、發揮影響力、符合角色期望、建立穩定形象。" },
            { cat: "壓力管理", title: "23. 社會再適應量表 (SRRS)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["200-299 分中度"], txt: "200-299分屬中度危機。最高分為配偶死亡。錄音強調數據準確性。" },
            { cat: "壓力管理", title: "24. 壓力管理的五大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["消除/幽默/支持/認知/放鬆"], txt: "面授考點：消除壓力源最治本；放鬆技巧包含呼吸法與肌肉鬆弛。" },
            { cat: "人際吸引", title: "25. 影響吸引三因素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["情境/個人/適配"], txt: "問答大題：情境(接近性)、個人(外表能力)、適配(相似與互補性)。" },
            { cat: "人際吸引", title: "26. 仰巴腳效應 (Pratfall)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["出醜效應"], txt: "能力卓越者犯小錯(如打翻咖啡)反而更具吸引力，因具人性化。" },
            { cat: "人際吸引", title: "27. 海德 POX 平衡理論", img: "heider_pox_balance_triad_1776041038324.png", ls: ["正正得正"], txt: "三方關係乘積為正則平衡。錄音提到：朋友喜歡的你不喜歡，就不平衡。" },
            { cat: "愛情研究", title: "28. 完美的愛三元素", img: "sternberg_love_triangle_diagram_1776041022011.png", ls: ["激情/親密/責任"], txt: "斯騰伯格理論。不同年齡層比重不同，如20歲激情多，40歲責任多。" },
            { cat: "愛情研究", title: "29. 愛情六型態 (Lee)", img: "sternberg_love_triangle_diagram_1776041022011.png", ls: ["友誼/激情/現實..."], txt: "雷斯研究：友誼之愛、激情之愛、佔有欲之愛、無私之愛、現實之愛、情人之愛。" },
            { cat: "溝通技能", title: "30. 圓融人際六要訣", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["尊笑口心度腳"], txt: "尊(敬)、笑(顏)、口(讚)、心(誠)、度(量)、腳(勤)。" },
            { cat: "溝通技能", title: "31. 非語言溝通特質 (93%)", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["梅拉賓定律"], txt: "非語言傳遞訊息佔比 93%。具模糊性、持續性與文化差異。" },
            { cat: "溝通技能", title: "32. TA 溝通分析三狀態", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["父母/成人/兒童"], txt: "分析個人溝通時的心理狀態：Parent(權威)、Adult(理性)、Child(衝動)。" },
            { cat: "溝通技能", title: "33. 電話溝通三要素與 30 秒", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["姓名/電話/事由"], txt: "職場必殺技：前 30 秒決定好感。留言必留姓名、電話、事由。" },
            { cat: "社會文化", title: "34. 中國人的人情與面子", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["杜月笙三碗麵"], txt: "社會規範的核心要素。人面、場面、情面。包含情緒、資源與規範。" },
            { cat: "社會文化", title: "35. 得寸進尺 vs 漫天要價", img: "foot_in_the_door_vs_face_concept_1776042490769.png", ls: ["社會影響策略"], txt: "得寸進尺(先小後大)；漫天要價(先大後小)。依賴公共形象維持機制。" },
            { cat: "終極戰術", title: "36. 考場心法：千萬不可留白", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["寫大標必拿分"], txt: "面授叮嚀：意思對七八成就給滿分。不要拘泥每個字，寫出大標題就是勝利！" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat + " | " + studyPlan[i].title;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].ls);
            document.getElementById('lecture-content').innerText=studyPlan[i].txt;
            const u=new SpeechSynthesisUtterance(studyPlan[i].title + "。" + studyPlan[i].txt); u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
