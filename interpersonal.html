    <style>
        :root { 
            --primary: #fbbf24; --danger: #ef4444; --bg: #020617; --text: #f8fafc; 
            --safe-top: env(safe-area-inset-top, 50px);

        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none;

        }

            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; 
            padding-left: calc(15px + env(safe-area-inset-left)); padding-right: calc(15px + env(safe-area-inset-right)); z-index: 2000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);

            position: fixed; left: -110%; top: 0; bottom: 0; width: 320px; background: rgba(11, 15, 26, 0.99); border-right: 1px solid rgba(251, 191, 36, 0.3);

        }

        .course-nav { height: 100%; overflow-y: auto; padding: 25px; }
        .nav-cat { font-size: 0.75rem; color: var(--primary); margin: 30px 0 15px 5px; font-weight: 950; border-left: 5px solid var(--primary); padding-left: 12px; }
        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; background: rgba(255,255,255,0.06); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 1000; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(230px + var(--safe-bottom)); }
        .screen { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #slide-view { width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .label-unit { position: absolute; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: var(--primary); padding: 15px 35px; border-radius: 20px; font-weight: 1000; font-size: 1.6rem; border: 3px solid var(--primary); box-shadow: 0 30px 80px rgba(0,0,0,0.8); z-index: 1001; text-align: center; max-width: 85%; }
        .console { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 23, 42, 0.98); padding: 28px; 
            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.3rem; line-height: 1.6; height: 110px; overflow-y: auto; color: #fff; font-weight: 500; margin: 15px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 400px) { .header-info { font-size: 0.85rem !important; } .label-unit { font-size: 1.3rem; } }
    </style>
</head>

            <h1 style="font-size:2.8rem; line-height:1.2; margin:15px 0; background:linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:1000;">人際關係與協商<br><span style="font-size:2.2rem; color:var(--primary); text-shadow:0 0 20px rgba(251,191,36,0.3);">終極反射 Cheat Sheet 版</span></h1>

                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1rem;" id="cat-title">-</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 37</span></div>

    <script>
        const studyPlan = [
            { cat: "解釋名詞 (25%)", title: "1. 自我概念 (Self-Concept)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["自我概念"], txt: "自我概念：個人對自己持有的概括性看板看法。即定義「我是怎樣的人」。" },
            { cat: "解釋名詞 (25%)", title: "2. 周哈里窗 (Johari Window)", img: "johari_window_modern_diagram_1776040990674.png", ls: ["周哈里窗四區"], txt: "周哈里窗：分析自我覺察之模型。核心斷點：開放、盲目、隱藏、未知。" },
            { cat: "解釋名詞 (25%)", title: "3. 社會再適應量表 (SRRS)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["SRRS 中度生活危機"], txt: "社會再適應量表：量化壓力的工具。關鍵數據：200 到 299 分屬於中度生活危機。" },
            { cat: "解釋名詞 (25%)", title: "4. 月暈效應 (Halo Effect)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["月暈效應"], txt: "月暈效應：認知偏誤。因單一優點產生「以偏概全」的整體正面評價。" },
            { cat: "解釋名詞 (25%)", title: "5. 戲劇理論 (Dramaturgy)", img: "goffman_dramaturgy_theater_stage_1776041066626.png", ls: ["戲劇理論 (高夫曼)"], txt: "戲劇理論：將互動比喻為舞台表演。分為前台形象整飾與後台真實自我。" },
            { cat: "解釋名詞 (25%)", title: "6. 仰巴腳效應 (Pratfall Effect)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["仰巴腳效應"], txt: "仰巴腳效應：又稱出醜效應。能力強的人犯小錯，反而增加親和力與吸引力。" },
            { cat: "解釋名詞 (25%)", title: "7. 象徵 (Emblem)", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["「象徵」定義"], txt: "象徵：具特定文化定義，能直接取代口語的肢體動作，如豎大拇指。" },
            { cat: "解釋名詞 (25%)", title: "8. 歸因 (Attribution)", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內在與外在歸因"], txt: "歸因：推論行為原因的歷程。分為內在性格歸因與外在環境歸因。" },
            { cat: "解釋名詞 (25%)", title: "9. 不合理信念 (Irrational Beliefs)", img: "albert_ellis_rational_emotive_background_1775990617583.png", ls: ["艾里斯不合理信念"], txt: "不合理信念：對生活持有絕對化觀念。艾里斯提出，為情緒困擾之根源。" },
            { cat: "解釋名詞 (25%)", title: "10. 防衛機制 (Defense Mechanism)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["防衛機制"], txt: "防衛機制：面臨挫折時採取的保護行為，如合理化、退化作用。" },
            { cat: "解釋名詞 (25%)", title: "11. 內控性格 vs. 外控性格", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內控 vs. 外控性格"], txt: "內控性格：相信努力可控制命運。外控性格：相信受天命或環境支配。" },
            { cat: "解釋名詞 (25%)", title: "12. 負面情感 (Negative Affect)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["負面情感傾向"], txt: "負面情感：指個體容易產生焦慮、緊張或憤怒情緒狀態的人格傾向。" },
            { cat: "解釋名詞 (25%)", title: "13. 場地獨立型與依賴型", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["場地獨立與依賴型"], txt: "場地獨立型：不受背景干擾。場地依賴型：判斷易受環境資訊影響。" },
            { cat: "解釋名詞 (25%)", title: "14. 沉思型與衝動型", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["沉思型與衝動型"], txt: "沉思型：決策節奏慢但準確度高。衝動型：反應節奏快但易出錯。" },
            { cat: "解釋名詞 (25%)", title: "15. 環化型與簡化型認知", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["環化型與簡化型"], txt: "環化型：資訊處理複雜多層次。簡化型：資訊處理單一且按字面。反映認知深度。" },
            { cat: "問答大題 (75%)", title: "16. 馬斯洛 (Maslow) 需求層次", img: "maslow_pyramid_stomach_to_god_1776041006784.png", ls: ["肚子與神仙理論"], txt: "大標題：生理、安全、社會、自尊、自我實現。核心邏輯：滿足低層「肚子世界」後，才會追求高層「神仙世界」。" },
            { cat: "問答大題 (75%)", title: "17. 獲得健康策略：生理修復", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["生理修復三要素"], txt: "大標題：適度運動、理想睡眠 8 小時、均衡飲食。關鍵細節：建議採「右側臥睡覺」以優化生理修復效能。" },
            { cat: "問答大題 (75%)", title: "18. 獲得健康策略：心理回彈", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["心理回彈三要素"], txt: "大標題：發展複元力（恢復與容忍力）、發展能力、壓力管理。旨在提升心理抗壓韌性。" },
            { cat: "問答大題 (75%)", title: "19. 圓融人際六要訣", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["尊、笑、口、心、度、腳"], txt: "大標題口訣：尊、笑、口、心、度、腳。內容為尊重、笑臉常開、口圓、心正、度大、以及腳勤。" },
            { cat: "問答大題 (75%)", title: "20. 影響人際知覺的要素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["知覺者/被知覺者/情境"], txt: "大標題：一、被知覺者外觀。二、知覺者動機與情緒。三、交往情境。三者共同主導最終評價。" },
            { cat: "問答大題 (75%)", title: "21. 知覺組織：接近與相似", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["接近性、相似性"], txt: "大標題：接近性與相似性原則。核心：大腦傾向將時空相近或物理特徵相似的刺激歸類為一個整體。" },
            { cat: "問答大題 (75%)", title: "22. 知覺組織：連續與閉合", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["連續性、閉合性"], txt: "大標題：連續性與閉合性原則。核心：自動優化機制，將斷續刺激，在認知中補完為完整圖形。" },
            { cat: "問答大題 (75%)", title: "23. 知覺產生的三步驟", img: "nonverbal_mircro_expressions_eye_1776041233563.png", ls: ["感覺/組織/評價"], txt: "大標題：一、感覺階段。二、組織階段。三、評價階段。是物理信號轉化為心理意義的必經之路。" },
            { cat: "問答大題 (75%)", title: "24. 知覺組織：連接性 (啞鈴)", img: "gestalt_connectedness_dumbbell_principle_1776043234567_1776051269067.png", ls: ["連接性 (啞鈴圖)"], txt: "大標題：連接性原則。啞鈴圖效應：獨立物件若被線條連結，會被知覺視為單一運作單元。" },
            { cat: "問答大題 (75%)", title: "25. 壓力管理的五大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["消除源/支持/認知..."], txt: "大標題：消除壓力源（治本）、發現幽默、社會支持、調整認知、放鬆技巧。全方位抗壓配套。" },
            { cat: "問答大題 (75%)", title: "26. 影響人際吸引的因素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["情境/個人/適配"], txt: "大標題：一、情境因素。二、個人因素（外表能力）。三、適配因素（相似互補）。吸引力之成因。" },
            { cat: "問答大題 (75%)", title: "27. 非語言溝通的五大特性", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["模糊/持續/管道..."], txt: "大標題：模糊、持續、多重管道、情感高、文化差異。數據點：非語言訊息情感佔比 93%。" },
            { cat: "問答大題 (75%)", title: "28. 溝通分析 (TA) 的型態", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["互補/交錯/隱藏"], txt: "大標題：互補式、交錯式、隱藏式溝通。核心依據三種狀態分析：父母 P、成人 A、兒童 C。" },
            { cat: "問答大題 (75%)", title: "29. 華人文化的人情與面子", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["人情/面子/三碗麵"], txt: "大標題：人情（情感、資源、規範）與面子。核心引用杜月笙名言：人面、場面、情面這三碗麵。" },
            { cat: "問答大題 (75%)", title: "30. 凱利三維歸因模型", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["歸因三維指標"], txt: "大標題：區別性、一致性、普遍性（統一性）。向度決定歸因為個體特質或外部情境。" },
            { cat: "問答大題 (75%)", title: "31. 愛情三因論 (Sternberg)", img: "sternberg_love_triangle_diagram_1776041022011.png", ls: ["激情/親密/責任"], txt: "大標題：激情元素、親密元素、責任與決心。三要素權重隨交往階段與承諾深度變動。" },
            { cat: "魔鬼數據彙整", title: "32. 非語言 93% 佔比數據", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["梅拉賓定律數據"], txt: "精確數據：非語言訊息在傳遞情感時，佔比高達 93%。體現溝通中非話語的重要性。" },
            { cat: "魔鬼數據彙整", title: "33. SRRS 中度數據指標", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["200-299 分生活危機"], txt: "精確數據：SRRS 分數區間在 200 到 299 分之間，學術定義為中度生活危機區間。" },
            { cat: "魔鬼數據彙整", title: "34. 1.5 英尺親密距離", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["親密距離數值"], txt: "精確數據：親密距離規範於 1.5 英尺（約 45 公分）以內。超越此界限即進入社會距離。" },
            { cat: "魔鬼數據彙整", title: "35. 理想睡眠 8 小時原則", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["8 小時生理修復"], txt: "精確數據：人類理想睡眠時間平均為 8 小時。這是生理修復策略的核心數據指標。" },
            { cat: "魔鬼數據彙整", title: "36. 考術戰術與英文術語", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["絕對不空白原則"], txt: "戰術重點：大標題優先寫出。解釋名詞注重術語學名。嚴禁留白，是達成高分的基本底線。" },
            { cat: "終極反射清單", title: "37. 12 核心標籤 Cheat Sheet", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["終極反射清單"], txt: "自我看周哈里、健康看生理心理雙軌、認知看三步驟。組織看連接啞鈴、壓力看五策略、人際看六要訣。溝通看 93 百分比。" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat + " | " + studyPlan[i].title;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].ls);
            document.getElementById('lecture-content').innerText=studyPlan[i].txt;
            const u=new SpeechSynthesisUtterance(studyPlan[i].title + "。" + studyPlan[i].txt); u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
