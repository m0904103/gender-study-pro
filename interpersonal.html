<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>人際關係與協商 | 期中考神級封神榜 V4.1</title>
    <style>
        :root { 
            --primary: #fbbf24; --danger: #ef4444; --bg: #020617; --text: #f8fafc; 
            --safe-top: env(safe-area-inset-top, 50px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .header { 
            position: fixed; top: 0; left: 0; right: 0; padding-top: var(--safe-top); height: calc(88px + var(--safe-top));
            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; 
            padding-left: calc(15px + env(safe-area-inset-left)); padding-right: calc(15px + env(safe-area-inset-right)); z-index: 2000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
        }
        .wrapper { display: flex; height: 100%; padding-top: calc(88px + var(--safe-top)); box-sizing: border-box; }
        .sidebar { 
            position: fixed; left: -110%; top: 0; bottom: 0; width: 320px; background: rgba(11, 15, 26, 0.99); border-right: 1px solid rgba(251, 191, 36, 0.3); 
            z-index: 3000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding-top: calc(100px + var(--safe-top)); backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
        }
        .sidebar.open { left: 0; box-shadow: 40px 0 100px rgba(0,0,0,1); }
        .course-nav { height: 100%; overflow-y: auto; padding: 25px; }
        .nav-cat { font-size: 0.75rem; color: var(--primary); margin: 30px 0 15px 5px; font-weight: 950; border-left: 5px solid var(--primary); padding-left: 12px; }
        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; background: rgba(255,255,255,0.06); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 1000; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(230px + var(--safe-bottom)); }
        .screen { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #slide-view { width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .label-unit { position: absolute; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: var(--primary); padding: 18px 40px; border-radius: 20px; font-weight: 1000; font-size: 1.7rem; border: 3px solid var(--primary); box-shadow: 0 30px 80px rgba(0,0,0,0.8); z-index: 1001; text-align: center; max-width: 85%; }
        .console { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 23, 42, 0.98); padding: 28px; 
            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.35rem; line-height: 1.65; height: 110px; overflow-y: auto; color: #fff; font-weight: 500; margin: 15px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 400px) { .header-info { font-size: 0.85rem !important; } .label-unit { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div id="splash" onclick="goStudy()">
        <div style="width: 85%">
            <p style="color:var(--primary); font-weight:1000; letter-spacing:8px; margin-bottom:15px; font-size:0.9rem;">1142 | GOD-LEVEL SEALED LIST</p>
            <h1 style="font-size:2.8rem; line-height:1.2; margin:15px 0; background:linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:1000;">人際關係與協商<br><span style="font-size:2.2rem; color:var(--primary); text-shadow:0 0 20px rgba(251,191,36,0.3);">期中考神級封神榜 V4.1</span></h1>
            <div style="background:var(--danger); color:white; padding:10px 35px; border-radius:12px; font-size:1.3rem; font-weight:900; display:inline-block; margin-top:10px;">老師認證：1-6 章必考重點全覆蓋</div>
            <br><button class="btn-gold" style="margin-top:50px;">🏆 就緒</button>
        </div>
    </div>
    <header class="header">
        <button onclick="toggleSidebar()" style="background:var(--primary); border:none; padding:12px 25px; border-radius:15px; font-weight:1000; font-size:0.9rem;">☰ 封神榜目錄</button>
        <div class="header-info" style="color:var(--primary); font-weight:1000; font-size:1rem; text-align:center; flex:1; padding:0 10px;">神級定義鎖定：意思對、即給滿分！</div>
        <div style="background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:50px; border:2px solid var(--primary); display:flex; align-items:center; gap:8px;"><input type="range" id="rate" min="0.5" max="2.0" value="1.3" step="0.1" style="width:50px; accent-color:var(--primary)"></div>
    </header>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"><div class="course-nav" id="nav"></div></aside>
        <main class="viewport">
            <div class="screen"><div id="slide-view"></div><div id="overlay-layer" style="position:absolute; inset:0; pointer-events:none; display:flex; justify-content:center; align-items:center;"></div></div>
            <div class="console">
                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1rem;" id="cat-title">解釋名詞 25%</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 25</span></div>
                <div id="lecture-content" class="text-body">。</div>
                <div class="nav-btns">
                    <button class="control-btn" onclick="prev()">⬅ 上一頁</button>
                    <button class="control-btn" onclick="next(cuI+1)">下一頁 ➡</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "解釋名詞 (25%)", title: "📝 自我概念 (Self-Concept)", img: "defense_mechanism_crystal_shield_1776041117465.png", labels: ["自我概念"], text: "自我概念：是指個人對自己持有的概括性看法，也就是對「自己是怎樣的人」的整體主觀評斷。" },
            { cat: "解釋名詞 (25%)", title: "📝 周哈里窗 (Johari Window)", img: "johari_window_modern_diagram_1776040990674.png", labels: ["周哈里窗 (Johari Window)"], text: "周哈里窗：分析自我覺察與溝通的模型。老師明示這是考點重點：請背好開放、盲目、隱藏、未知四區。" },
            { cat: "解釋名詞 (25%)", title: "📝 內控性格 vs. 外控性格", img: "attribution_theory_cause_effect_links_1776041098952.png", labels: ["內控/外控性格"], text: "內控性格：相信努力可控制命運，一切操之在我。外控性格：相信命運受環境或天命等第三者控制。只要寫出「操之在我」與「環境控制」即可得分。" },
            { cat: "解釋名詞 (25%)", title: "📝 人際知覺 (Interpersonal Perception)", img: "halo_effect_glowing_aura_bias_1776041171942.png", labels: ["人際知覺"], text: "人際知覺：是指透過感官對他人特性加以組織、評價，並形成整體印象的認知過程。" },
            { cat: "解釋名詞 (25%)", title: "📝 第一印象 (First Impression)", img: "halo_effect_glowing_aura_bias_1776041171942.png", labels: ["第一印象"], text: "第一印象：是指在初次接觸時，根據對方的衣著、談吐等外顯行為所做的綜合評價。" },
            { cat: "解釋名詞 (25%)", title: "📝 刻板印象 (Stereotype)", img: "halo_effect_glowing_aura_bias_1776041171942.png", labels: ["刻板印象"], text: "刻板印象：是指將概括化的特徵標記在特定團體成員身上，並進而產生相對應的行動傾向。" },
            { cat: "解釋名詞 (25%)", title: "📝 月暈效應 (Halo Effect)", img: "halo_effect_glowing_aura_bias_1776041171942.png", labels: ["月暈效應 (Halo Effect)"], text: "月暈效應：因對方的單一顯著特質（如外貌）而過度擴張評價，導致高估其整體的認知偏誤。" },
            { cat: "解釋名詞 (25%)", title: "📝 歸因 (Attribution)", img: "attribution_theory_cause_effect_links_1776041098952.png", labels: ["歸因 (Attribution)"], text: "歸因：是指推論他人或自己行為背後原因的認知過程。重點在於區分為內在因素與外在因素歸因。" },
            { cat: "解釋名詞 (25%)", title: "📝 印象整飾 (Impression Management)", img: "goffman_dramaturgy_theater_stage_1776041066626.png", labels: ["印象整飾"], text: "印象整飾：是指個人意圖去「控制」別人的知覺，進而影響他人對我們形成各種印象的動態過程。" },
            { cat: "解釋名詞 (25%)", title: "📝 防衛機制 (Defense Mechanism)", img: "defense_mechanism_crystal_shield_1776041117465.png", labels: ["防衛機制 (Defense Mechanism)"], text: "防衛機制：是指面對挫折時，為了減輕焦慮、保護自我，而在潛意識中採取的適應保護行為。" },
            { cat: "問答題 (75%)專攻", title: "📝 馬斯洛需求層級理論", img: "maslow_pyramid_stomach_to_god_1776041006784.png", labels: ["肚子➔神仙"], text: "馬斯洛五層次：生理、安全、社會、自尊、自我實現。神仙邏輯：滿足低層次「肚子世界」後，才會追求高層次「神仙世界」。本題老師點名必考！" },
            { cat: "問答題 (75%)專攻", title: "📝 圓融人際六要訣", img: "roundness_secrets_enso_circle_1776041217719.png", labels: ["尊笑口心度腳"], text: "圓融六要訣口訣：一、尊：尊重。二、笑：笑臉。三、口：口圓。四、心：心正。五、度：大度。六、腳：腳勤與腳蹲。" },
            { cat: "問答題 (75%)專攻", title: "📝 人際知覺產生過程", img: "attribution_theory_cause_effect_links_1776041098952.png", labels: ["感➔組➔評"], text: "知覺三步驟：第一、感覺（五官接觸）。第二、組織（訊息整理）。第三、評價（形成最終印象）。" },
            { cat: "問答題 (75%)專攻", title: "📝 壓力管理的各類策略", img: "stress_measurement_gauge_srrs_1776041191104.png", labels: ["壓力策略"], text: "壓力策略大標：一、消除/減緩壓力源。二、發現幽默。三、社會支持。四、調整認知（轉念）。五、放鬆技巧（如呼吸法）。" },
            { cat: "問答題 (75%)專攻", title: "📝 影響人際吸引的關鍵因素", img: "heider_pox_balance_triad_1776041038324.png", labels: ["情/個/適"], text: "三大因素標題：一、情境因素（時空接近性）。二、個人因素（外表、性格、能力）。三、適配因素（相似性與互補性）。" },
            { cat: "問答題 (75%)專攻", title: "📝 非語言溝通的特質", img: "nonverbal_mircro_expressions_eye_1776041233563.png", labels: ["模糊/文化差別"], text: "非語言特質大標：模糊性、持續性、多重管道、情感展現度高、以及決定性的文化差異性。" },
            { cat: "問答題 (75%)專攻", title: "📝 TA 溝通分析的三種型態", img: "ta_pac_model_diagram_circles_1776041140078.png", labels: ["互補/交錯/隱藏"], text: "TA 三型態大標：一、互補式（順利溝通）。二、交錯式（引發衝突）。三、隱藏式（含糊、話中有話）。目標是回歸成人自我溝通。" },
            { cat: "問答題 (75%)專攻", title: "📝 得寸進尺 vs. 漫天要價", img: "foot_in_the_door_vs_face_concept_1776042490769.png", labels: ["小狗上床理論"], text: "得寸進尺效應：先提小要求，為維持形象而難以拒絕後續大要求（如小狗上床例）。漫天要價效應：先提大要求被拒，再提小要求（對方因愧疚較易答應）。" },
            { cat: "魔鬼數據掃描", title: "📊 SRRS 中度生活危機", img: "stress_measurement_gauge_srrs_1776041191104.png", labels: ["200-299 分"], text: "關鍵數據：社會再適應量表 (SRRS) 中度生活危機區間為 200 到 299 分。" },
            { cat: "魔鬼數據掃描", title: "📊 梅拉賓定律 (Non-verbal)", img: "nonverbal_emblems_hand_gestures_1776041154779.png", labels: ["93%"], text: "關鍵數據：梅拉賓研究指出，非語言訊息在情感意向表達中佔比高達百分之 93。" },
            { cat: "魔鬼數據掃描", title: "📊 理想睡眠與心臟保健", img: "roundness_secrets_enso_circle_1776041217719.png", labels: ["8 小時 / 右側臥"], text: "關鍵數據：理想睡眠平均 8 小時（老師特別強調）。建議睡眠姿勢：右側臥最健康。" },
            { cat: "魔鬼數據掃描", title: "📊 人際親密距離定義", img: "ch5_edward_hall_distance_zones.png", labels: ["1.5 英尺"], text: "關鍵數據：人際親密距離設定在 1.5 英尺（約 0.46 公尺）以內。" },
            { cat: "考前最後叮嚀", title: "🏆 千萬不可留白", img: "exam_success_golden_trophy_100_1776041250115.png", labels: ["照意思寫 60分"], text: "考前戰術：千萬不可留白。如老師所說，就算背不完整，只要照意思寫也會有 60 到 70 分。這就是老師最大的放水邏輯！" },
            { cat: "考前最後叮嚀", title: "🏆 注意解釋名詞佔分", img: "exam_success_golden_trophy_100_1776041250115.png", labels: ["佔 25%"], text: "考前戰術：名詞解釋雖然字數少，但佔 25 分，它是拉開分數的關鍵。請確保這 10 個核心概念都在您的『地圖』裡。" },
            { cat: "考前最後叮嚀", title: "🏆 閉卷考試心理建設", img: "exam_success_golden_trophy_100_1776041250115.png", labels: ["大腦掃描地圖"], text: "考前戰術：本次為閉卷考試。請將現在這份特訓清單想像成大腦裡的『掃描地圖』，考試時只需橫向掃描大標題。預祝凱旋 100 分！" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].special, studyPlan[i].labels);
            document.getElementById('lecture-content').innerText=studyPlan[i].text;
            const u=new SpeechSynthesisUtterance(studyPlan[i].text); u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(sp, ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
