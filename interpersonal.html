<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <title>人際關係與協商 | 金牌滿分 Elite 版 V8.1</title>
    <style>
        :root { 
            --primary: #fbbf24; --danger: #ef4444; --bg: #020617; --text: #f8fafc; 
            --safe-top: env(safe-area-inset-top, 50px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .header { 
            position: fixed; top: 0; left: 0; right: 0; padding-top: var(--safe-top); height: calc(88px + var(--safe-top));
            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; 
            padding-left: calc(15px + env(safe-area-inset-left)); padding-right: calc(15px + env(safe-area-inset-right)); z-index: 2000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
        }
        .wrapper { display: flex; height: 100%; padding-top: calc(88px + var(--safe-top)); box-sizing: border-box; }
        .sidebar { 
            position: fixed; left: -110%; top: 0; bottom: 0; width: 320px; background: rgba(11, 15, 26, 0.99); border-right: 1px solid rgba(251, 191, 36, 0.3); 
            z-index: 3000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding-top: calc(100px + var(--safe-top)); backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
        }
        .sidebar.open { left: 0; box-shadow: 40px 0 100px rgba(0,0,0,1); }
        .course-nav { height: 100%; overflow-y: auto; padding: 25px; }
        .nav-cat { font-size: 0.75rem; color: var(--primary); margin: 30px 0 15px 5px; font-weight: 950; border-left: 5px solid var(--primary); padding-left: 12px; }
        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; background: rgba(255,255,255,0.06); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 1000; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(230px + var(--safe-bottom)); }
        .screen { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #slide-view { width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .label-unit { position: absolute; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: var(--primary); padding: 15px 35px; border-radius: 20px; font-weight: 1000; font-size: 1.6rem; border: 3px solid var(--primary); box-shadow: 0 30px 80px rgba(0,0,0,0.8); z-index: 1001; text-align: center; max-width: 85%; }
        .console { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 23, 42, 0.98); padding: 28px; 
            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.3rem; line-height: 1.6; height: 110px; overflow-y: auto; color: #fff; font-weight: 500; margin: 15px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 400px) { .header-info { font-size: 0.85rem !important; } .label-unit { font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div id="splash" onclick="goStudy()">
        <div style="width: 85%">
            <p style="color:var(--primary); font-weight:1000; letter-spacing:8px; margin-bottom:15px; font-size:0.9rem;">1142 | V8.1 GOLDEN FINAL UPGRADE</p>
            <h1 style="font-size:2.8rem; line-height:1.2; margin:15px 0; background:linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:1000;">人際關係與協商<br><span style="font-size:2.2rem; color:var(--primary); text-shadow:0 0 20px rgba(251,191,36,0.3);">金牌滿分封神最終版</span></h1>
            <div style="background:var(--danger); color:white; padding:10px 35px; border-radius:12px; font-size:1.3rem; font-weight:900; display:inline-block; margin-top:10px;">理論動力學優化 | 啞鈴圖像定錨</div>
            <br><button class="btn-gold" style="margin-top:50px;">🏆 大獲全勝</button>
        </div>
    </div>
    <header class="header">
        <button onclick="toggleSidebar()" style="background:var(--primary); border:none; padding:12px 25px; border-radius:15px; font-weight:1000; font-size:0.9rem;">☰ 滿分索引(37)</button>
        <div class="header-info" style="color:var(--primary); font-weight:1000; font-size:1rem; text-align:center; flex:1; padding:0 10px;">優化：馬斯洛動力邏輯與啞鈴圖組織效應已注入</div>
        <div style="background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:50px; border:2px solid var(--primary); display:flex; align-items:center; gap:8px;"><input type="range" id="rate" min="0.5" max="2.0" value="1.3" step="0.1" style="width:50px; accent-color:var(--primary)"></div>
    </header>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"><div class="course-nav" id="nav"></div></aside>
        <main class="viewport">
            <div class="screen"><div id="slide-view"></div><div id="overlay-layer" style="position:absolute; inset:0; pointer-events:none; display:flex; justify-content:center; align-items:center;"></div></div>
            <div class="console">
                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1rem;" id="cat-title">-</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 37</span></div>
                <div id="lecture-content" class="text-body">。</div>
                <div class="nav-btns">
                    <button class="control-btn" onclick="prev()">⬅ 上一頁</button>
                    <button class="control-btn" onclick="next(cuI+1)">下一頁 ➡</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "解釋名詞 (25%)", title: "1. 自我概念", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["自我概念"], txt: "這是個人對自己持有的概括性看板看法。簡單說，就是定義「自己是怎樣的人」。" },
            { cat: "解釋名詞 (25%)", title: "2. 周哈里窗", img: "johari_window_modern_diagram_1776040990674.png", ls: ["周哈里窗四區"], txt: "分析自我覺察之模型。核心四區分為：開放、盲目、隱藏、與未知。" },
            { cat: "解釋名詞 (25%)", title: "3. 社會再適應量表", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["SRRS 中度生活危機"], txt: "量化壓力的工具。關鍵數據是 200 到 299 分，屬於中度生活危機。" },
            { cat: "解釋名詞 (25%)", title: "4. 月暈效應", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["月暈效應"], txt: "一種認知偏誤。因對方單一優點而產生的「以偏概全」整體正面評價。" },
            { cat: "解釋名詞 (25%)", title: "5. 戲劇理論", img: "goffman_dramaturgy_theater_stage_1776041066626.png", ls: ["戲劇理論 (高夫曼)"], txt: "將互動比喻為舞台表演。區分為前台的形象整飾，與後台的真實自我。" },
            { cat: "解釋名詞 (25%)", title: "6. 仰巴腳效應", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["仰巴腳效應"], txt: "又稱為出醜效應。能力強的人犯小錯，反而能增加親和力與吸引力。" },
            { cat: "解釋名詞 (25%)", title: "7. 象徵 (Emblem)", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["「象徵」定義"], txt: "具備特定文化定義，能直接取代口語的肢體動作，例如豎大拇指。" },
            { cat: "解釋名詞 (25%)", title: "8. 歸因 (Attribution)", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內在與外在歸因"], txt: "推論行為原因的歷程。學術上分為內在性格歸因與外在環境歸因。" },
            { cat: "解釋名詞 (25%)", title: "9. 不合理信念", img: "albert_ellis_rational_emotive_background_1775990617583.png", ls: ["艾里斯不合理信念"], txt: "對生活持有絕對化觀念。由艾里斯提出，被視為情緒困擾的根源。" },
            { cat: "解釋名詞 (25%)", title: "10. 防衛機制", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["防衛機制"], txt: "面臨挫折時採取的保護行為，核心包含合理化、投射、退化作用等表現。" },
            { cat: "解釋名詞 (25%)", title: "11. 內控性格與外控性格", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內控 vs. 外控"], txt: "內控相信努力可控制命運，一切「操之在我」；外控信命運受天命或不可抗力支配。" },
            { cat: "解釋名詞 (25%)", title: "12. 負面情感", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["負面情感傾向"], txt: "指個體容易產生焦慮、緊張或憤怒情緒狀態的一種人格穩定傾向。" },
            { cat: "解釋名詞 (25%)", title: "13. 場地獨立型與依賴型", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["場地獨立與依賴型"], txt: "獨立型不受背景干擾；依賴型判斷則易受環境資訊與他人意見影響。" },
            { cat: "解釋名詞 (25%)", title: "14. 沉思型與衝動型", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["沉思型與衝動型"], txt: "沉思型決策慢但準確度高；衝動型反應快但易產生系統性錯誤判斷。" },
            { cat: "解釋名詞 (25%)", title: "15. 環化型與簡化型認知", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["環化型與簡化型"], txt: "環化型處理資訊複雜多變；簡化型按表面字面解讀，影響溝通深度。" },
            { cat: "問答大題 (75%)", title: "16. 馬斯洛需求層次理論", img: "maslow_pyramid_stomach_to_god_1776041006784.png", ls: ["肚子世界/神仙世界"], txt: "由生理、安全、社會、自尊與自我實現組成。低層肚子世界未滿足前，高層神仙世界不具吸引力。這是理論的核心動力邏輯。" },
            { cat: "問答大題 (75%)", title: "17. 獲得健康策略：生理修復", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["睡眠、運動、飲食"], txt: "包含適度運動、平均 8 小時睡眠、均衡飲食。建議採右側臥睡覺以優化生理修復效能。" },
            { cat: "問答大題 (75%)", title: "18. 獲得健康策略：心理回彈", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["複元力、容忍力"], txt: "包含發展復原力與容忍力、發展解決能力、以及有效的壓力管理配套。" },
            { cat: "問答大題 (75%)", title: "19. 圓融人際六要訣", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["尊、笑、口、心、度、腳"], txt: "口訣為：尊、笑、口、心、度、腳。即尊重、笑臉常開、口圓、心正、度大、以及腳勤。" },
            { cat: "問答大題 (75%)", title: "20. 影響人際知覺的要素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["知覺者/被知覺者/情境"], txt: "由被知覺者外觀、知覺者動機情緒、與當時之交往情境交互形成。是知覺評價的三維核心。" },
            { cat: "問答大題 (75%)", title: "21. 知覺組織：接近與相似", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["接近性、相似性"], txt: "接近性與相似性原則意指：大腦傾向將時空近、特徵像的刺激歸類為單一整體。" },
            { cat: "問答大題 (75%)", title: "22. 知覺組織：連續與閉合", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["連續性、閉合性"], txt: "大腦具備補完機制，能在認知中將斷續的刺激內容，補全為完整且流暢的心理圖樣。" },
            { cat: "問答大題 (75%)", title: "23. 知覺產生的三步驟", img: "nonverbal_mircro_expressions_eye_1776041233563.png", ls: ["感覺/組織/評價"], txt: "分別為感覺、組織、再到評價。這是物理信號轉化為心理意義的必經之路。" },
            { cat: "問答大題 (75%)", title: "24. 知覺組織：連接性 (啞鈴)", img: "gestalt_connectedness_dumbbell_principle_1776043234567_1776051269067.png", ls: ["連接性 (啞鈴圖)"], txt: "連接性原則顯示：獨立物件若被線條連結，會被視同單一單元。這就是面授強調的啞鈴圖效應。" },
            { cat: "問答大題 (75%)", title: "25. 壓力管理的五大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["消除源/支持/認知..."], txt: "包含消除壓力源治本、發現幽默、尋求社會支持、調整認知、以及練習放鬆技巧。" },
            { cat: "問答大題 (75%)", title: "26. 影響人際吸引的因素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["情境/個人/適配"], txt: "包含空間接近的情境因素、外表能力的個人因素、以及相似互補的適配因素。" },
            { cat: "問答大題 (75%)", title: "27. 非語言溝通的五大特性", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["非語言特性"], txt: "具備模糊、持續、多重管道、情感高、與文化差異。非語言的情感訊息佔比達 93% 。" },
            { cat: "問答大題 (75%)", title: "28. 溝通分析 (TA) 狀態", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["父母/成人/兒童"], txt: "包含互補式、交錯式、與隱藏式溝通。核心依據父母 P、成人 A、兒童 C 三種自我狀態分析。" },
            { cat: "問答大題 (75%)", title: "29. 華人文化的人情與面子", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["人情/面子/三碗麵"], txt: "人情涉及情感、資源與規範。相處須重杜月笙所說的三碗麵：人面、場面、情面。" },
            { cat: "問答大題 (75%)", title: "30. 凱利三維歸因模型", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["歸因三維指標"], txt: "由區別性、一致性、普遍性這三項指標，決定歸因為人格特質或是環境境遇。" },
            { cat: "問答大題 (75%)", title: "31. 愛情三因論 (Sternberg)", img: "sternberg_love_triangle_diagram_1776041022011.png", ls: ["激情/親密/責任"], txt: "由激情、親密與責任決心構成。權重隨交往階段與承諾深度動態調整。" },
            { cat: "魔鬼數據彙整", title: "32. 非語言 93% 佔比數據", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["梅拉賓定律數據"], txt: "關鍵數據：梅拉賓定律指出，在情感溝通中，非語言訊息的傳遞效應高達 93% 。" },
            { cat: "魔鬼數據彙整", title: "33. SRRS 中度數據指標", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["200-299 中度危機"], txt: "關鍵數據：社會再適應量表分數若在 200 到 299 分區間，定義為中度生活危機。" },
            { cat: "魔鬼數據彙整", title: "34. 1.5 英尺親密距離", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["親密距離數值"], txt: "關鍵數據：親密距離規範於 1.5 英尺，約 45 公分以內。超越此界則轉換為社會距離。" },
            { cat: "魔鬼數據彙整", title: "35. 理想睡眠 8 小時原則", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["睡眠修復數據"], txt: "理想睡眠時間平均為 8 小時。具備充足睡眠才能確保生理功能完成正常的復原修復。" },
            { cat: "魔鬼數據彙整", title: "36. 考場戰術與學名標籤", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["絕對不空白原則"], txt: "大標題優先寫出，解釋名詞注重學術術語與學名。嚴禁留白，是達成高分的必備底限。" },
            { cat: "終極反射清單", title: "37. 12 核心標籤 Cheat Sheet", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["終極反射清單"], txt: "自我看周哈里。健康看生理心理雙軌。認知看三步驟。組織看連接啞鈴。壓力看五三二。人際看六要。溝通看九三比。" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat + " | " + studyPlan[i].title;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].ls);
            document.getElementById('lecture-content').innerText=studyPlan[i].txt;
            const u=new SpeechSynthesisUtterance(studyPlan[i].title + "。 " + studyPlan[i].txt); // 修正停頓
            u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
