    <script>
        const studyPlan = [
            { cat: "【名詞：過度學習】", title: "1. 周哈里窗 (Johari Window)", img: "johari_window_modern_diagram_1776040990674.png", ls: ["題名：周哈里窗"], txt: "標準答案：分析自我覺察與溝通之模型。四大區域為：開放區（己知他知）、盲目區（己不知他知）、隱藏區（己知他不知）、未知區（己不知他不知）。操作核心：透過自我袒露縮小隱藏區，透過他人回饋縮小盲目區。" },
            { cat: "【名詞：過度學習】", title: "2. 內控與外控性格", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["題名：內/外控性格"], txt: "標準答案：指個體對行為成敗原因的歸納傾向。內控者相信一切操作在我，可透過努力控制命運。外控者視成敗受第三者（命運、天、神）控制。中國人多信天命，屬典型外控歸論。核心邏輯在於命運掌握權之所在。" },
            { cat: "【名詞：過度學習】", title: "3. 仰巴腳效應 (Pratfall Effect)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["題名：仰巴腳效應"], txt: "標準答案：指能力卓越者若偶爾犯下平庸小錯誤，反而能增加人性化親和力與吸引力。此效應僅對能力強者有效，平庸者犯錯只會降低吸引力。其心理機制在於完善形象與瑕疵產生的對比美感。 " },
            { cat: "【名詞：過度學習】", title: "4. 月暈效應 (Halo Effect)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["題名：月暈效應"], txt: "標準答案：認知偏誤之一。指知覺者根據對方的單一顯著優點（如外貌佳），而盲目推論其餘人格特質（如誠實、聰明）亦同樣優秀，產生以點帶面的正面評價。反向評價偏誤則稱為角效應。" },
            { cat: "【名詞：過度學習】", title: "5. 印象整飾與戲劇理論", img: "goffman_dramaturgy_theater_stage_1776041066626.png", ls: ["題名：印象整飾"], txt: "標準答案：個體意圖控制他人對自己知覺之歷程。高夫曼視社會為舞台，互動為表演。前台指在他人面前展現符合期待之形象；後台指展現私密且真實之自我。旨在維修個人尊嚴與公共形象之穩定一致。" },
            { cat: "【名詞：過度學習】", title: "6. 歸因原則 (加大法則與折扣法則)", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["題名：歸因原則"], txt: "標準答案：加大法則指行為在阻力、限制下仍發生，會加強對該核心因素之歸因。折扣法則指行為原因若被其他更具說服力之外部因素（如強迫、誘因）取代，則原始動機之歸因會被削弱或扣分。" },
            { cat: "【名詞：過度學習】", title: "7. 社會再適應量表 (SRRS)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["題名：SRRS 量表"], txt: "標準答案：量化壓力對身心健康影響之工具。數據定錨：200至299分屬中度生活危機，300分以上為高度危機。功能：透過生活事件變動分數，預測未來兩年內引發重大身心疾病與危機之風險機率。 " },
            { cat: "【名詞：過度學習】", title: "8. 艾里斯不合理信念 (ABC)", img: "albert_ellis_rational_emotive_background_1775990617583.png", ls: ["題名：不合理信念"], txt: "標準答案：理情行為療法核心。指個體對事件抱持絕對化要求（如我必須、一定要）或災難化思考。修正邏輯：將絕對語句轉化為相對要求的期許（如我希望），能顯著減少焦慮並提升行為適應性。 " },
            { cat: "【名詞：過度學習】", title: "9. 防衛機制 (Defense Mechanism)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["題名：防衛機制"], txt: "標準答案：個體面臨焦慮時潛意識採取之自我保護手段。包含：合理化（酸葡萄心理找藉口）、投射（將缺點推給他人）、退化（幼稚化撒嬌）、幻想（白日夢補償價值感）。旨在維持暫時的心理平衡與自尊感。" },
            { cat: "【名詞：過度學習】", title: "10. 核心特質與印象形成", img: "nonverbal_mircro_expressions_eye_1776041233563.png", ls: ["題名：核心特質"], txt: "標準答案：指在知覺過程中比重最高、足以影響整體組織印象之訊息。實驗證明「熱忱與冷漠」為核心特質，「粗魯與禮貌」則為次要特質。核心特質的改變會直接翻轉整體知覺評價之結論。" },
            { cat: "【問答：強迫連結】", title: "11. 馬斯洛需求層次理論", img: "maslow_pyramid_stomach_to_god_1776041006784.png", ls: ["題：馬斯洛五層次"], txt: "標準答案：1.生理(生存)。2.安全(保障)。3.社會(愛與歸屬)。4.自尊(成就)。5.自我實現(潛能)。邏輯：具階梯與層級屬性。滿足肚子世界之匱乏需求後，始有驅動力追求神仙世界之成長需求。" },
            { cat: "【問答：強迫連結】", title: "12. 獲得健康的兩大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["題：獲得健康策略"], txt: "標準答案：策略一生理修復：運動(333原則)、睡眠(8小時/建議右側臥有利排毒)、均衡飲食。策略二心理回彈：發展複元力(Resilience)、提升問題解決能力、建立社會支持網絡進行壓力緩釋管理。" },
            { cat: "【問答：強迫連結】", title: "13. 圓融人際六要訣", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["題：圓融六要訣"], txt: "標準答案：尊(頭軟/尊重)、笑(面笑/感恩)、口(口圓/讚美)、心(心正/菩薩心)、度(肚大/包容)、腳(腳勤/積極好觀眾)。此為管理個人利益導向與情緒系統，達成人際圓潤之綜合智慧心法標題。" },
            { cat: "【問答：強迫連結】", title: "14. 人際知覺產生的過程", img: "nonverbal_mircro_expressions_eye_1776041233563.png", ls: ["題：知覺產生過程"], txt: "標準答案：過程分為三階段：感覺(五官接收刺激) ➔ 組織(分類整理與結構化) ➔ 評價(賦予意義並形成整體印象)。知覺結論受被知覺者外觀、知覺者動機偏見與互動情境之交互影響而主觀產生。" },
            { cat: "【問答：強迫連結】", title: "15. 知覺組織五原則 (格式塔)", img: "gestalt_connectedness_dumbbell_principle_1776043234567_1776051269067.png", ls: ["題：知覺組織五原則"], txt: "標準答案：接近性(距離近視為同一組)、相似性(特徵像視為同一組)、連續性、閉合性(自動補全殘邊)。以及連接性，即「啞鈴圖效應」，指獨立物件若被線條連結，會被知覺鎖定為單一的功能單元。" },
            { cat: "【問答：強迫連結】", title: "16. 壓力管理與肌肉鬆弛技巧", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["題：壓力管理策略"], txt: "標準答案：管理法：消(除源)、幽(默)、社(支持)、調(認知)、放(鬆)。肌肉逐步鬆弛法：鎖緊全身肌肉（指節、手部、全身）至極限高度緊張狀態後，突然一下子完全鬆開。透過此物理切換達成生理放鬆之效果。" },
            { cat: "【問答：強迫連結】", title: "17. 被知覺者的對比性原則", img: "heider_pox_balance_triad_1776041038324.png", ls: ["題：知覺對比性"], txt: "標準答案：知覺受背景參照影響。190公分者站在矮人群體中顯得極高(鶴立雞群)；但站於NBA球員群體中則顯得矮小。此原理證明知覺非絕對數值，而是與背景條件交互產生之相對評價結果。" },
            { cat: "【問答：強迫連結】", title: "18. TA 溝通分析：PAC 三狀態與型態", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["題：TA 溝通分析"], txt: "標準答案：三狀態為父母態 P(權威)、成人態 A(理性)、兒童態 C(衝動)。溝通型態：互補式(順暢平順)、交錯式(狀態背離致衝突斷裂)、隱藏式(心理遊戲與多層次隱意)。目標為建立 A-A 理性對位溝通。" },
            { cat: "【問答：強迫連結】", title: "19. 華人文化的人情與面子深度解析", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["題：華人人情面子"], txt: "標準答案：三碗麵最難吃：人面、場面、情面。人情具備情緒、資源與社會規範三元內涵。處事原則遵循：情 ➔ 理 ➔ 法 之次序，強調關係和諧與情意連結，與西方法法治契約文化產生明顯區隔。 " },
            { cat: "【問答：強迫連結】", title: "20. 影響人際吸引的標準因素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["題：人際吸引要素"], txt: "標準答案：要素一：情境要素（空間接近與高熟悉度/近水樓臺）。要素二：個人要素（外貌魅力、個性、能力出眾程度）。要素三：適配要素（態度、價值觀之相似性或互補性）。核心追求報償與滿足感之平衡。" },
            { cat: "【問答：強迫連結】", title: "21. 凱利三維歸因模型數據指針", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["題：凱利歸因模型"], txt: "標準答案：區別性（針對不同對象）、一致性（不同時間點）、普遍性（他人之反應）。若三者皆高則傾向歸因為外部情境；若僅一致性高而其餘低，則強烈傾向歸因為當事人內部穩定人格特質。" },
            { cat: "【正考定錨：生理反射】", title: "22. SRRS 數據指標與風險預測", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["題名：SRRS 定錨"], txt: "標準答案：中度生活危機區間 200 至 299 分。預測未來兩年內引發重大身心危機。150分病發率30%，300分病發率高達80%。這是閉卷答題時區分專業與平庸的關鍵量化標題數據。" },
            { cat: "【正考定錨：生理反射】", title: "23. 親密空間與梅拉賓非語言定律", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["題名：人距與非言比例"], txt: "標準答案：親密距離為 1.5 英尺 (約 45 公分) 以內。梅拉賓定律：情感訊息 93% 源於非語言管道（表情 55% + 語調 38%），僅 7% 源於文字內容。數據證明非語言為真實情感傳遞之絕對核心。" },
            { cat: "【正考定錨：生理反射】", title: "24. 應考戰術：大標對位與不留空白", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["題名：終極正考戰術"], txt: "標準答案：大標正確即給分核心。不論題目變體，大腦必須先反射出生理層次的術語大標。內容用囉唆且邏輯一致的教科書答案填滿。絕對不可留白，維持 100% 卷面覆蓋率以確保全面 point collection。" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat + " | " + studyPlan[i].title;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].ls);
            document.getElementById('lecture-content').innerText=studyPlan[i].txt;
            const u=new SpeechSynthesisUtterance(studyPlan[i].title + "。 " + studyPlan[i].txt); 
            u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
