    <script>
        const studyPlan = [
            { cat: "【解釋名詞：老師給分點】", title: "1. 周哈里窗 (Johari Window)", img: "johari_window_modern_diagram_1776040990674.png", ls: ["己知他知 / 己不知他知 / ..."], txt: "面授核心：分析自我覺察之模型。老師提示：不必照本宣科，懂意思最重要。包含：開放、盲目、隱藏、未知四區域。提升關係邏輯：透過「自我袒露」縮小隱藏，透過「他人回饋」縮小盲目。" },
            { cat: "【解釋名詞：老師給分點】", title: "2. 內控與外控性格", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["命運天意(第三者)是外控"], txt: "面授重點：內控者相信一切操作在我，透過努力控制情緒。外控者視成敗受強大的「第三者（命運、天、神）」控制。這是中國文化中相信命運的典型表現。老師：一切成果不在我，而是在別人（第三者）。" },
            { cat: "【解釋名詞：老師給分點】", title: "3. 仰巴腳效應 (Pratfall Effect)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["李麗勤 Ng 實例 | 跌落神壇"], txt: "面授案例：神壇上的精英若犯小錯，反而增加親和力。老師舉例：演員李麗勤從不 Ng，一旦出錯全場歡騰，因為神變成了人。注意：能力強者犯錯才有吸引力，平庸者犯錯只是無能。 " },
            { cat: "【解釋名詞：老師給分點】", title: "4. 月暈效應 (Halo Effect)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["俊男美女 = 工作能力強？"], txt: "面授解惑：單一顯著優點導致整體正面評價。例如：看到帥哥美女就推論他學歷高、辦事能力強，雖然兩者並無絕對關係。反向為角效應。老師：這是一種過高或過低的認知估算。" },
            { cat: "【解釋名詞：老師給分點】", title: "5. 印象整飾與戲劇理論", img: "goffman_dramaturgy_theater_stage_1776041066626.png", ls: ["社會互動就是一種演戲"], txt: "面授邏輯：戈夫曼將社會互動比擬為演戲。個體控制他人對己知覺。前台（表演區）：表現符合期望。後台（私密區）：展現真實、不需表演的自我。老師：每個人都有自己的戲目，隨情況不同而差異。" },
            { cat: "【解釋名詞：老師給分點】", title: "6. 歸因原則：加大與折扣", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["下課幫老師做事是加大法則"], txt: "面授細節：加大法則(Augmenting)：平常大家都在做不算，但在阻力下做才算（如全班走光你留下來幫老師）。折扣法則(Discounting)：行為原因被其他更有說服力的外部誘因抵銷（如辯論賽贊成死刑是因為抽到正方）。" },
            { cat: "【解釋名詞：老師給分點】", title: "7. 非語言溝通特質", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["打叉叉 / 盯著看 3 分鐘"], txt: "面授演示：非語言具備模糊性、持續性。老師舉例：小朋友吵鬧時不要吼，只要「盯著他看 3 分鐘」，未知產生的恐懼會讓他安靜。訊息佔比：93% 由表情與聲調決定，文字僅佔 7%。" },
            { cat: "【解釋名詞：老師給分點】", title: "8. 艾里斯不合理信念 (ABC)", img: "albert_ellis_rational_emotive_background_1775990617583.png", ls: ["絕對化(Must)語句修正"], txt: "教科書標準：理情行為療法。核心在於絕對化要求（我必須、一定要）。修正為「我希望、我期許」能顯著降低心理壓力。老師強調：災難化思考是情緒失能的主因。 " },
            { cat: "【解釋名詞：老師給分點】", title: "9. 防衛機制 (Defense Mechanism)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["合理化(酸葡萄) / 退化(撒嬌)"], txt: "面授重點：壓抑、轉移、合理化。老師案例：合理化是為失敗找正當藉口；退化作用（撒嬌、地上耍賴）是成人試圖回到嬰幼兒的安全感。幻想作用（爸爸買給你）是追求暫時的心理平衡。" },
            { cat: "【解釋名詞：老師給分點】", title: "10. 核心特質與印象形成", img: "nonverbal_mircro_expressions_eye_1776041233563.png", ls: ["熱忱 vs 冷漠是核心特質"], txt: "面授精華：這並非由多數特質拼湊，而是隨單一關鍵點轉移。老師：專櫃櫃姐即使不漂亮，但若展現「熱忱」等核心特質，業績通常最好。實驗證明：熱忱/冷漠是核心，粗魯/禮貌則是次要。" },
            { cat: "【問答全量解密】", title: "11. 馬斯洛需求層次理論", img: "maslow_pyramid_stomach_to_god_1776041006784.png", ls: ["肚子吃飽始有神仙追求"], txt: "面授必考：五層需求：生理、安全、社會、自尊、自我實現。邏輯：具階梯性與層級性。老師名言：基本生存（肚子世界）沒滿足，奢談高層次（神仙世界）的吸引力。這是學習這門課必須記憶的 12 個標題字。" },
            { cat: "【問答全量解密】", title: "12. 獲得健康的兩大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["右側臥 / 333 / 心理複元力"], txt: "面授最詳盡：生理修復：運動(333)、睡眠 8 小時(老師強烈建議「右側臥」利於生理排毒修復)。心理回彈：發展複元力(Resilience)、提升適應力管理。這是作業第 3 題的標準滿分答案。" },
            { cat: "【問答全量解密】", title: "13. 圓融人際六要訣 (老師私房題)", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["尊孝口心度腳 | 面授強烈暗示"], txt: "面授特仕版：尊(頭軟/尊重)、笑(面笑/感恩)、口(口圓/讚美)、心(心正/菩薩心)、度(肚大/包容)、腳(腳勤/準備當好觀眾/隨時準備幫忙)。這是考古題少見但面授花費極多時間叮嚀的關鍵。" },
            { cat: "【問答全量解密】", title: "14. 人際知覺產生的過程", img: "nonverbal_mircro_expressions_eye_1776041233563.png", ls: ["感覺 ➔ 組織 ➔ 評價"], txt: "面授分解：1.感覺(五官接收)。2.組織(分類整理/印度古龍水案例)。3.評價(形成印象/整體結論)。老師：看一個人是美女還是丑八怪，就是經過這三步的整理結果。" },
            { cat: "【問答全量解密】", title: "15. 知覺組織五原則 (格式塔)", img: "gestalt_connectedness_dumbbell_principle_1776043234567_1776051269067.png", ls: ["接近/相似/連續/閉合/連接"], txt: "面授實證：接近(近則同組)、相似(像則同組)。老師強調：閉合性指自動補全殘缺線條。最重點：連接性「啞鈴效應」，獨立圓圈若被線條連結，會被知覺為一個單一的啞鈴單元。" },
            { cat: "【問答全量解密】", title: "16. 壓力管理與放鬆技巧", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["消除源 / 社會支持 / 逐步鬆弛"], txt: "面授實務：消、幽、社、調、放。老師傳授：肌肉逐步鬆弛法。先從四肢開始，全身肌肉鎖到最緊、最緊張，然後「突然一下子鬆開」。反覆練習幾次可大幅排解登台緊張。另外還有腹式呼吸法。" },
            { cat: "【問答全量解密】", title: "17. 被知覺者對比較的對比性", img: "heider_pox_balance_triad_1776041038324.png", ls: ["站 NBA 旁邊就不高了"], txt: "面授生動案例：知覺具有對比性（甲乙圓圈大小錯覺）。老師：190 公分的人站在矮子中好高(鶴立雞群)，但站在 NBA 球星旁邊又顯得好矮。這說明我們對人的知覺受「參照背景」影響。" },
            { cat: "【問答全量解密】", title: "18. TA 溝通分析：PAC 三形態", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["互補(順) / 交錯(斷) / 隱藏(術)"], txt: "面授經典：互補(平行/溝通順暢)。交錯(狀態背離/衝突斷裂/如我想講理 A，你卻跟我鬧脾氣 C)。隱藏(心理遊戲/話中有話)。人格三態：父母(威嚴/教導)、成人(理性數據)、兒童(衝動依賴)。" },
            { cat: "【問答全量解密】", title: "19. 華人的人情與面子 (杜月笙)", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["人情債最難還 | 三碗麵"], txt: "面授核心：人生三碗麵最難吃：人面、場面、情面。人情具備情緒、資源、規範三意涵。老師：錢好還，人情再難還。處事平衡點：情 ➔ 理 ➔ 法，展現與西方契約意識不同的華人社交智慧。 " },
            { cat: "【問答全量解密】", title: "20. 影響人際吸引的因素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["情境接近 / 個人魅力 / 適配互補"], txt: "面授歸納：情境、個人、適配。老師：情境指空間接近(近水樓臺)。個人指外貌與親和力。適配指相似性(物以類聚)或互補性。核心邏輯：我們喜歡回饋感高且價值對位的人。 " },
            { cat: "【數據與戰術：面授定錨】", title: "21. SRRS 量化數據考點", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["200 - 299 中度危機點"], txt: "面授指示：200 到 299 分是預測未來兩年重大身心疾病機率的分界。這是考試中必須提及的標準數據。用於量化生活事件（如喪偶、結婚）對人體帶來的壓力負載。 " },
            { cat: "【數據與戰術：面授定錨】", title: "22. 親密距離與非語言比例", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["親密區 1.5 呎 / 93% 定律"], txt: "面授數據：1.5 呎 (45cm) 是最親近防線。梅拉賓定律：表情(55%) + 聲調(38%)。老師提醒：訊息不僅是文字，那剩下的 93% 非語言才是情感交流的靈魂。這也是答題的專業錨點。 " },
            { cat: "【數據與戰術：面授定錨】", title: "23. 應考戰術：大標優先法", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["大標題對了就給分"], txt: "老師親自交代：不開書考，給分很寬。解釋名詞只要意思對七八成就給滿分。問答題只要「大眼分明」（標題正確），內容略有偏差或稍微簡潔均不扣分。一定要寫出專業術語的大標題。 " },
            { cat: "【數據與戰術：面授定錨】", title: "24. 應考戰術：絕對不留白", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["補考會考剩下的重要題目"], txt: "老師戰術：絕對不可留白。只要填滿，老師就會想辦法在字裡行間幫你找關鍵字給分。另外注意：若錯過正考，補考通常會從這 12-14 個重點中挖出「正考沒考過的那幾題」來考。 " }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat + " | " + studyPlan[i].title;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].ls);
            document.getElementById('lecture-content').innerText=studyPlan[i].txt;
            const u=new SpeechSynthesisUtterance(studyPlan[i].title + "。 " + studyPlan[i].txt); 
            u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
