<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>人際關係與協商 | 終極囉唆絕對防禦版 V12.0</title>
    <style>
        :root { 
            --primary: #fbbf24; --danger: #ef4444; --bg: #020617; --text: #f8fafc; 
            --safe-top: env(safe-area-inset-top, 50px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .header { 
            position: fixed; top: 0; left: 0; right: 0; padding-top: var(--safe-top); height: calc(88px + var(--safe-top));
            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; 
            padding-left: calc(15px + env(safe-area-inset-left)); padding-right: calc(15px + env(safe-area-inset-right)); z-index: 2000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
        }
        .wrapper { display: flex; height: 100%; padding-top: calc(88px + var(--safe-top)); box-sizing: border-box; }
        .sidebar { 
            position: fixed; left: -110%; top: 0; bottom: 0; width: 320px; background: rgba(11, 15, 26, 0.99); border-right: 1px solid rgba(251, 191, 36, 0.3); 
            z-index: 3000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding-top: calc(100px + var(--safe-top)); backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
        }
        .sidebar.open { left: 0; box-shadow: 40px 0 100px rgba(0,0,0,1); }
        .course-nav { height: 100%; overflow-y: auto; padding: 25px; }
        .nav-cat { font-size: 0.75rem; color: var(--primary); margin: 30px 0 15px 5px; font-weight: 950; border-left: 5px solid var(--primary); padding-left: 12px; }
        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.92rem; background: rgba(255,255,255,0.06); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 1000; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(240px + var(--safe-bottom)); }
        .screen { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #slide-view { width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .label-unit { position: absolute; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: var(--primary); padding: 15px 35px; border-radius: 20px; font-weight: 1000; font-size: 1.5rem; border: 3px solid var(--primary); box-shadow: 0 30px 80px rgba(0,0,0,0.8); z-index: 1001; text-align: center; max-width: 85%; }
        .console { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 23, 42, 0.98); padding: 22px; 
            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.15rem; line-height: 1.5; height: 145px; overflow-y: auto; color: #fff; font-weight: 400; margin: 10px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 10px 20px; border-radius: 12px; font-size: 0.9rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 400px) { .header-info { font-size: 0.8rem !important; } .label-unit { font-size: 1.1rem; } .text-body { font-size: 1rem; } }
    </style>
</head>
<body>
    <div id="splash" onclick="goStudy()">
        <div style="width: 85%">
            <p style="color:var(--primary); font-weight:1000; letter-spacing:8px; margin-bottom:15px; font-size:0.9rem;">1142 | V12.0 THE ABSOLUTE DEFENSE EDITION</p>
            <h1 style="font-size:2.8rem; line-height:1.2; margin:15px 0; background:linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:1000;">人際關係與協商<br><span style="font-size:2.2rem; color:var(--primary); text-shadow:0 0 20px rgba(251,191,36,0.3);">終極囉唆透視版</span></h1>
            <div style="background:var(--danger); color:white; padding:10px 35px; border-radius:12px; font-size:1.2rem; font-weight:900; display:inline-block; margin-top:10px;">數據穿透 | 封頂肉量 | 絕對不掛</div>
            <br><button class="btn-gold" style="margin-top:50px;">🏆 封神凱旋</button>
        </div>
    </div>
    <header class="header">
        <button onclick="toggleSidebar()" style="background:var(--primary); border:none; padding:12px 25px; border-radius:15px; font-weight:1000; font-size:0.9rem;">☰ 全量對位(24)</button>
        <div class="header-info" style="color:var(--primary); font-weight:1000; font-size:1rem; text-align:center; flex:1; padding:0 10px;">三方數據穿透：作業、考古、面授全量整合</div>
        <div style="background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:50px; border:2px solid var(--primary); display:flex; align-items:center; gap:8px;"><input type="range" id="rate" min="0.5" max="2.0" value="1.2" step="0.1" style="width:40px; accent-color:var(--primary)"></div>
    </header>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"><div class="course-nav" id="nav"></div></aside>
        <main class="viewport">
            <div class="screen"><div id="slide-view"></div><div id="overlay-layer" style="position:absolute; inset:0; pointer-events:none; display:flex; justify-content:center; align-items:center;"></div></div>
            <div class="console">
                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1rem;" id="cat-title">-</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 24</span></div>
                <div id="lecture-content" class="text-body">。</div>
                <div class="nav-btns">
                    <button class="control-btn" onclick="prev()">⬅ 上一頁</button>
                    <button class="control-btn" onclick="next(cuI+1)">下一頁 ➡</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "【名詞深度定義】", title: "1. 周哈里窗 (Johari Window)", img: "johari_window_modern_diagram_1776040990674.png", ls: ["坦露縮小隱藏 / 回饋縮小盲目"], txt: "分析自我覺察之模型。開放區（己知、他知）、盲目區（己不知、他知）、隱藏區（己知、他不知）、未知區（己不知、他不知）。封神關鍵：提升關係的邏輯是透過「自我袒露」來縮小隱藏區，透過「他人回饋」來縮小盲目區。" },
            { cat: "【名詞深度定義】", title: "2. 社會再適應量表 (SRRS)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["數據：200-299 中度危機"], txt: "由荷姆斯（Holmes）提出，量化個體因生活事件改變承受之壓力。預測未來兩年內引發重大身心疾病的風險。死穴數據：200 到 299 分屬中度生活危機；300 分以上為高度危機。" },
            { cat: "【名詞深度定義】", title: "3. 仰巴腳效應 (Pratfall Effect)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["能力強者犯錯 = 增加吸引力"], txt: "又稱出醜效應。指能力卓越、形象完美的人，若偶爾犯下平庸小錯誤（如打翻水），反而會增加其人性化的親和力，提升吸引力。注意：此項僅對「能力強者」有效，平庸者犯錯則視為無能。" },
            { cat: "【名詞深度定義】", title: "4. 月暈效應 (Halo Effect)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["以點帶面的正面評價偏誤"], txt: "常見知覺偏誤。指知覺者傾向根據對方的單一顯著優點（如外貌），而盲目推論其餘人格特質（如誠實、善良）也同樣優秀，產生以偏概全的正面評價。反之為角效應。" },
            { cat: "【名詞深度定義】", title: "5. 戲劇理論 (Dramaturgy)", img: "goffman_dramaturgy_theater_stage_1776041066626.png", ls: ["高夫曼 | 前台 vs 後台"], txt: "戈夫曼提出，將社會互動比喻為舞台表演。個體在互動中進行印象整飾，區分為：前台（在他人面前表現符合規格角色期望的行為）與後台（展現私密、真實且不需表演的自我）。" },
            { cat: "【名詞深度定義】", title: "6. 歸因 (Attribution)", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內在性格 vs 外在環境"], txt: "個體在觀察自己或他人行為後，推論其原因的認知歷程。可分為：內在歸因（如性格、能力、情緒）與外在環境歸因（如任務難度、運氣、社會壓力）。正確歸因有助於預測未來行為。" },
            { cat: "【名詞深度定義】", title: "7. 艾里斯不合理信念 (ABC)", img: "albert_ellis_rational_emotive_background_1775990617583.png", ls: ["修正「絕對化要求」語句"], txt: "理情行為療法核心。指個體對生活事件持有絕對化要求（如我必須、一定要）或災難化的觀念。會導致嚴重的心理失護與情緒失能。需轉向為相對要求的願望語法。" },
            { cat: "【名詞深度定義】", title: "8. 防衛機制 (Defense Mechanism)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["潛意識保護自我價值感"], txt: "個體面臨挫折或焦慮時，潛意識為了保護自我價值感而採取的調節反應。常見：合理化（為失敗找藉口）、投射（將缺點推給他人）、退化（表現幼稚行為）。機制能暫時減壓但無法解決根源。" },
            { cat: "【名詞深度定義】", title: "9. PAC 狀態與 TA 分析", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["父母態 / 成人態 / 兒童態"], txt: "由伯恩提出。人格包含：父母態 P（威嚴教導）、成人態 A（理性處理事實數據）、兒童態 C（情感、衝動、依賴）。理想溝通應致力於成人對成人的理智對位 A-A。" },
            { cat: "【名詞深度定義】", title: "10. 自我概念 (Self-Concept)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["多維、動態、來源多樣"], txt: "個人對自己持有的概括性看板與看法。包含特質、能力、價值觀認知。來源受「重要他人」（特定關係）反映評價，以及「一般他人」（社會規則）內化影響。是人際交流的內核。" },
            { cat: "【問答全量解析】", title: "11. 馬斯洛需求層級理論", img: "maslow_pyramid_stomach_to_god_1776041006784.png", ls: ["滿足肚子始追求神仙"], txt: "五層次：生理 ➔ 安全 ➔ 社會 ➔ 自尊 ➔ 自我實現。邏輯深度：需求具備階梯性。滿足了低層次肚子世界後，始產生高層次神仙世界的發動機驅動力。基本生存未滿足前，高層不具吸引力。" },
            { cat: "【問答全量解析】", title: "12. 獲得健康的兩大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["生理修復 + 心理回彈"], txt: "一：生理修復。含適度運動(333原則)、理想睡眠 8 小時(建議右側臥利於排毒)、均衡飲食。二：心理回彈。含發展複元力（恢復力與容忍度）、發展解決能力、建立社會支持網絡管理。" },
            { cat: "【問答全量解析】", title: "13. 圓融人際六要訣 (面授題)", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["尊孝口心度腳 | 囉唆版口訣"], txt: "尊(頭軟)：尊重傾聽。笑(面笑)：感恩與笑臉。口(口圓)：語帶溫潤多讚美。心(心正)：真心誠意。度(肚大)：包容接納不評判。腳(腳勤)：主動關懷好觀眾（腳要蹲）。這是老師暗示加分重點。" },
            { cat: "【問答全量解析】", title: "14. 知覺產生步驟與組織原則", img: "nonverbal_mircro_expressions_eye_1776041233563.png", ls: ["感覺➔組織➔評價 | 啞鈴效應"], txt: "步驟：感覺接收 ➔ 組織整理 ➔ 評價賦義。組織五原則：接近、相似、連續、閉合。面授補充：連接性原則，指獨立物件被線條連結會視為單元，即老師口中解釋知覺組織最鮮活的「啞鈴圖效應」。" },
            { cat: "【問答全量解析】", title: "15. 壓力管理的五大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["消除源 / 幽默 / 支持 / 認知"], txt: "一、消除壓力源（治本法）。二、發現幽默轉換情緒。三、尋求社會支持網絡協助。四、調整認知評價（核心：改變對事件看法）。五、練習生理放鬆技巧如腹式呼吸。目標是預防系統崩解。" },
            { cat: "【問答全量解析】", title: "16. 非語言溝通特質與數據", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["情感訊息 93% 定律"], txt: "數據：梅拉賓定律。情感訊息佔比：7% 文字 + 38% 語音語調 + 55% 表情肢體。結論：非語言管道在高情境溝通中佔比高達 93%。具備模糊、持續、文化差異明顯等特質。" },
            { cat: "【問答全量解析】", title: "17. TA 溝通分析三種型態", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["平行 / 交錯 / 隱藏"], txt: "一：互補式，平行順暢持久。二：交錯式，狀態錯位（如我想講事實 A，你跟我鬧情緒 C），致引發衝突或溝通斷裂。三：隱藏式，話中有話帶心理遊戲，包含多層次隱含社會背景。理想是 A-A 交流。" },
            { cat: "【問答全量解析】", title: "18. 華人文化的人情與面子", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["人情面子 | 杜月笙三碗麵"], txt: "人情：社會資源與規範感。面子：聲望地位指標。面授引用名言：人生難吃三碗麵：人面、場面、情面。處事原則是兼顧情、理、法。強調關係維護重於純粹法規範意識，展現社交智慧層次。" },
            { cat: "【問答全量解析】", title: "19. 影響人際吸引的因素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["接近 / 外表 / 相似互補"], txt: "一情境因素：空間接近、高熟悉感（曝光效應）。二個人因素：外貌魁力、能力仰巴腳（優秀者的小誤區）。三適配因素：態度與價值觀相似性、需求互補性。核心追求獎賞平衡滿足。" },
            { cat: "【數據定錨清單】", title: "20. SRRS 數據指標", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["200-299 中度危機閾值"], txt: "中度生活危機區間 200 到 299 分。預測未來兩年內引發身心疾病風險。300 分以上為高度風險，需立即進行壓力管理干預以預防重病。" },
            { cat: "【數據定錨清單】", title: "21. 親密距離與數據", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["1.5 英尺 (45 公分)"], txt: "霍爾空間區域學資料。親密距離為 0 至 45 公分以內。非語言溝通中，侵入此帶易引發防禦不安感。是界定關係親疏之具體空間標籤。 " },
            { cat: "【數據定錨清單】", title: "22. 梅拉賓 93% 情感佔比", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["表情與聲調的力量"], txt: "重要反射數據：情感互動中表情佔 55%、聲調佔 38%、文字僅佔 7%。以此證明「非語言管道」佔總體情感傳遞影響力之 93%。" },
            { cat: "【最後保命心法】", title: "23. 應考戰術：大標優先", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["大標題對了就給分"], txt: "答題戰術：問答大題守住結構大標（如圓融六要訣的六個字）。內容用實務經驗囉唆充實。解釋名詞注重定義關鍵字（如兩年內、中度危機）。" },
            { cat: "【最後保命心法】", title: "24. 應考戰術：絕對不空白", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["100% 答題率絕對防線"], txt: "最後叮嚀：絕對不留白。若忘記精確標題，請用意譯（如獵物吃飽例子說明馬斯洛）。只要有邏輯理說且填滿卷面，基本分數即到手。" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat + " | " + studyPlan[i].title;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].ls);
            document.getElementById('lecture-content').innerText=studyPlan[i].txt;
            const u=new SpeechSynthesisUtterance(studyPlan[i].title + "。 " + studyPlan[i].txt); 
            u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
