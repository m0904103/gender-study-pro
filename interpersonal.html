    <script>
        const studyPlan = [
            { cat: "基礎概念", title: "1. 人際關係定義", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["廣義與狹義定義"], txt: "是指人與人之間交互影響的社會歷程。狹義指同才與同事之互動；廣義涉及整體社會影響歷程。" },
            { cat: "基礎概念", title: "2. 溝通定義", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["溝通的正式定義"], txt: "經由語言或非語言管道，將意見、態度、情感傳遞給對方的歷程。訊息交流是維持關係的核心要素。" },
            { cat: "基礎概念", title: "3. 溝通歷程模式", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["發送/管道/噪音/回饋"], txt: "溝通要素包含：傳送者、信息、管道、接收者。噪音是干擾效能的變項，回饋則確保訊息解碼正確。" },
            { cat: "自我覺察", title: "4. 周哈里窗 (Johari Window)", img: "johari_window_modern_diagram_1776040990674.png", ls: ["周哈里窗四個區域"], txt: "分析自我覺察之模型。包含四個主要區域：開放區、盲目區、隱藏區、以及未知區。提升自我覺察的關鍵考點。" },
            { cat: "自我覺察", title: "5. 艾里斯 10 大不合理信念", img: "albert_ellis_rational_emotive_background_1775990617583.png", ls: ["艾里斯不合理信念"], txt: "情感困擾的根本原因。包含：要求樣樣精通才有價值、事情不如意就很糟糕、以及過度誇大問題的嚴重性等偏誤。" },
            { cat: "自我覺察", title: "6. 自我概念 (Self-Concept)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["自我概念學術定義"], txt: "個人對自己持有的概括性看法，即定義「我是怎樣的人」。受他人評價、社會規範與自我內省的長期影響。" },
            { cat: "人格/認知", title: "7. 內控性格 vs. 外控性格", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內控 vs. 外控性格"], txt: "內控者相信個人努力可控制命運。外控者相信命運受天命、神等第三者控制。外控性格常伴隨較高的壓力感。" },
            { cat: "人格/認知", title: "8. 負面情感 (Negative Affect)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["負面情感傾向"], txt: "指個體容易產生焦慮、緊張、憂慮或憤怒情緒狀態的人格特質。具備此傾向者，應激反應通常較為強烈。" },
            { cat: "人格/認知", title: "9. 場地獨立與依賴型", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["場地獨立與依賴型"], txt: "知覺風格分析。場地獨立型不受周遭背景干擾；場地依賴型易受環境資訊與他人意見左右感官與邏輯判斷。" },
            { cat: "人格/認知", title: "10. 沉思型與衝動型", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["沉思型與衝動型"], txt: "決策速度風格。沉思型決策節奏慢但準確度高；衝動型反應快但易產生錯誤判斷。反映大腦處理訊息的特質。" },
            { cat: "人格/認知", title: "11. 環化型與簡化型認知", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["環化型與簡化型"], txt: "資訊處理層次。環化型傾向將訊息意義複雜化，易產生過度解讀；簡化型按字義直接處理，溝通流程較為單一。" },
            { cat: "知覺過程", title: "12. 知覺產生三步驟", img: "nonverbal_mircro_expressions_eye_1776041233563.png", ls: ["知覺產生三步驟"], txt: "認知三路徑：感覺(五官接受物理刺激) ➔ 組織(邏輯分類與簡化) ➔ 評價(賦予意義並形成內在心理印象)。" },
            { cat: "知覺過程", title: "13. 接近原則與相似原則", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["接近原則與相似原則"], txt: "接近原則：時空距離相近的看成一組。相似原則：物理特徵相近的看成整體。為知覺組織的核心法則。" },
            { cat: "知覺過程", title: "14. 連續原則與閉合原則", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["連續原則與閉合原則"], txt: "連續原則：知覺傾向流動線。閉合原則：將具缺口或不完整的刺激在認知上補全。體現大腦自動優化機制。" },
            { cat: "知覺過程", title: "15. 第一印象 (Initial Impression)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["第一印象"], txt: "初次接觸根據對方的衣著、談吐、非語言行為所建立的綜合評價。外觀特質對初始評價具有主導性影響。" },
            { cat: "知覺過程", title: "16. 連接性原則 (Connectedness)", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["連接性原則 (啞鈴理論)"], txt: "知覺組織進階原則。若兩個不相干的物件被線條連結(如啞鈴)，會被直接視為一個運作單元。高分差異化細節。" },
            { cat: "知覺評價", title: "17. 月暈效應與刻板印象", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["月暈效應與刻板印象"], txt: "月暈效應：單一優點擴大整體評價。刻板印象：將標記簡化並固著在特定群體上，為常見知覺偏誤。" },
            { cat: "知覺評價", title: "18. 知覺對比效應 (Contrast)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["知覺對比效應"], txt: "知覺評價受參考背景強烈影響。如 190 公分身高在凡人中顯高，在 NBA 中顯矮。涉及參考架構的對比。" },
            { cat: "知覺評價", title: "19. 核心特質實驗 (熱誠/冷淡)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["核心特質實驗分析"], txt: "熱誠與冷淡是決定整體印象架構的基石。其影響力遠超乎禮貌或粗魯等周邊特質。此為印象形成之核心。" },
            { cat: "歸因理論", title: "20. 內在歸因與外在歸因", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內在歸因與外在歸因"], txt: "行為原因的邏輯推導。內在歸因為性格、情感因素；外在歸因為環境與運氣等情境因素。影響自我價值評定。" },
            { cat: "歸因理論", title: "21. 凱利三維歸因論", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["凱利三維歸因論指標"], txt: "歸因指標：區別性(對這事不同?)、一致性(以前都這樣?)、普遍性(別人都這樣?)。交織決定最終判斷。" },
            { cat: "印象管理", title: "22. 印象整飾之功能", img: "goffman_dramaturgy_theater_stage_1776041066626.png", ls: ["印象整飾之五大功能"], txt: "社會互動中控制他人對我們知覺的歷程。包含：維持自尊、界定權力、發揮影響力、角色適配及形象穩定。" },
            { cat: "壓力/健康", title: "23. 社會再適應量表 (SRRS)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["SRRS 量表關鍵數據"], txt: "壓力負荷量化指標。200-299 分區間屬中度生活危機。最高分為配偶死亡。有效預測身心負荷程度。" },
            { cat: "壓力/健康", title: "24. 獲得健康的兩大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["生理修復與心理回彈"], txt: "策略：一、生理修復(適度運動、充足睡眠 8 小時、均衡飲食)。二、心理回彈(發展復原力、發展能力、壓力管理)。" },
            { cat: "壓力/健康", title: "25. 壓力管理策略分析", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["壓力管理五大正式策略"], txt: "緩解身心衝擊的策略：消除壓力源(治本)、幽默調適、社會支持系統、調整認知、以及放鬆技巧運用。" },
            { cat: "人際吸引", title: "26. 人際吸引影響因素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["吸引影響因素類別"], txt: "吸引力變項：一、情境因素(時空接近)。二、個人因素(外表、性格、能力)。三、適配因素(相似度、互補性)。" },
            { cat: "人際吸引", title: "27. 仰巴腳效應 (Pratfall)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["仰巴腳效應 (出醜效應)"], txt: "能力卓越的人物偶爾顯露的小失誤，反而能縮短心理距離，增加親和力與吸引力。避免過於完美的疏離感。" },
            { cat: "人際吸引", title: "28. 海德 POX 平衡理論", img: "heider_pox_balance_triad_1776041038324.png", ls: ["海德 POX 平衡理論"], txt: "認知相符理論。三方關係(個人-他人-事物)乘積為「正」代表結構平衡。不平衡會產生心理張力。" },
            { cat: "愛情研究", title: "29. 愛情三因論 (Sternberg)", img: "sternberg_love_triangle_diagram_1776041022011.png", ls: ["愛情三項成份理論"], txt: "構成元素：激情(生理)、親密(情感)、責任(決心/承諾)。三者比例隨時間與承諾程度而動態變化。" },
            { cat: "愛情研究", title: "30. 愛情六型態分析", img: "sternberg_love_triangle_diagram_1776041022011.png", ls: ["雷斯愛情六型態"], txt: "六型分類：友誼之愛、激情之愛、佔有欲之愛、無私之愛、現實之愛、以及情人之愛。反映多元依附關係。" },
            { cat: "溝通技能", title: "31. 圓融人際六要訣", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["圓融人際六要訣總結"], txt: "優化互動品質守則。口訣：尊(尊重)、笑(笑臉)、口(讚美)、心(真誠)、度(寬厚)、腳(謙虛腳勤)。" },
            { cat: "溝通技能", title: "32. 非語言溝通特質 (93%)", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["親密距離與梅拉賓定律"], txt: "情感訊息中非語言佔比 93%。具備文化差異。必考數據：親密距離為 1.5 英尺(約 45 公分)以內。" },
            { cat: "溝通技能", title: "33. 溝通分析 PAC 心理狀態", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["溝通分析人格狀態指標"], txt: "心理交互分析：父母(P/規範)、成人(A/理性)、兒童(C/情感)。互補則溝通穩定，交錯則產生衝突。" },
            { cat: "溝通技能", title: "34. 職場電話留言三要素", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["專業電話留言三要素"], txt: "職場實務重點：前 30 秒決定好感度。有效的留言條必須包含三要素：姓名、電話、以及具體留言事由。" },
            { cat: "社會文化", title: "35. 人情意涵與面子性格論", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["人情三意涵與面子性格"], txt: "人情包含：情感交換、社會資源借貸與社會動態規範。面子則是個人社會聲望地位的權力指標。" },
            { cat: "最終叮嚀", title: "36. 期中考學術寫作戰術", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["學術應試與數據總結"], txt: "大標題優先寫出。解釋名詞注重定義、英文名稱與術語。問答題注重條列結構。嚴禁留白，確保意思傳達。" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat + " | " + studyPlan[i].title;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].ls);
            document.getElementById('lecture-content').innerText=studyPlan[i].txt;
            const u=new SpeechSynthesisUtterance(studyPlan[i].title + "。" + studyPlan[i].txt); u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
