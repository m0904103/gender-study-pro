<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>人際關係與協商 | 完全記憶淨化版 V9.1</title>
    <style>
        :root { 
            --primary: #fbbf24; --danger: #ef4444; --bg: #020617; --text: #f8fafc; 
            --safe-top: env(safe-area-inset-top, 50px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .header { 
            position: fixed; top: 0; left: 0; right: 0; padding-top: var(--safe-top); height: calc(88px + var(--safe-top));
            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; 
            padding-left: calc(15px + env(safe-area-inset-left)); padding-right: calc(15px + env(safe-area-inset-right)); z-index: 2000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
        }
        .wrapper { display: flex; height: 100%; padding-top: calc(88px + var(--safe-top)); box-sizing: border-box; }
        .sidebar { 
            position: fixed; left: -110%; top: 0; bottom: 0; width: 320px; background: rgba(11, 15, 26, 0.99); border-right: 1px solid rgba(251, 191, 36, 0.3); 
            z-index: 3000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding-top: calc(100px + var(--safe-top)); backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
        }
        .sidebar.open { left: 0; box-shadow: 40px 0 100px rgba(0,0,0,1); }
        .course-nav { height: 100%; overflow-y: auto; padding: 25px; }
        .nav-cat { font-size: 0.75rem; color: var(--primary); margin: 30px 0 15px 5px; font-weight: 950; border-left: 5px solid var(--primary); padding-left: 12px; }
        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; background: rgba(255,255,255,0.06); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 1000; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(230px + var(--safe-bottom)); }
        .screen { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #slide-view { width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .label-unit { position: absolute; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: var(--primary); padding: 15px 35px; border-radius: 20px; font-weight: 1000; font-size: 1.6rem; border: 3px solid var(--primary); box-shadow: 0 30px 80px rgba(0,0,0,0.8); z-index: 1001; text-align: center; max-width: 85%; }
        .console { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 23, 42, 0.98); padding: 28px; 
            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.3rem; line-height: 1.6; height: 110px; overflow-y: auto; color: #fff; font-weight: 500; margin: 15px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 400px) { .header-info { font-size: 0.85rem !important; } .label-unit { font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div id="splash" onclick="goStudy()">
        <div style="width: 85%">
            <p style="color:var(--primary); font-weight:1000; letter-spacing:8px; margin-bottom:15px; font-size:0.9rem;">1142 | V9.1 PURE MEMORY EDITION</p>
            <h1 style="font-size:2.8rem; line-height:1.2; margin:15px 0; background:linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:1000;">人際關係與協商<br><span style="font-size:2.2rem; color:var(--primary); text-shadow:0 0 20px rgba(251,191,36,0.3);">完全記憶淨化版</span></h1>
            <div style="background:var(--danger); color:white; padding:10px 35px; border-radius:12px; font-size:1.3rem; font-weight:900; display:inline-block; margin-top:10px;">移除所有雜訊 | 回歸純粹理論記憶</div>
            <br><button class="btn-gold" style="margin-top:50px;">🏆 正式啟動</button>
        </div>
    </div>
    <header class="header">
        <button onclick="toggleSidebar()" style="background:var(--primary); border:none; padding:12px 25px; border-radius:15px; font-weight:1000; font-size:0.9rem;">☰ 理論索引(30)</button>
        <div class="header-info" style="color:var(--primary); font-weight:1000; font-size:1rem; text-align:center; flex:1; padding:0 10px;">目標：強迫大腦建立「標籤與定義」之唯一連結</div>
        <div style="background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:50px; border:2px solid var(--primary); display:flex; align-items:center; gap:8px;"><input type="range" id="rate" min="0.5" max="2.0" value="1.3" step="0.1" style="width:50px; accent-color:var(--primary)"></div>
    </header>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"><div class="course-nav" id="nav"></div></aside>
        <main class="viewport">
            <div class="screen"><div id="slide-view"></div><div id="overlay-layer" style="position:absolute; inset:0; pointer-events:none; display:flex; justify-content:center; align-items:center;"></div></div>
            <div class="console">
                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1rem;" id="cat-title">-</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 30</span></div>
                <div id="lecture-content" class="text-body">。</div>
                <div class="nav-btns">
                    <button class="control-btn" onclick="prev()">⬅ 上一頁</button>
                    <button class="control-btn" onclick="next(cuI+1)">下一頁 ➡</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "【解釋名詞】", title: "1. 周哈里窗 (Johari Window)", img: "johari_window_modern_diagram_1776040990674.png", ls: ["開放/盲目/隱藏/未知"], txt: "分析自我覺察之模型。核心四區分為：開放、盲目、隱藏、與未知。是提升自我覺察的關鍵考點。" },
            { cat: "【解釋名詞】", title: "2. 月暈效應 (Halo Effect)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["以偏概全"], txt: "一種認知偏誤。指因對方單一顯著優點而產生的「以偏概全」整體正面評價。" },
            { cat: "【解釋名詞】", title: "3. 仰巴腳效應 (Pratfall Effect)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["出醜效應"], txt: "又稱出醜效應。指能力強者犯下小錯誤，反而能增加其親和力與吸引力。" },
            { cat: "【解釋名詞】", title: "4. 社會再適應量表 (SRRS)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["200-299 中度危機"], txt: "量化壓力的工具。關鍵數據是 200 到 299 分，學術上定義為中度生活危機。" },
            { cat: "【解釋名詞】", title: "5. 印象整飾 (Impression Mgt)", img: "goffman_dramaturgy_theater_stage_1776041066626.png", ls: ["前台 vs. 後台"], txt: "指意圖控制他人對自己知覺，進而影響他人對我們形成印象的歷程。包含前台形象整飾與後台真實自我。" },
            { cat: "【解釋名詞】", title: "6. 自我概念 (Self-Concept)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["定義：我是誰"], txt: "個人對自己持有的概括性看板看法。簡單來說，就是定義「自己是怎樣的人」。" },
            { cat: "【解釋名詞】", title: "7. 歸因 (Attribution)", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內在性格 vs. 外在環境"], txt: "推論行為原因的歷程。學術上劃分為「內在性格歸因」與「外在環境歸因」。" },
            { cat: "【解釋名詞】", title: "8. 不合理信念 (Irrational Beliefs)", img: "albert_ellis_rational_emotive_background_1775990617583.png", ls: ["絕對化與災難化"], txt: "由艾里斯提出。指對生活持有絕對化或災難化觀念，被視為情緒困擾的主因。" },
            { cat: "【解釋名詞】", title: "9. 防衛機制 (Defense Mechanism)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["合理化/投射/退化"], txt: "面臨挫折時採取的保護行為。核心包含合理化、投射作用與退化作用等表現形態。" },
            { cat: "【解釋名詞】", title: "10. PAC 心理狀態 (TA)", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["父母/成人/兒童"], txt: "溝通分析核心。將個體自我狀態區分為：父母、成人、與兒童三種運作模式。" },
            { cat: "【問答大題】", title: "11. 影響人際知覺的要素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["知覺者/被知覺者/情境"], txt: "由三要素交互形成：被知覺者外觀、知覺者動機與情緒、以及交往情境。此為知覺評價的核心架構。" },
            { cat: "【問答大題】", title: "12. 影響人際吸引的因素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["情境/個人/適配"], txt: "包含：空間接近的情境因素、外表能力的個人因素、以及相似互補的適配因素。" },
            { cat: "【問答大題】", title: "13. 馬斯洛需求層次理論", img: "maslow_pyramid_stomach_to_god_1776041006784.png", ls: ["肚子世界 vs. 神仙世界"], txt: "由生理、安全、社會、自尊與自我實現構成。低層未滿足前，高層不具吸引力。這是理論的核心動力邏輯。" },
            { cat: "【問答大題】", title: "14. 獲得健康的兩大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["生理修復與心理回彈"], txt: "一、生理修復：運動、睡眠與飲食。二、心理回彈：複元力、能力與壓力管理。睡眠建議採右側臥。" },
            { cat: "【問答大題】", title: "15. 壓力管理的五大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["消除源/幽默/支持/認知/放鬆"], txt: "包含：一、消除壓力源。二、發現幽默。三、尋求社會支持。四、調整認知。五、練習放鬆技巧。" },
            { cat: "【問答大題】", title: "16. 圓融人際六要訣", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["尊/笑/口/心/度/腳"], txt: "口訣為：尊、笑、口、心、度、腳。具體為尊重、笑臉、口圓、心正、度大、以及腳勤腳蹲。" },
            { cat: "【問答大題】", title: "17. 知覺產生的三步驟", img: "nonverbal_mircro_expressions_eye_1776041233563.png", ls: ["感覺 ➔ 組織 ➔ 評價"], txt: "歷程分為：感覺階段、組織階段、再到評價階段。這是物理刺激轉化為心理意義的必經流程。" },
            { cat: "【問答大題】", title: "18. 知覺組織的五大原則", img: "gestalt_connectedness_dumbbell_principle_1776043234567_1776051269067.png", ls: ["接近/相似/連續/閉合/連接"], txt: "包含接近性、相似性、連續性、閉合性、以及連接性。連接性指獨立物件被連線鎖定為單元（如啞鈴）。" },
            { cat: "【問答大題】", title: "19. 凱利三維歸因模型", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["區別性/一致性/普遍性"], txt: "由三項指標決定：區別性、一致性、普遍性（統一性）。向度決定歸因為個體特徵或外部境遇。" },
            { cat: "【問答大題】", title: "20. 非語言溝通的特性", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["情感佔比達 93%"], txt: "具備模糊、持續、多重管道、情感高、與文化差異。梅拉賓定律指出非語言訊息的情感佔比高達 93% 。" },
            { cat: "【問答大題】", title: "21. TA 溝通分析形態", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["互補/交錯/隱藏"], txt: "包含：互補式溝通、交錯式溝通、以及潛在的隱藏式溝通。反映 P A C 狀態的互動品質與衝突點。" },
            { cat: "【問答大題】", title: "22. 華人文化人情與面子", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["人面/場面/情面"], txt: "人情涉及情感、資源與規範。面子為地位指標。相處須重杜月笙所謂之：人面、場面、與情面。" },
            { cat: "【問答大題】", title: "23. 愛情三因論 (Sternberg)", img: "sternberg_love_triangle_diagram_1776041022011.png", ls: ["激情/親密/責任"], txt: "由激情、親密與責任決心構成。各要素權重隨交往階段、時間長短與承諾深度動態調整。" },
            { cat: "【問答大題】", title: "24. 解決人際問題的原則", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["PAC / 傾聽 / 平等"], txt: "核心包含：確認互動型態、縮短距離、尊重肯定、傾聽善解、以及建立平等對待機制與雙贏策略。" },
            { cat: "【問答大題】", title: "25. 社會影響策略對照", img: "foot_in_the_door_vs_face_concept_1776042490769.png", ls: ["得寸進尺 vs. 漫天要價"], txt: "包含：得寸進尺法（先小後大）與漫天要價法（先大後小）。主要運用形象維護心理與知覺對比達成目的。" },
            { cat: "【數據定錨】", title: "26. 非語言 93% 定律", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["梅拉賓定律數據"], txt: "專業數據：梅拉賓定律指出，在傳遞情感訊息時，非語言管道的影響力高達 93% 。" },
            { cat: "【數據定錨】", title: "27. SRRS 中度壓力指標", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["200-299 數值區間"], txt: "專業數據：社會再適應量表分數若位於 200 到 299 分之間，學術上定義為中度生活危機。" },
            { cat: "【數據定錨】", title: "28. 1.5 英尺親密距離", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["45 公分親密界線"], txt: "專業數據：人際親密距離規範於 1.5 英尺，即約 45 公分以內。超越此界則轉為社會距離。" },
            { cat: "【數據定錨】", title: "29. 理想睡眠 8 小時", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["生理修復基礎時數"], txt: "專業數據：理想睡眠時間均值為 8 小時。具備充足睡眠才能確保生理功能完成復原與修復。" },
            { cat: "【終極戰術】", title: "30. 考場心法：絕對不空白", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["大標優先原則"], txt: "大標題優先寫出，解釋名詞注重學術學名。嚴禁留白，這是達成考場高分的必備底限。" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat + " | " + studyPlan[i].title;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].ls);
            document.getElementById('lecture-content').innerText=studyPlan[i].txt;
            const u=new SpeechSynthesisUtterance(studyPlan[i].title + "。 " + studyPlan[i].txt); 
            u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
