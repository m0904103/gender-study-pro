<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>人際關係與協商 | 期中考大題攻堅 V2.0</title>
    <style>
        :root { 
            --primary: #fbbf24; --danger: #ef4444; --bg: #020617; --text: #f8fafc; 
            --safe-top: env(safe-area-inset-top, 50px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .header { 
            position: fixed; top: 0; left: 0; right: 0; padding-top: var(--safe-top); height: calc(88px + var(--safe-top));
            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; 
            padding-left: calc(15px + env(safe-area-inset-left)); padding-right: calc(15px + env(safe-area-inset-right)); z-index: 2000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
        }
        .wrapper { display: flex; height: 100%; padding-top: calc(88px + var(--safe-top)); box-sizing: border-box; }
        .sidebar { 
            position: fixed; left: -110%; top: 0; bottom: 0; width: 320px; background: rgba(11, 15, 26, 0.99); border-right: 1px solid rgba(251, 191, 36, 0.3); 
            z-index: 3000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding-top: calc(100px + var(--safe-top)); backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
        }
        .sidebar.open { left: 0; box-shadow: 40px 0 100px rgba(0,0,0,1); }
        .course-nav { height: 100%; overflow-y: auto; padding: 25px; }
        .nav-cat { font-size: 0.75rem; color: var(--primary); margin: 30px 0 15px 5px; font-weight: 950; border-left: 5px solid var(--primary); padding-left: 12px; }
        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; background: rgba(255,255,255,0.06); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 1000; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(230px + var(--safe-bottom)); }
        .screen { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #slide-view { width: 100%; height: 100%; background-size: contain; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .label-unit { position: absolute; background: linear-gradient(135deg, #ef4444, #991b1b); color: #fff; padding: 18px 40px; border-radius: 20px; font-weight: 1000; font-size: 2.2rem; border: 4.5px solid #fff; box-shadow: 0 30px 80px rgba(0,0,0,1); z-index: 1001; text-align: center; }
        .console { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 23, 42, 0.98); padding: 28px; 
            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.35rem; line-height: 1.65; height: 110px; overflow-y: auto; color: #fff; font-weight: 500; margin: 15px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 400px) { .header-info { font-size: 0.85rem !important; } .label-unit { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <div id="splash" onclick="goStudy()">
        <div style="width: 85%">
            <p style="color:var(--primary); font-weight:1000; letter-spacing:8px; margin-bottom:15px; font-size:0.9rem;">114-2 INTERPERSONAL RELATIONSHIP</p>
            <h1 style="font-size:2.8rem; line-height:1.2; margin:15px 0; background:linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:1000;">人際關係與協商<br><span style="font-size:2.2rem; color:var(--primary); text-shadow:0 0 20px rgba(251,191,36,0.3);">期中考大題攻堅特訓</span></h1>
            <div style="background:var(--danger); color:white; padding:10px 35px; border-radius:12px; font-size:1.3rem; font-weight:900; display:inline-block; margin-top:10px;">名詞 25% + 問答 75% | V2.0</div>
            <br><button class="btn-gold" style="margin-top:50px;">🏆 就緒</button>
        </div>
    </div>
    <header class="header">
        <button onclick="toggleSidebar()" style="background:var(--primary); border:none; padding:12px 25px; border-radius:15px; font-weight:1000; font-size:0.9rem;">☰ 目錄</button>
        <div class="header-info" style="color:var(--primary); font-weight:1000; font-size:1rem; text-align:center; flex:1; padding:0 10px;">題型：名詞解釋 + 問答題</div>
        <div style="background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:50px; border:2px solid var(--primary); display:flex; align-items:center; gap:8px;"><input type="range" id="rate" min="0.5" max="2.0" value="1.3" step="0.1" style="width:50px; accent-color:var(--primary)"></div>
    </header>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"><div class="course-nav" id="nav"></div></aside>
        <main class="viewport">
            <div class="screen"><div id="slide-view"></div><div id="overlay-layer" style="position:absolute; inset:0; pointer-events:none; display:flex; justify-content:center; align-items:center;"></div></div>
            <div class="console">
                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1rem;" id="cat-title">名詞解釋 25%</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 36</span></div>
                <div id="lecture-content" class="text-body">。</div>
                <div class="nav-btns">
                    <button class="control-btn" onclick="prev()">⬅ 上一頁</button>
                    <button class="control-btn" onclick="next(cuI+1)">下一頁 ➡</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "名詞解釋 25%", title: "📝 艾里斯的迷思 (Irrational Beliefs)", img: "ch1_ellis_10_myths_summary.png", labels: ["Albert Ellis"], text: "同學請注意解釋名詞第一題：艾里斯的迷思。定義為：個體對生活所抱持的不合理信念或態度，會歪曲事實並導致不愉快的情感。例如：認為每個人都必須贏得所有人的讚許。" },
            { cat: "名詞解釋 25%", title: "📝 周哈里窗 (Johari Window)", img: "johari_window.png", labels: ["Luft & Ingham"], text: "定義：由 Luft 與 Ingham 提出的模型，用來描述自我袒露與他人回饋在人際互動中的關係。分為開放、盲目、隱藏、與未知四個區域。" },
            { cat: "名詞解釋 25%", title: "📝 自我袒露 (Self-disclosure)", img: "ch1_gh_mead_self_origin.png", labels: ["分享內心"], text: "定義：一種特殊的雙向溝通過程，個體主動向他人分享內心的感受、資訊、以及個人背景，目的在於增進彼此的了解與親密關係。" },
            { cat: "名詞解釋 25%", title: "📝 社會再適應量表 (SRRS)", img: "ch3_srrs_holmes_rahe_table.png", labels: ["生活危機評估"], text: "定義：1967 年由 Holmes 與 Rahe 編製，用來量化評估個體在特定時間內，因生活事件改變而承受的心理壓力程度。" },
            { cat: "名詞解釋 25%", title: "📝 月暈效應 (Halo Effect)", img: "ch4_halo_effect_visual.png", labels: ["以偏概全"], text: "定義：知覺者在評價他人時，傾向根據對方的單一特質（如外貌佳）而盲目推論其餘特質（如性格也佳）的認知偏誤。" },
            { cat: "名詞解釋 25%", title: "📝 歸因 (Attribution)", img: "ch4_attribution_principles.png", labels: ["因果推論"], text: "定義：個體推論他人行為背後原因的認知過程。可分為內控歸因（歸因於個人性格、努力）與外控歸因（歸因於環境、運氣）。" },
            { cat: "名詞解釋 25%", title: "📝 核心特質 (Central Trait)", img: "ch4_central_trait_asch_exp.png", labels: ["關鍵權數"], text: "定義：在形成他人印象時，起決定性作用、權數比重最大的訊息特質。如 Asch 實驗中的『熱忱』對比『冷淡』。" },
            { cat: "名詞解釋 25%", title: "📝 戲劇理論 (Dramaturgy)", img: "ch4_goffman_dramaturgy_stage.png", labels: ["高夫曼"], text: "定義：由 Goffman 提出，將社會互動比喻為舞台表演，個體透過『自我表現』來管理他人對自己的印象。包含戲目前台與隱私後台。" },
            { cat: "名詞解釋 25%", title: "📝 仰巴腳效應 (Pratfall Effect)", img: "ch5_pratfall_effect_jfk.png", labels: ["出醜加分"], text: "定義：又稱出醜效應。指表現優異、能力強的人，若發生微小的錯誤或失誤，反而會因為展現人性化的一面而增加其人際吸引力。" },
            { cat: "名詞解釋 25%", title: "📝 溝通分析 (TA)", img: "ch6_ta_pac_model_berne.png", labels: ["Eric Berne"], text: "定義：由 Eric Berne 創立。透過分析人際互動中的自我狀態（父母、成人、兒童）來理解並改善溝通效率的心理學工具。" },
            { cat: "名詞解釋 25%", title: "📝 象徵 (Emblem)", img: "ch6_nonverbal_types_emblem.png", labels: ["肢體語法"], text: "定義：非語言溝通的一種。指具備特定文化意義、可直接代替單字或句子的肢體動作。如：豎起大拇指代表稱讚。" },
            { cat: "名詞解釋 25%", title: "📝 防衛機制 (Defense Mechanism)", img: "ch4_defense_mechanisms_12.png", labels: ["自我保護"], text: "定義：個體為了減輕焦慮、保護自我免受挫折，而在潛意識中採取的適應性反應。如：合理化、投射、退化作用。" },
            { cat: "問答題 75%", title: "📝 問題 1：如何改善自我概念？", img: "ch1_improve_self_concept.png", labels: ["答題要點"], text: "回答本題需列出四點：一、致力改變，接受自我是一個持續成長的過程。二、獲取知識，認清受哪些社會觀點影響。三、設定具體且實際的目標。四、建立支持性的環境（多與肯低者互動）。" },
            { cat: "問答題 75%", title: "📝 問題 2：自我袒露的六大功能為何？", img: "ch1_self_disclosure_functions.png", labels: ["答題要點"], text: "功能包含：(1)發洩悶氣。(2)增進因應能力。(3)自我澄清：獲得不同觀點。(4)社會認可：確認觀點正確。(5)社會控制：管理他人印象。(6)關係發展：建立深度連結。" },
            { cat: "問答題 75%", title: "📝 問題 3：馬斯洛需求理論的內容與意義？", img: "maslow_pyramid.png", labels: ["生理➔自實"], text: "內容：生理、安全、社會（中高階）、自尊、自我實現。意義：強調低層次滿足後才會追求高層次。實務價值在於『管理人性化』，激勵個人發揮潛能。" },
            { cat: "問答題 75%", title: "📝 問題 4：壓力管理的五大策略有哪些？", img: "ch3_stress_mgmt_5_strategies.png", labels: ["答題要點"], text: "一、消除或緩和壓力源（最有效）。二、發現幽默（降低血壓、釋放腦啡）。三、社會支持。四、調整認知（積極思考）。五、培養放鬆技巧（如呼吸法、肌肉鬆弛法）。" },
            { cat: "問答題 75%", title: "📝 問題 5：解釋 A 型與 B 型性格對壓力的反應？", img: "ch3_type_a_b_personality.png", labels: ["A 型與高血壓"], text: "A 型性格：富有侵略性、競爭強、急迫感，易因壓力導致高血壓或心血管疾病。B 型性格：較隨性、不急躁。內控者通常比外控者更能積極應對壓力。" },
            { cat: "問答題 75%", title: "📝 問題 6：影響人際知覺的要素為何？", img: "ch4_factors_interpersonal_perception.png", labels: ["被/知/情"], text: "包含三要素。一、被知覺者：外貌與行為。二、知覺者：受認知型態與人性哲學觀影響。三、交往情境：環境的人事時地物會改變對行為的解讀。" },
            { cat: "問答題 75%", title: "📝 問題 7：歸因理論中的共變原則？", img: "ch4_attribution_principles.png", labels: ["區一同"], text: "凱利 Kelley 指出判斷行為歸因有三指標：1. 區別性：行為是否只在特定情境發生。2. 一致性：行為是否在不同時間重複出現。3. 同意性：別人是否也在此情境做相同反應。" },
            { cat: "問答題 75%", title: "📝 問題 8：為什麼要從事印象整飾？", img: "ch4_impression_management_why.png", labels: ["答題要點"], text: "理由包含：(1)維持自尊 (Save Face)。(2)界定互動關係程度。(3)發揮個人影響力。(4)符合社會與角色期望。(5)建立穩定一致的公眾形象。" },
            { cat: "問答題 75%", title: "📝 問題 9：華人文化中的人情與面子？", img: "ch4_chinese_face_favor.png", labels: ["臉與面"], text: "人情包含情緒、交易與規範。面子區分為：『臉』代表道德人格；『面』代表社會成就認可。華人互動常重情勝於理，導致表裡不一。" },
            { cat: "問答題 75%", title: "📝 問題 10：人際吸引的三大影響因素？", img: "ch5_attraction_factors.png", labels: ["情/個/適"], text: "一、情境因素：地理接近性，增加熟悉度。二、個人因素：外表吸引力、個性與能力（含仰巴腳效應）。三、適配性：態度價值觀的相似性，或特質互補性。" },
            { cat: "問答題 75%", title: "📝 問題 11：解釋愛情三因論與完美之愛？", img: "ch5_sternberg_love_triangle.png", labels: ["激情親密奉獻"], text: "史登堡提出愛由『激情、親密、責任奉獻』構成。三者兼具稱為完美之愛。責任奉獻是維持長久關係的關鍵能量。愛會隨時間動態變化要素比重。" },
            { cat: "問答題 75%", title: "📝 問題 12：溝通分析 (TA) 的自我狀態與型態？", img: "ch6_ta_pac_model_berne.png", labels: ["答題要點"], text: "狀態：父母 (P)、成人 (A)、兒童 (C)。型態：(1)互補式：平行溝通有效。(2)交錯式：交叉溝通停頓。(3)隱藏式：內外不一最複雜。目標是從『成人』狀態出發溝通。" },
            { cat: "問答題 75%", title: "📝 問題 13：非語言溝通的五大特性？", img: "ch6_nonverbal_5_features.png", labels: ["模糊/持續"], text: "一、模糊性：微笑有多種解釋。二、持續性：共處即存在。三、多重管道：看、聽、觸覺同步。四、情感性：呈現真實感受，比語言更可信。五、文化差異性。" },
            { cat: "問答題 75%", title: "📝 問題 14：如何克服電話溝通障礙？", img: "ch6_phone_etiquette_30s.png", labels: ["平心靜氣"], text: "關鍵技巧：前三十秒掌握主導權、向對方禮貌問好。核心在於：聚精會神、推敲聲音含義、建立自信、並保持平心靜氣。因無肢體動作，聲音品質是成敗關鍵。" },
            { cat: "問答題 75%", title: "📝 問題 15：解釋社會交換理論與公平理論？", img: "ch5_social_exchange_equity.png", labels: ["酬賞與代價"], text: "社會交換論：以最小代價換取最大酬賞。公平理論：交換論的分支，強調關係維持取決於雙方是否覺得互蒙其利。包含實質與心理公平。" },
            { cat: "魔鬼數據彙整", title: "📊 數據死穴 1：SRRS 評分區間", img: "ch3_srrs_holmes_rahe_table.png", labels: ["200-299 = 中度"], text: "解釋名詞必考數據：SRRS 得分在 200 到 299 分之間代表『中度』生活危機組。300 分以上則屬於重度危險。" },
            { cat: "魔鬼數據彙整", title: "📊 數據死穴 2：溫濕度與距離", img: "ch5_edward_hall_distance_zones.png", labels: ["22-26度 / 1.5呎"], text: "環境數據：最適溫度 22 到 26 度。人際親密距離：1.5 英尺（0.46 公尺）。社交區距離：4 到 12 英尺。睡眠姿勢建議：右側臥。" },
            { cat: "魔鬼數據彙整", title: "📊 數據死穴 3：營養黃金比例", img: "ch3_nutrition_balance_pie_chart.png", labels: ["醣類佔 6 成"], text: "健康飲食數據：醣類 58-68%（最高），脂肪 20-30%，蛋白質 10-14%。數據若在問答題中使用能大幅增加論述深度。" },
            { cat: "魔鬼數據彙整", title: "📊 數據死穴 4：非語言與眼光接觸", img: "ch6_nonverbal_types_emblem.png", labels: ["50-70% 眼光"], text: "溝通數據補丁：眼光接觸應佔對話時間 50% 到 70%。電話溝通的前 30 秒最具決定性。TA 狀態共三層。不合理信念共十個。" },
            { cat: "大終局", title: "🏆 特訓完成：25+75 全拿", img: "final_blessing_gold_interpersonal.png", labels: ["100 分凱旋"], text: "36 頁大題攻堅特訓完成。從解釋名詞的精確定義到問答題的三段式架構，您已擁有獲取高分的完整邏輯。祝同學這場考試旗開得勝！" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].special, studyPlan[i].labels);
            document.getElementById('lecture-content').innerText=studyPlan[i].text;
            const u=new SpeechSynthesisUtterance(studyPlan[i].text); u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(sp, ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
