<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>人際關係與協商 | 期中考正規特訓 V3.2</title>
    <style>
        :root { 
            --primary: #fbbf24; --danger: #ef4444; --bg: #020617; --text: #f8fafc; 
            --safe-top: env(safe-area-inset-top, 50px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .header { 
            position: fixed; top: 0; left: 0; right: 0; padding-top: var(--safe-top); height: calc(88px + var(--safe-top));
            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; 
            padding-left: calc(15px + env(safe-area-inset-left)); padding-right: calc(15px + env(safe-area-inset-right)); z-index: 2000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
        }
        .wrapper { display: flex; height: 100%; padding-top: calc(88px + var(--safe-top)); box-sizing: border-box; }
        .sidebar { 
            position: fixed; left: -110%; top: 0; bottom: 0; width: 320px; background: rgba(11, 15, 26, 0.99); border-right: 1px solid rgba(251, 191, 36, 0.3); 
            z-index: 3000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding-top: calc(100px + var(--safe-top)); backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
        }
        .sidebar.open { left: 0; box-shadow: 40px 0 100px rgba(0,0,0,1); }
        .course-nav { height: 100%; overflow-y: auto; padding: 25px; }
        .nav-cat { font-size: 0.75rem; color: var(--primary); margin: 30px 0 15px 5px; font-weight: 950; border-left: 5px solid var(--primary); padding-left: 12px; }
        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; background: rgba(255,255,255,0.06); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 1000; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(230px + var(--safe-bottom)); }
        .screen { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #slide-view { width: 100%; height: 100%; background-size: contain; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .label-unit { position: absolute; background: linear-gradient(135deg, #fbbf24, #b45309); color: #000; padding: 18px 40px; border-radius: 20px; font-weight: 1000; font-size: 2.2rem; border: 4.5px solid #000; box-shadow: 0 30px 80px rgba(0,0,0,1); z-index: 1001; text-align: center; }
        .console { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 23, 42, 0.98); padding: 28px; 
            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.35rem; line-height: 1.65; height: 110px; overflow-y: auto; color: #fff; font-weight: 500; margin: 15px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 400px) { .header-info { font-size: 0.85rem !important; } .label-unit { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <div id="splash" onclick="goStudy()">
        <div style="width: 85%">
            <p style="color:var(--primary); font-weight:1000; letter-spacing:8px; margin-bottom:15px; font-size:0.9rem;">114-2 INTERPERSONAL RELATIONSHIP</p>
            <h1 style="font-size:2.8rem; line-height:1.2; margin:15px 0; background:linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:1000;">人際關係與協商<br><span style="font-size:2.2rem; color:var(--primary); text-shadow:0 0 20px rgba(251,191,36,0.3);">期中考考點特訓 V3.2</span></h1>
            <div style="background:var(--danger); color:white; padding:10px 35px; border-radius:12px; font-size:1.3rem; font-weight:900; display:inline-block; margin-top:10px;">專業定義 + 數據精選 | 正規應試版</div>
            <br><button class="btn-gold" style="margin-top:50px;">🏆 就緒</button>
        </div>
    </div>
    <header class="header">
        <button onclick="toggleSidebar()" style="background:var(--primary); border:none; padding:12px 25px; border-radius:15px; font-weight:1000; font-size:0.9rem;">☰ 目錄</button>
        <div class="header-info" style="color:var(--primary); font-weight:1000; font-size:1rem; text-align:center; flex:1; padding:0 10px;">正式定義與精簡大標練習</div>
        <div style="background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:50px; border:2px solid var(--primary); display:flex; align-items:center; gap:8px;"><input type="range" id="rate" min="0.5" max="2.0" value="1.3" step="0.1" style="width:50px; accent-color:var(--primary)"></div>
    </header>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"><div class="course-nav" id="nav"></div></aside>
        <main class="viewport">
            <div class="screen"><div id="slide-view"></div><div id="overlay-layer" style="position:absolute; inset:0; pointer-events:none; display:flex; justify-content:center; align-items:center;"></div></div>
            <div class="console">
                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1rem;" id="cat-title">解釋名詞 25%</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 22</span></div>
                <div id="lecture-content" class="text-body">。</div>
                <div class="nav-btns">
                    <button class="control-btn" onclick="prev()">⬅ 上一頁</button>
                    <button class="control-btn" onclick="next(cuI+1)">下一頁 ➡</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "解釋名詞 (25%)", title: "📝 艾里斯的不合理信念", img: "albert_ellis_rational_emotive_background_1775990617583.png", labels: ["定義核心"], text: "艾里斯的不合理信念：是指個體對生活持有「絕對化」或「災難化」的錯誤觀念，是產生情緒困擾與心理障礙的核心根源。" },
            { cat: "解釋名詞 (25%)", title: "📝 周哈里窗 (Johari Window)", img: "johari_window.png", labels: ["定義核心"], text: "周哈里窗：是用以分析自我覺察與人際溝通的模型。將自我分為開放、盲目、隱藏與未知四個區塊。" },
            { cat: "解釋名詞 (25%)", title: "📝 社會再適應量表 (SRRS)", img: "ch3_srrs_holmes_rahe_table.png", labels: ["定義核心"], text: "社會再適應量表：是量化個體因生活事件改變而承受之心理壓力負荷的工具。200至299分屬中度生活危機。" },
            { cat: "解釋名詞 (25%)", title: "📝 月暈效應 (Halo Effect)", img: "ch4_halo_effect_visual.png", labels: ["定義核心"], text: "月暈效應：認知偏誤的一種。指知覺者因對方的單一顯著優點，進而產生以偏概全的整體正面評價。" },
            { cat: "解釋名詞 (25%)", title: "📝 戲劇理論 (Dramaturgy)", img: "ch4_goffman_dramaturgy_stage.png", labels: ["定義核心"], text: "戲劇理論：將社會互動比喻為舞台表演。個體在「前台」進行形象整飾表演，在「後台」展現隱私的真實自我。" },
            { cat: "解釋名詞 (25%)", title: "📝 仰巴腳效應 (Pratfall Effect)", img: "ch5_pratfall_effect_jfk.png", labels: ["定義核心"], text: "仰巴腳效應：又稱出醜效應。指能力極強的人若犯了平庸的小錯誤，反而會增加親和力與人際吸引力。" },
            { cat: "解釋名詞 (25%)", title: "📝 溝通分析 (TA)", img: "ch6_ta_pac_model_berne.png", labels: ["定義核心"], text: "溝通分析：透過分析人格中的父母 (P)、成人 (A)、兒童 (C) 三種自我狀態，來診斷並改善溝通品質的方法。" },
            { cat: "解釋名詞 (25%)", title: "📝 象徵 (Emblem)", img: "ch6_nonverbal_types_emblem.png", labels: ["定義核心"], text: "象徵：指具備特定文化定義，且能直接取代言語的肢體動作。例如豎起大拇指表示讚賞。" },
            { cat: "解釋名詞 (25%)", title: "📝 防衛機制 (Defense Mechanism)", img: "ch4_defense_mechanisms_12.png", labels: ["定義核心"], text: "防衛機制：是指個體面臨焦慮或挫折時，為了保護自我價值感，而在潛意識中採取的適應反應。" },
            { cat: "解釋名詞 (25%)", title: "📝 歸因 (Attribution)", img: "ch4_attribution_principles.png", labels: ["定義核心"], text: "歸因：是指個體推論他人或自己行為背後原因的認知歷程。可分為內在特質歸因或外在環境歸因。" },
            { cat: "問答題 (75%)", title: "📝 圓融人際六要訣", img: "final_blessing_gold_interpersonal.png", labels: ["問答重點"], text: "圓融人際六要訣包含：一、尊：尊重。二、笑：笑臉。三、口：口圓。四、心：心正。五、度：大度。六、腳：腳勤與腳蹲。" },
            { cat: "問答題 (75%)", title: "📝 馬斯洛需求層次理論", img: "maslow_pyramid.png", labels: ["問答重點"], text: "馬斯洛需求層次由低至高為：生理需求、安全需求、社會需求、自尊需求、自我實現需求。低層需求滿足後始追求高層需求。" },
            { cat: "問答題 (75%)", title: "📝 壓力管理五大策略", img: "ch3_stress_mgmt_5_strategies.png", labels: ["問答重點"], text: "壓力管理五大策略為：一、消除壓力源。二、發現幽默。三、社會支持。四、調整認知。五、放鬆技巧。" },
            { cat: "問答題 (75%)", title: "📝 影響人際知覺的三要素", img: "ch4_factors_interpersonal_perception.png", labels: ["問答重點"], text: "影響人際知覺的三要素為：一、被知覺者之外觀與行為。二、知覺者之觀點與動機。三、交往之環境情境。" },
            { cat: "問答題 (75%)", title: "📝 海德 POX 平衡理論", img: "ch5_attraction_factors.png", labels: ["問答重點"], text: "海德 POX 平衡理論：P 代表知覺者、O 代表他人、X 代表事物。三人關係的正負乘積為正值時，即處於平衡狀態。" },
            { cat: "問答題 (75%)", title: "📝 史登堡愛情三因論", img: "ch5_sternberg_love_triangle.png", labels: ["問答重點"], text: "史登堡愛情三因論指出愛由三要素構成：激情、親密、以及責任奉獻。三者兼備稱為完美之愛。" },
            { cat: "問答題 (75%)", title: "📝 TA 溝通分析的三種型態", img: "ch6_ta_pac_model_berne.png", labels: ["問答重點"], text: "TA 溝通分析三型態為：一、互補式：訊息平行且順暢。二、交錯式：產生衝突或斷裂。三、隱藏式：訊息話中有話。" },
            { cat: "問答題 (75%)", title: "📝 非語言溝通的五大特性", img: "ch6_nonverbal_5_features.png", labels: ["問答重點"], text: "非語言溝通具有以下特性：模糊性、持續性、多重管道、情感展現度高、以及文化差異性。" },
            { cat: "數據考點匯整", title: "📊 SRRS 中度生活危機數據", img: "ch3_srrs_holmes_rahe_table.png", labels: ["關鍵數據"], text: "社會再適應量表 (SRRS) 關鍵數據：200 到 299 分屬於中度生活危機區間。" },
            { cat: "數據考點匯整", title: "📊 非語言溝通梅拉賓定律", img: "ch6_nonverbal_types_emblem.png", labels: ["關鍵數據"], text: "梅拉賓定律：指出在情感意向表達中，非語言訊息的影響力佔比高達百分之 93。" },
            { cat: "數據考點匯整", title: "📊 人際距離與空間管理", img: "ch5_edward_hall_distance_zones.png", labels: ["關鍵數據"], text: "人際距離數據：親密距離設定在 1.5 英尺以內。此外，睡眠姿勢建議以右側臥最佳。" },
            { cat: "考前叮嚀", title: "🏆 特訓完成：祝 100 分凱旋", img: "final_blessing_gold_interpersonal.png", labels: ["凱旋祝福"], text: "期中考考點特訓已完成。請保持平常心，熟記大標題與正式定義。預祝同學在人際關係與協商考試中取得優異成績！" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].special, studyPlan[i].labels);
            document.getElementById('lecture-content').innerText=studyPlan[i].text;
            const u=new SpeechSynthesisUtterance(studyPlan[i].text); u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(sp, ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
