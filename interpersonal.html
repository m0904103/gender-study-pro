<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>人際關係與協商 | 面授魔鬼終極版 V5.1</title>
    <style>
        :root { 
            --primary: #fbbf24; --danger: #ef4444; --bg: #020617; --text: #f8fafc; 
            --safe-top: env(safe-area-inset-top, 50px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .header { 
            position: fixed; top: 0; left: 0; right: 0; padding-top: var(--safe-top); height: calc(88px + var(--safe-top));
            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; 
            padding-left: calc(15px + env(safe-area-inset-left)); padding-right: calc(15px + env(safe-area-inset-right)); z-index: 2000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
        }
        .wrapper { display: flex; height: 100%; padding-top: calc(88px + var(--safe-top)); box-sizing: border-box; }
        .sidebar { 
            position: fixed; left: -110%; top: 0; bottom: 0; width: 320px; background: rgba(11, 15, 26, 0.99); border-right: 1px solid rgba(251, 191, 36, 0.3); 
            z-index: 3000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding-top: calc(100px + var(--safe-top)); backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
        }
        .sidebar.open { left: 0; box-shadow: 40px 0 100px rgba(0,0,0,1); }
        .course-nav { height: 100%; overflow-y: auto; padding: 25px; }
        .nav-cat { font-size: 0.75rem; color: var(--primary); margin: 30px 0 15px 5px; font-weight: 950; border-left: 5px solid var(--primary); padding-left: 12px; }
        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; background: rgba(255,255,255,0.06); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 1000; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(230px + var(--safe-bottom)); }
        .screen { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #slide-view { width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .label-unit { position: absolute; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: var(--primary); padding: 15px 35px; border-radius: 20px; font-weight: 1000; font-size: 1.6rem; border: 3px solid var(--primary); box-shadow: 0 30px 80px rgba(0,0,0,0.8); z-index: 1001; text-align: center; max-width: 85%; }
        .console { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 23, 42, 0.98); padding: 28px; 
            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.3rem; line-height: 1.6; height: 110px; overflow-y: auto; color: #fff; font-weight: 500; margin: 15px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 400px) { .header-info { font-size: 0.85rem !important; } .label-unit { font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div id="splash" onclick="goStudy()">
        <div style="width: 85%">
            <p style="color:var(--primary); font-weight:1000; letter-spacing:8px; margin-bottom:15px; font-size:0.9rem;">1142 | EXAM LEAK V5.1</p>
            <h1 style="font-size:2.8rem; line-height:1.2; margin:15px 0; background:linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:1000;">人際關係與協商<br><span style="font-size:2.2rem; color:var(--primary); text-shadow:0 0 20px rgba(251,191,36,0.3);">面授魔鬼終極版 V5.1</span></h1>
            <div style="background:var(--danger); color:white; padding:10px 35px; border-radius:12px; font-size:1.3rem; font-weight:900; display:inline-block; margin-top:10px;">補齊錄音所有「啞鈴、核心、三要素」細節</div>
            <br><button class="btn-gold" style="margin-top:50px;">🏆 就緒</button>
        </div>
    </div>
    <header class="header">
        <button onclick="toggleSidebar()" style="background:var(--primary); border:none; padding:12px 25px; border-radius:15px; font-weight:1000; font-size:0.9rem;">☰ 考點導航</button>
        <div class="header-info" style="color:var(--primary); font-weight:1000; font-size:1rem; text-align:center; flex:1; padding:0 10px;">面授實錄補完：核心特質實驗與連接性原則已加入</div>
        <div style="background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:50px; border:2px solid var(--primary); display:flex; align-items:center; gap:8px;"><input type="range" id="rate" min="0.5" max="2.0" value="1.3" step="0.1" style="width:50px; accent-color:var(--primary)"></div>
    </header>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"><div class="course-nav" id="nav"></div></aside>
        <main class="viewport">
            <div class="screen"><div id="slide-view"></div><div id="overlay-layer" style="position:absolute; inset:0; pointer-events:none; display:flex; justify-content:center; align-items:center;"></div></div>
            <div class="console">
                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1rem;" id="cat-title">解釋名詞 25%</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 35</span></div>
                <div id="lecture-content" class="text-body">。</div>
                <div class="nav-btns">
                    <button class="control-btn" onclick="prev()">⬅ 上一頁</button>
                    <button class="control-btn" onclick="next(cuI+1)">下一頁 ➡</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "解釋名詞 (25%)", title: "📝 艾里斯 10 大不合理信念", img: "albert_ellis_rational_emotive_background_1775990617583.png", labels: ["不合理信念"], text: "艾里斯：樣樣精通才有價值、事情不如意就很糟、逃避問題、過去決定現在、求完美解答。錄音提到：這些是主觀情緒困擾的根源。" },
            { cat: "解釋名詞 (25%)", title: "📝 自我概念 (Self-Concept)", img: "defense_mechanism_crystal_shield_1776041117465.png", labels: ["概括性看法"], text: "自我概念：是指個人對自己持有的概括性看法，即定義「我是怎樣的人」。受特定他人(家長)與一般他人(社會觀點)影響。" },
            { cat: "解釋名詞 (25%)", title: "📝 內外控與負面情感", img: "attribution_theory_cause_effect_links_1776041098952.png", labels: ["負面情感傾向"], text: "內控：操之在我。外控：操之在天。負面情感：指一個人容易產生厭惡、緊張、憂慮或憤怒情緒的傾向。" },
            { cat: "解釋名詞 (25%)", title: "📝 特定他人 vs. 一般他人", img: "first_impression_spark_labels_1776042502128.png", labels: ["重要他人"], text: "特定他人：如父母家人。一般他人：社會期待與規範的內化。錄音提到以前男主外女主內的刻板印象已隨時代改變。" },
            { cat: "解釋名詞 (25%)", title: "📝 月暈效應 (Halo Effect)", img: "halo_effect_glowing_aura_bias_1776041171942.png", labels: ["以偏概全"], text: "月暈效應：因單一顯著優點(如帥)擴張評價導致以偏概全。高估對方的整體學歷或能力。" },
            { cat: "解釋名詞 (25%)", title: "📝 核心特質實驗 (重要!)", img: "halo_effect_glowing_aura_bias_1776041171942.png", labels: ["冷淡 vs. 熱誠"], text: "實驗關鍵：熱誠/冷淡會改變全盤評價，是核心特質。粗魯/禮貌則對整體印象影響不大。我們看人主要是抓這幾個核心。" },
            { cat: "解釋名詞 (25%)", title: "📝 印象整飾 (Impression Management)", img: "goffman_dramaturgy_theater_stage_1776041066626.png", labels: ["控制形象"], text: "印象整飾：意圖控制他人對我們形象的知覺。錄音提到：我們常藉此建立一致的公共形象來獲得報酬。" },
            { cat: "解釋名詞 (25%)", title: "📝 認知的場地獨立與依賴", img: "attribution_theory_cause_effect_links_1776041098952.png", labels: ["場地獨立/依賴"], text: "場地獨立型：不受外界干擾，自我導向。場地依賴型：受環境與他人意見影響較大。" },
            { cat: "解釋名詞 (25%)", title: "📝 認知環化型 vs. 簡化型", img: "attribution_theory_cause_effect_links_1776041098952.png", labels: ["環化 vs. 簡化"], text: "環化型：把人想得複雜(他講這話有陰謀?)。簡化型：把人想得簡單(他說什麼就是什麼)。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 馬斯洛需求層級理論", img: "maslow_pyramid_stomach_to_god_1776041006784.png", labels: ["生理➔自我實現"], text: "馬斯洛五層次：生理(肚子世界)、安全、社會(愛與歸屬)、自尊、自我實現(神仙世界)。生理需求包含食與性。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 圓融人際六要訣", img: "roundness_secrets_enso_circle_1776041217719.png", labels: ["尊笑口心度腳"], text: "圓融六要訣：尊(尊重)、笑(笑容)、口(口齒圓潤/讚美)、心(誠意)、度(寬容)、腳(腳勤/腳蹲謙虛)。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 知覺組織五大原則", img: "attribution_theory_cause_effect_links_1776041098952.png", labels: ["接/相/連/閉/接"], text: "組織原則：一、接近性。二、相似性。三、連續性。四、閉合性(缺口補齊)。五、連接性(啞鈴效應)。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 知覺評價與對比效應", img: "halo_effect_glowing_aura_bias_1776041171942.png", labels: ["對比/恆常/整體"], text: "評價特徵：知覺對比(190公分例子)、知覺選擇性(花瓶臉)、知覺恆常性(一扇門)、知覺整體性。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 凱利歸因三維論", img: "attribution_theory_cause_effect_links_1776041098952.png", labels: ["區別/一致/普遍"], text: "凱利歸因：一、區別性(這事不同嗎)。二、一致性(以前一樣嗎)。三、普遍性(別人都這樣嗎)。這三者決定內/外因。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 壓力管理的五大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", labels: ["消除/幽默/支持"], text: "壓力策略：一、消除壓力源(治本)。二、發現幽默。三、社會支持。四、調整認知。五、放鬆技巧(肌肉鬆弛法)。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 影響人際吸引的因素", img: "heider_pox_balance_triad_1776041022011.png", labels: ["時空/個人/適配"], text: "吸引三因素：一、情境因素(近水樓台)。二、個人因素(外表、個性、仰巴腳能力)。三、適配因素(相似與互補)。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 得寸進尺 vs. 漫天要價", img: "foot_in_the_door_vs_face_concept_1776042490769.png", labels: ["小要求➔大要求"], text: "得寸進尺(小狗爬床)。漫天要價(先提大被拒再收小)。前提：開價不能毀形象，且必須對同一對象。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 中國人的人情與面子", img: "roundness_secrets_enso_circle_1776041217719.png", labels: ["人情三意涵"], text: "人情：一、情感。二、社會資源(討人情)。三、社會規範(相處之道)。面子是社會聲望指標。杜月笙：人面、場面、情面。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 TA 溝通分析的三種型態", img: "ta_pac_model_diagram_circles_1776041140078.png", labels: ["互補/交錯/隱藏"], text: "溝通型態：互補式(順暢)、交錯式(如上次對下屬用理性但下屬用情緒，導致衝突)、隱藏式(表面理性暗地操弄)。" },
            { cat: "問答題 (75%)大題專攻", title: "📝 改進電話溝通三要素", img: "nonverbal_emblems_hand_gestures_1776041154779.png", labels: ["接聽三要素"], text: "電話技巧：前 30 秒最重要。留言三要素：姓名、電話、事由。即便看不到，肢體語言(微笑)也會傳達誠意。" },
            { cat: "魔鬼錄音數據", title: "📊 運動 333 定義", img: "stress_measurement_gauge_srrs_1776041191104.png", labels: ["週3/30分/130次"], text: "運動 333：一週 3 次、每次 30 分鐘、心跳 130 下。這是維持代謝平衡的錄音數據考點。" },
            { cat: "魔鬼錄音數據", title: "📊 SRRS 與 93% 定律", img: "stress_measurement_gauge_srrs_1776041191104.png", labels: ["200-299 分"], text: "SRRS：200-299 屬中度危機。梅拉賓定律：非語言訊息傳遞情感佔比高達 93%。" },
            { cat: "魔鬼錄音數據", title: "📊 愛情六型態 (雷斯 Lee)", img: "sternberg_love_triangle_diagram_1776041022011.png", labels: ["六種愛"], text: "愛情六型態：友誼、激情、佔有、無私、現實、情人。不同文化與人格會展現不同愛情風貌。" },
            { cat: "考前戰術叮嚀", title: "🏆 千萬不可留白", img: "exam_success_golden_trophy_100_1776041250115.png", labels: ["寫大標必拿分"], text: "戰術：不可留白！老師親口說：只要寫個七八成，意思對了就給 5 分滿分。他在改考卷時會找大標題關鍵字。" },
            { cat: "考前戰術叮嚀", title: "🏆 閉卷考試心法", img: "exam_success_golden_trophy_100_1776041250115.png", labels: ["大腦地圖"], text: "閉卷攻略：這份名單就是地圖。只要腦中掃描這些封神大標題，週六考試必封神！祝您與陳同學 100 分凱旋！" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(null, studyPlan[i].labels);
            document.getElementById('lecture-content').innerText=studyPlan[i].text;
            const u=new SpeechSynthesisUtterance(studyPlan[i].text); u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(sp, ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
