<!DOCTYPE html>

<head>

    <style>
        :root { 
            --primary: #fbbf24; --danger: #ef4444; --bg: #020617; --text: #f8fafc; 
            --safe-top: env(safe-area-inset-top, 50px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .header { 
            position: fixed; top: 0; left: 0; right: 0; padding-top: var(--safe-top); height: calc(88px + var(--safe-top));
            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; 
            padding-left: calc(15px + env(safe-area-inset-left)); padding-right: calc(15px + env(safe-area-inset-right)); z-index: 2000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
        }
        .wrapper { display: flex; height: 100%; padding-top: calc(88px + var(--safe-top)); box-sizing: border-box; }
        .sidebar { 
            position: fixed; left: -110%; top: 0; bottom: 0; width: 320px; background: rgba(11, 15, 26, 0.99); border-right: 1px solid rgba(251, 191, 36, 0.3); 
            z-index: 3000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding-top: calc(100px + var(--safe-top)); backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
        }
        .sidebar.open { left: 0; box-shadow: 40px 0 100px rgba(0,0,0,1); }
        .course-nav { height: 100%; overflow-y: auto; padding: 25px; }
        .nav-cat { font-size: 0.75rem; color: var(--primary); margin: 30px 0 15px 5px; font-weight: 950; border-left: 5px solid var(--primary); padding-left: 12px; }
        .nav-item { padding: 18px 24px; margin-bottom: 8px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; background: rgba(255,255,255,0.06); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 1000; }
        .viewport { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; padding-bottom: calc(230px + var(--safe-bottom)); }
        .screen { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #slide-view { width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .label-unit { position: absolute; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: var(--primary); padding: 15px 35px; border-radius: 20px; font-weight: 1000; font-size: 1.6rem; border: 3px solid var(--primary); box-shadow: 0 30px 80px rgba(0,0,0,0.8); z-index: 1001; text-align: center; max-width: 85%; }
        .console { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 23, 42, 0.98); padding: 28px; 
            border-radius: 36px; border-left: 14px solid var(--primary); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 3500; 
        }
        .text-body { font-size: 1.3rem; line-height: 1.6; height: 110px; overflow-y: auto; color: #fff; font-weight: 500; margin: 15px 0; }
        .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .control-btn { 
            background: rgba(255,255,255,0.08); color: var(--text); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 950; cursor: pointer; transition: 0.2s; 
        }
        .control-btn:active { transform: scale(0.92); background: var(--primary); color: #000; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 25px 90px; font-size: 2rem; font-weight: 1000; border-radius: 100px; cursor: pointer; box-shadow: 0 15px 40px rgba(251, 191, 36, 0.6); }
        #splash { position: fixed; inset: 0; background: #020617; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 400px) { .header-info { font-size: 0.85rem !important; } .label-unit { font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div id="splash" onclick="goStudy()">
        <div style="width: 85%">
            <p style="color:var(--primary); font-weight:1000; letter-spacing:8px; margin-bottom:15px; font-size:0.9rem;">1142 | FINAL MASTER EDITION V6.1</p>
            <h1 style="font-size:2.8rem; line-height:1.2; margin:15px 0; background:linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:1000;">人際關係與協商<br><span style="font-size:2.2rem; color:var(--primary); text-shadow:0 0 20px rgba(251,191,36,0.3);">圖文相符 36 頁 Elite 版</span></h1>
            <div style="background:var(--danger); color:white; padding:10px 35px; border-radius:12px; font-size:1.3rem; font-weight:900; display:inline-block; margin-top:10px;">100% 視覺精確對位 | 去個人化學術嚴謹</div>
            <br><button class="btn-gold" style="margin-top:50px;">🏆 開始複習</button>
        </div>
    </div>
    <header class="header">
        <button onclick="toggleSidebar()" style="background:var(--primary); border:none; padding:12px 25px; border-radius:15px; font-weight:1000; font-size:0.9rem;">☰ 學術索引</button>
        <div class="header-info" style="color:var(--primary); font-weight:1000; font-size:1rem; text-align:center; flex:1; padding:0 10px;">狀態：全量 36 考點圖文校對已完成</div>
        <div style="background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:50px; border:2px solid var(--primary); display:flex; align-items:center; gap:8px;"><input type="range" id="rate" min="0.5" max="2.0" value="1.3" step="0.1" style="width:50px; accent-color:var(--primary)"></div>
    </header>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"><div class="course-nav" id="nav"></div></aside>
        <main class="viewport">
            <div class="screen"><div id="slide-view"></div><div id="overlay-layer" style="position:absolute; inset:0; pointer-events:none; display:flex; justify-content:center; align-items:center;"></div></div>
            <div class="console">
                <div style="display:flex; justify-content:space-between; align-items:center"><span style="color:var(--primary); font-weight:1000; font-size:1rem;" id="cat-title">-</span><span id="page-num" style="background:#1e40af; padding:6px 16px; border-radius:12px; font-size:0.9rem; font-weight:1000;">1 / 36</span></div>
                <div id="lecture-content" class="text-body">。</div>
                <div class="nav-btns">
                    <button class="control-btn" onclick="prev()">⬅ 上一頁</button>
                    <button class="control-btn" onclick="next(cuI+1)">下一頁 ➡</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "基礎概念", title: "1. 人際關係定義", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["廣義與狹義定義"], txt: "是指人與人之間交互影響的社會歷程。狹義指朋友與同事之互動；廣義涉及整體社會影響。" },
            { cat: "基礎概念", title: "2. 溝通定義", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["溝通的正式定義"], txt: "經由語言或非語言管道，將意見、態度、情感傳遞給對方的歷程。訊息傳遞為其核心。" },
            { cat: "基礎概念", title: "3. 溝通歷程模式", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["發送/管道/噪音/回饋"], txt: "溝通要素包含：傳送者、信息、管道、接收者。錄音強調噪音對於溝通效能的干擾。" },
            { cat: "自我覺察", title: "4. 周哈里窗 (Johari Window)", img: "johari_window_modern_diagram_1776040990674.png", ls: ["周哈里窗四個區域"], txt: "分析自我覺察之模型。必考四區：開放區、盲目區、隱藏區、未知區。重點在於提升自我覺察。" },
            { cat: "自我覺察", title: "5. 艾里斯 10 大不合理信念", img: "albert_ellis_rational_emotive_background_1775990617583.png", ls: ["艾里斯不合理信念"], txt: "情緒困擾之根源。包含：要求每個人都愛我、一定要樣樣精通、過去決定現在等偏誤。" },
            { cat: "自我覺察", title: "6. 自我概念 (Self-Concept)", img: "defense_mechanism_crystal_shield_1776041117465.png", ls: ["自我概念學術定義"], txt: "個人對自己持有的概括性看法，即定義「我是怎樣的人」。受他人評價與社會期待所塑造。" },
            { cat: "人格/認知", title: "7. 內控性格 vs. 外控性格", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內控 vs. 外控性格"], txt: "內控：相信努力可控制命運。外控：相信命運受天命、神等第三者控制。錄音指出外控者壓力較重。" },
            { cat: "人格/認知", title: "8. 負面情感 (Negative Affect)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["負面情感傾向"], txt: "指一個人容易產生焦慮、緊張、憂慮或憤怒情緒狀態的人格傾向。與壓力感受力高度相關。" },
            { cat: "人格/認知", title: "9. 場地獨立與依賴型", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["場地獨立與依賴型"], txt: "場地獨立型不受外界視覺背景干擾；場地依賴型易受環境與他人意見影響。影響知覺精確度。" },
            { cat: "人格/認知", title: "10. 沉思型與衝動型", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["沉思型與衝動型"], txt: "決定反應速度差異。沉思型決策慢而準；衝動型快而易產生錯誤判斷。反映認知處理風格。" },
            { cat: "人格/認知", title: "11. 環化型與簡化型認知", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["環化型與簡化型"], txt: "環化型把訊息複雜化(多疑)；簡化型按字面解讀。此兩者顯著影響解碼與回饋質量。" },
            { cat: "知覺過程", title: "12. 知覺產生三步驟", img: "nonverbal_mircro_expressions_eye_1776041233563.png", ls: ["知覺產生三步驟"], txt: "學術大標題：感覺(五官接觸) ➔ 組織(邏輯整理) ➔ 評價(形成內在印象)。" },
            { cat: "知覺過程", title: "13. 接近原則與相似原則", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["接近原則與相似原則"], txt: "接近性：距離近的看成一組。相似性：形狀特徵相同的看成一組。為組織知覺的核心。" },
            { cat: "知覺過程", title: "14. 連續原則與閉合原則", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["連續原則與閉合原則"], txt: "連續性：看成連續線段。閉合性：將有缺口的圖形在認知上補全。體現大腦自動補完機制。" },
            { cat: "知覺過程", title: "15. 第一印象 (Initial Impression)", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["第一印象"], txt: "初次接觸根據衣著、談吐、外顯行為做出的整體評價。面授強調外觀對後續知覺路徑的引導。" },
            { cat: "知覺過程", title: "16. 連接性原則 (連貫性)", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["連接性原則 (連貫性)"], txt: "錄音重點：若兩個物件被線條連結(如啞鈴)，會被視為一體。這是知覺組織的補充原則。" },
            { cat: "知覺評價", title: "17. 月暈效應與刻板印象", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["月暈效應與刻板印象"], txt: "月暈：因單一優點擴大整體評價。刻板：將特徵標記在團體標籤上(如：男主外)。皆為知覺偏誤。" },
            { cat: "知覺評價", title: "18. 知覺對比效應 (Contrast)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["知覺對比效應"], txt: "解釋名詞考點：190公分在凡人中顯高，在NBA中顯矮。知覺受周遭背景對比與參考架構影響。" },
            { cat: "知覺評價", title: "19. 核心特質實驗", img: "halo_effect_glowing_aura_bias_1776041171942.png", ls: ["核心特質實驗 (熱誠/冷淡)"], txt: "核心重點：熱誠與冷淡是決定整體印象的核心，其影響力遠比禮貌或粗魯等周邊特質強大。" },
            { cat: "歸因理論", title: "20. 內在歸因與外在歸因", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["內在歸因與外在歸因"], txt: "歸因為推論行為背後原因。內在歸因為性格能力；外在歸因為環境與運氣。影響自我效能。" },
            { cat: "歸因理論", title: "21. 凱利三維歸因論", img: "attribution_theory_cause_effect_links_1776041098952.png", ls: ["凱利三維歸因論指標"], txt: "數據化歸因指標：區別性(對這事不同?)、一致性(以前都這樣?)、普遍性(別人都這樣?)。" },
            { cat: "印象管理", title: "22. 印象整飾之功能", img: "goffman_dramaturgy_theater_stage_1776041066626.png", ls: ["印象整飾之五大功能"], txt: "控制他人對我們知覺的過程。功能：維持自尊、界定互動、影響力、符合角色期望、形象穩定。" },
            { cat: "壓力管理", title: "23. 社會再適應量表 (SRRS)", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["社會再適應量表關鍵數值"], txt: "數據考點：200-299 分屬中度生活危機。最高分為配偶死亡。量化長期生活壓力負荷。" },
            { cat: "壓力管理", title: "24. 壓力管理五大策略", img: "stress_measurement_gauge_srrs_1776041191104.png", ls: ["壓力管理五大正式策略"], txt: "問答大題：消除壓力源(最治本)、發揮幽默、社會支持、調整認知、放鬆技巧(如腹式呼吸)。" },
            { cat: "人際吸引", title: "25. 人際吸引影響因素", img: "heider_pox_balance_triad_1776041038324.png", ls: ["人際吸引影響因素"], txt: "問答大題：一、情境因素(接近)。二、個人因素(外表/能力)。三、適配因素(相似與互補)。" },
            { cat: "人際吸引", title: "26. 仰巴腳效應 (Pratfall)", img: "pratfall_effect_clumsy_elite_1776041082459.png", ls: ["仰巴腳效應 (出醜效應)"], txt: "解釋名詞考點：能力卓越者偶爾犯小錯誤，反而增加親和力，避免產生防衛性嫉妒。" },
            { cat: "人際吸引", title: "27. 海德 POX 平衡理論", img: "heider_pox_balance_triad_1776041038324.png", ls: ["海德 POX 平衡理論"], txt: "三方關係(P-O-X)乘積為「正」則平衡。體現人際互動中的認知相符與穩定性。" },
            { cat: "愛情研究", title: "28. 愛情三因論 (Sternberg)", img: "sternberg_love_triangle_diagram_1776041022011.png", ls: ["愛情三因論"], txt: "三元素：激情、親密、責任(決心)。不同年齡比重不同(如40歲責任增加，20歲激情為主)。" },
            { cat: "愛情研究", title: "29. 愛情六型態 (Lee)", img: "sternberg_love_triangle_diagram_1776041022011.png", ls: ["雷斯愛情六型態"], txt: "研究分類：友誼、激情、佔有、無私、現實、情人之愛。反映不同的人格特質與社會化背景。" },
            { cat: "溝通技能", title: "30. 圓融人際六要訣", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["圓融人際六要訣 (私房)"], txt: "口訣：尊(尊重)、笑(笑臉)、口(讚美)、心(誠意)、度(寬容)、腳(謙虛腳勤)。老師私房考點。" },
            { cat: "溝通技能", title: "31. 非語言溝通與梅拉賓定律", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["非語言溝通與梅拉賓定律"], txt: "非語言傳遞訊息佔比高達 93%。具備高度模糊、持續、多管道、內隱情緒強烈與文化差異特質。" },
            { cat: "溝通技能", title: "32. 溝通分析 PAC 狀態", img: "ta_pac_model_diagram_circles_1776041140078.png", ls: ["溝通分析 PAC 心理狀態"], txt: "分析個人溝通時的心理狀態：父母(P/權威)、成人(A/理性)、兒童(C/衝動)。決定互動的平衡性。" },
            { cat: "溝通技能", title: "33. 職場電話留言三要素", img: "nonverbal_emblems_hand_gestures_1776041154779.png", ls: ["職場電話留言三要素"], txt: "面授錄音實務點：前 30 秒決定好感與專業度。留言條必須具備：姓名、電話、具體事由。" },
            { cat: "社會文化", title: "34. 人情三意涵與面子性格", img: "roundness_secrets_enso_circle_1776041217719.png", ls: ["人情三意涵與面子性格"], txt: "人情含：情感、資源與規範。面子是聲望地位指標。杜月笙原話：人面、場面、情面最難吃。" },
            { cat: "社會文化", title: "35. 得寸進尺與漫天要價", img: "foot_in_the_door_vs_face_concept_1776042490769.png", ls: ["得寸進尺與漫天要價"], txt: "社會影響策略。得寸進尺(先小後大)；漫天要價(先大後小)。依賴社會補償與公共形象機制。" },
            { cat: "最終叮嚀", title: "36. 期中考戰術：千万不留白", img: "exam_success_golden_trophy_100_1776041250115.png", ls: ["期中考戰術叮嚀"], txt: "考場心法：大標題對七八成就給分。不要拘泥文字，寫出關鍵術語、英文名稱與數據即是高分保證。" }
        ];
        let cuI = -1; let timer = null; const synth = window.speechSynthesis;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function goStudy() { document.getElementById('splash').style.display='none'; build(); next(0); }
        function build() { const nav=document.getElementById('nav'); let nl=''; let lc=''; studyPlan.forEach((d,i)=>{ if(d.cat!==lc){ nl+=`<div class="nav-cat">${d.cat}</div>`; lc=d.cat; } nl+=`<div class="nav-item" id="ni-${i}" onclick="next(${i})">${d.title}</div>`; }); nav.innerHTML=nl; }
        function next(i) {
            if(i<0 || i>=studyPlan.length) return; cuI=i; clearTimer(); synth.cancel();
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
            const tg=document.getElementById(`ni-${i}`); if(tg) tg.classList.add('active');
            document.getElementById('page-num').innerText=`${i+1} / ${studyPlan.length}`;
            document.getElementById('cat-title').innerText=studyPlan[i].cat + " | " + studyPlan[i].title;
            document.getElementById('slide-view').style.backgroundImage=`url('${studyPlan[i].img}')`;
            renderOverlay(studyPlan[i].ls);
            document.getElementById('lecture-content').innerText=studyPlan[i].txt;
            const u=new SpeechSynthesisUtterance(studyPlan[i].title + "。" + studyPlan[i].txt); u.lang='zh-TW'; u.rate=parseFloat(document.getElementById('rate').value);
            u.onend=()=>{ if(cuI<studyPlan.length-1) timer=setTimeout(()=>next(cuI+1), 4500); }; synth.speak(u);
            const side=document.getElementById('sidebar'); if(window.innerWidth < 1024) side.classList.remove('open');
        }
        function prev() { if(cuI>0) next(cuI-1); }
        function clearTimer() { if(timer) { clearTimeout(timer); timer=null; } }
        function renderOverlay(ls) { const l=document.getElementById('overlay-layer'); l.innerHTML=''; let its=''; if(ls) { ls.forEach(t=>{its+=`<div class="label-unit">${t}</div>`}); } l.innerHTML=its; }
    </script>
</body>
</html>
