<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fbbf24;
            --primary-glow: rgba(251, 191, 36, 0.4);
            --secondary: #6366f1;
            --accent: #f472b6;
            --bg-dark: #05070a;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* 背景流光效果 */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(244, 114, 182, 0.1) 0%, transparent 40%);
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: calc(70px + var(--safe-top));
            padding-top: var(--safe-top);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 20px;
            padding-right: 20px;
            background: rgba(5, 7, 10, 0.82);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(135deg, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge-live {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .menu-btn {
            background: var(--surface);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-btn:hover {
            background: var(--primary);
            color: #000;
            transform: translateY(-2px);
        }

        .app-container {
            display: flex;
            height: 100vh;
            padding-top: calc(70px + var(--safe-top));
        }

        .sidebar {
            width: 320px;
            background: rgba(10, 15, 25, 0.8);
            border-right: 1px solid var(--glass-border);
            overflow-y: auto;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            position: absolute;
            left: -320px;
            top: 0;
            bottom: 0;
            z-index: 2000;
            backdrop-filter: blur(35px);
        }

        .sidebar.active {
            left: 0;
        }

        .nav-content {
            padding: 20px;
            padding-top: calc(100px + var(--safe-top));
        }

        .nav-group-title {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 900;
            margin: 24px 0 12px 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-card {
            background: var(--surface);
            margin-bottom: 8px;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-card:hover {
            background: var(--surface-hover);
            border-color: var(--primary-glow);
            transform: translateX(5px);
        }

        .nav-card.active {
            background: linear-gradient(135deg, var(--primary), #d97706);
            color: #000;
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.3);
            border: none;
        }

        .nav-card.active .nav-subtitle {
            color: rgba(0,0,0,0.6);
        }

        .nav-title {
            font-weight: 800;
            font-size: 0.95rem;
        }

        .nav-subtitle {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .main-view {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .slide-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #111, #000);
        }

        #current-slide {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.7));
            border-radius: 12px;
        }

        .overlay-tags {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            z-index: 10;
            padding: 20px;
        }

        .data-tag {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 950;
            font-size: 1.8rem;
            border: 4px solid #fff;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transform: scale(0);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            max-width: 90%;
            word-break: break-all;
        }

        .data-tag.show {
            transform: scale(1);
        }

        .control-panel {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border);
            padding: 30px;
            padding-bottom: calc(30px + var(--safe-bottom));
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 50;
        }

        .lecture-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .role-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            font-weight: 900;
            font-size: 0.95rem;
            background: rgba(251, 191, 36, 0.1);
            padding: 6px 15px;
            border-radius: 50px;
        }

        .progress-text {
            background: rgba(99, 102, 241, 0.15);
            color: var(--secondary);
            padding: 6px 15px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.85rem;
        }

        .lecture-text {
            font-size: 1.3rem;
            line-height: 1.8;
            font-weight: 500;
            color: #fff;
            max-height: 140px;
            overflow-y: auto;
            scrollbar-width: thin;
            padding-right: 10px;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-top: 10px;
        }

        .circle-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--surface);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .circle-btn:hover {
            background: var(--surface-hover);
            transform: scale(1.15) translateY(-3px);
            border-color: var(--primary);
        }

        .circle-btn.play {
            width: 75px;
            height: 75px;
            background: var(--primary);
            color: #000;
            font-size: 2rem;
            border: none;
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .splash-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .splash-content {
            max-width: 600px;
        }

        .splash-title {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 25px 0;
            line-height: 1.1;
            background: linear-gradient(135deg, #fff 40%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .start-btn {
            background: var(--primary);
            color: #000;
            padding: 24px 90px;
            border-radius: 100px;
            font-size: 2rem;
            font-weight: 950;
            border: none;
            cursor: pointer;
            box-shadow: 0 15px 50px var(--primary-glow);
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            margin-top: 50px;
        }

        .start-btn:hover {
            transform: scale(1.08) translateY(-8px);
            box-shadow: 0 25px 70px var(--primary-glow);
        }

        /* 橫向模式與移動端最適化 */
        @media (orientation: landscape) {
            .app-container {
                flex-direction: row;
            }
            .sidebar {
                position: relative;
                left: 0;
                width: 260px;
                background: rgba(10, 15, 25, 0.5);
            }
            .control-panel {
                position: absolute;
                bottom: 15px;
                right: 15px;
                width: 380px;
                border: 1px solid var(--glass-border);
                border-radius: 15px;
                box-shadow: 0 30px 80px rgba(0,0,0,0.9);
                padding: 15px;
                gap: 8px;
            }
            .lecture-text {
                max-height: 70px;
                font-size: 0.95rem;
                line-height: 1.5;
            }
            .circle-btn {
                width: 38px;
                height: 38px;
                font-size: 0.9rem;
            }
            .circle-btn.play {
                width: 50px;
                height: 50px;
                font-size: 1.3rem;
            }
            .lecture-header {
                font-size: 0.8rem;
            }
            .role-badge {
                padding: 4px 10px;
                font-size: 0.8rem;
            }
            /* 橫屏時隱藏語速條以騰出空間 */
            #speech-rate-container {
                display: none !important;
            }
        }

        @media (max-width: 768px) {
            .header {
                height: calc(60px + var(--safe-top));
            }
            .app-container {
                padding-top: calc(60px + var(--safe-top));
            }
            .splash-title { font-size: 2.2rem; }
            .start-btn { padding: 18px 60px; font-size: 1.5rem; }
            
            .data-tag { 
                font-size: 1.4rem; 
                padding: 10px 20px; 
                border-width: 3px;
                border-radius: 12px;
            }
            
            .control-panel {
                padding: 20px;
                padding-bottom: calc(15px + var(--safe-bottom));
                gap: 12px;
            }
            
            .lecture-text { 
                font-size: 1.05rem; 
                max-height: 100px;
                line-height: 1.6;
            }
            
            .controls-row {
                gap: 15px;
            }
            
            .circle-btn {
                width: 50px;
                height: 50px;
                font-size: 1.1rem;
            }
            
            .circle-btn.play {
                width: 65px;
                height: 65px;
                font-size: 1.6rem;
            }

            .logo-text {
                font-size: 1.1rem;
            }
            
            /* 防止 Dynamic Island 遮擋目錄按鈕 */
            .menu-btn {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
        }

        /* 針對 iPhone 15 Pro 等具有特定瀏海/靈動島的手機進行極致適配 */
        @supports (padding: env(safe-area-inset-top)) {
            .header {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
            }
            .control-panel {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="splash" class="splash-screen">
        <div class="splash-content">

                <span style="background:rgba(99, 102, 241, 0.1); color:var(--secondary); padding:8px 18px; border-radius:10px; font-size:0.85rem; font-weight:700;">考古 100% 命中</span>

    <script>
        const studyPlan = [
            { cat: "數據戰略", title: "🚩 ALPHA：否定陷阱生存指南", img: "gender_health_balance_1775873567230.png", labels: ["看清何者錯誤"], text: "各位英雄學員，我是學長助教。細節決定成敗！大數據顯示本門課『何者錯誤』題型極多。看到健康是個人努力、或是醫療中性的選項，請直接果斷打大叉。社會建構才是奪冠關鍵字！4月25日當天見分曉。" },
            { cat: "第一章：辨析", title: "💡 補丁：性別矛盾與米德研究", img: "ch1_theory_chart_tw_1775878090737.png", labels: ["女性矛盾", "米德部族"], text: "請注意：Sex 是先天硬體，Gender 是後天教育編寫的軟體。第一章兩大海域：1. 女性矛盾（女性長壽但病痛多）。2. 米德的紐幾內亞研究：證明性別特質是文化編排，不是基因決定。記住：性別不是天生，是演出來的。" },
            { cat: "第一章：辨析", title: "🧬 四大理論：絕對時序排序", img: "ch1_master_theory_tw_1775901143741.png", special: "theory", text: "排序題帝王：心理動力、社會學習、認知發展、女性主義。順序：心、社、認、女！出題老師最愛考這組時序，加上幼兒在 4 到 5 歲達成性別恆定。這組數據點必須拿滿分。" },
            { cat: "第二章：權重最高", title: "🥗 多元模式：沙拉盤與全球在地化", img: "salad_bowl_multiculturalism_1775873580685.png", labels: ["沙拉盤=尊重", "Glocalization"], text: "模式對比：大熔爐是強迫同化，沙拉盤才是多元並存的真理。全球在地化 Glocalization 則是跨國品牌與在地口味的結合，如米漢堡或泰國叔叔合掌。這是 1132 年度最有份量的熱點！" },
            { cat: "第二章：權重最高", title: "🏺 泰勒：承認的政治與正名", img: "ch2_political_concept_tw_1775901180201.png", labels: ["去商品化", "承認尊嚴"], text: "泰勒主張：弱勢要在公共領域獲得正名。正名新住民、正名原住民，都是為了去商品化與去歧視。這不只是改名，是為了換回本該有的『承認』與尊嚴。" },
            { cat: "第三章：法制紅線", title: "⚖️ CEDAW 與主流化六大工具", img: "cedaw_justice_symbol_1775875313437.png", labels: ["統析預評培機", "WID vs GAD"], text: "CEDAW 只保障婦女，追求結果公平。性別主流化有六大工具：統計、分析、預算、評估、培訓、機制。請避雷：配額制與抗爭『不』在裡面。另外，GAD 才是目前翻轉權力結構的主流理論！" },
            { cat: "第三章：法制紅線", title: "🪑 門檻數據：1/3 法定比例", img: "ch3_gender_quota_table_1775910362721.png", labels: ["委員會 1/3 下限"], text: "行政院所屬委員會任一性別比例不得低於三分之一。記住是為了實質平等的暫行措施。數字認準 1/3，不要錯選 1/4。" },
            { cat: "第四章：評估基準", title: "🔃 GIA 九字訣：事前預防屬性", img: "gia_process_flow_1775875345608.png", special: "gia", text: "口訣：需目溝行執檢。必須在計畫研擬初期『事前』啟動！溝通對象必須包含性平專家與婦女團體，絕對不能缺位。事後評估的選項都是錯誤陷阱。" },
            { cat: "第四章：評估基準", title: "🏥 醫療標準：AAAQ 與間接歧視", img: "ch4_aaa_standard_icons_1775909974764.png", special: "aaaq", text: "113 年度必考！可用、可及、可接受、品質。付錢能力是可及性。而間接歧視則指表面中立但結果不公平（如身高限制排擠女性）。這兩題型是拉開分數的關鍵關卡。" },
            { cat: "第四章：評估基準", title: "🛒 交織性：弱勢的乘積效應與 16 歲", img: "intersectionality_health_map_1775875386888.png", labels: ["16歲同意權", "性別×階級×族群"], text: "數據靶心：16 歲是性同意權界線，不是 18 歲。健康弱勢則是乘積效應，性別堆疊階級與族群時，痛苦加倍。必須採取交織性的眼光來看待健康不平等。" },
            { cat: "第五章：醫學靶心", title: "❤️ 女性心臟病：數據與非典型症狀", img: "female_heart_symptoms_1775875369499.png", special: "diabetes", text: "數據報警：糖尿病女性患心臟病風險是一般人的 3 到 7 倍。預測看 HDL 好膽固醇。發作時 92% 是下顎痛、背痛等非典型症狀，極易被庸醫誤讀。請看清這層性別濾鏡。" },
            { cat: "第五章：醫學靶心", title: "💀 死亡交叉：男骨折死 22% 與肺癌", img: "male_fragility_fracture_trap_1775875425752.png", labels: ["男死 22% > 女 15%", "尿道炎短直近"], text: "數字絕殺：男髖部骨折死亡率 22% 遠高於女性。肺癌則是女腺（與菸無關）男小（與菸有關）。女性生理構造短、直、近則導致尿道炎高發。這些生理本質 Sex 決定了醫學統計的差異。" },
            { cat: "第五章：醫學學報", title: "🧪 性別化創新：修正忽視女性的科學盲", img: "ch5_gendered_innovation_belt_1775910164894.png", labels: ["修正男體中心"], text: "性別化創新是為了修正以 70 公斤男性為標準的科學盲點。例如：藥物實驗應納入女性數據，安全帶應考量孕婦體型。它不是做美容，是為了讓女性不再被忽視。" },

            { cat: "考古命中", title: "🎯 命中 28：影子報告功能？", img: "ch3_ngo_shadow_report_1775910181779.png", labels: ["影子報告 Shadow"], text: "直接命中：監督政府 CEDAW 報告的人？就是 NGO 的影子報告。這是在數據庫中連續 5 年出現的考點。" },
            { cat: "考古命中", title: "🎯 命中 29：AAAQ 經濟面向？", img: "ch4_aaa_standard_icons_1775909974764.png", labels: ["選可及性"], text: "直接命中：付錢能力屬於？答：可及性 Accessibility。選品質或可用性的都是對數據理解不足。" },
            { cat: "考古命中", title: "🎯 命中 30：WHO 健康三位一體", img: "gender_health_balance_1775873567230.png", labels: ["生理+心理+社會適應"], text: "直接命中：不可缺少『社會適應』。三合一完整定義才是 100 分。少了社會適應就是殘缺選項。" },
            { cat: "考古命中", title: "🎯 命中 31：薪酬差距 85%", img: "ch4_wage_gap_unbalance_1775910196240.png", labels: ["選 85% 左右"], text: "直擊數據：台灣目前女性薪資約為男性的 85%。若題目問差距，請選最接近 85 的數字，這代表了結構性的同工不同酬現狀。" },
            { cat: "大終局", title: "🏆 引領全班勇奪 100 分傳奇！", img: "final_blessing_gold_1775901221619.png", labels: ["4月25日 滿分"], text: "恭喜！特訓完成。我們拿到了 Glocalization、1/3、16、22、85% 以及更年期增能核心。4 月 25 日，我們全班滿分榜單見。英雄們，出發奪冠！" }
        ];

        let currentIndex = -1;
        let isAutoPlaying = false;
        let speech = window.speechSynthesis;
        let voices = [];

        function init() {
            renderSidebar();
            loadVoices();
            if (speech.onvoiceschanged !== undefined) speech.onvoiceschanged = loadVoices;
            
            // 監聽螢幕旋轉
            window.addEventListener('resize', () => {
                if(window.innerWidth > 1024) document.getElementById('sidebar').classList.add('active');
            });
        }

        function loadVoices() {
            voices = speech.getVoices();
        }

        function renderSidebar() {
            const navList = document.getElementById('nav-list');
            let currentCat = "";
            
            studyPlan.forEach((item, index) => {
                if (item.cat !== currentCat) {
                    const groupTitle = document.createElement('div');
                    groupTitle.className = 'nav-group-title';
                    groupTitle.textContent = item.cat;
                    navList.appendChild(groupTitle);
                    currentCat = item.cat;
                }

                const card = document.createElement('div');
                card.className = 'nav-card';
                card.id = `nav-${index}`;
                card.innerHTML = `
                    <div class="nav-title">${item.title}</div>
                    <div class="nav-subtitle">${item.text.substring(0, 20)}...</div>
                `;
                card.onclick = () => jumpToSlide(index);
                navList.appendChild(card);
            });
        }

        function startApp() {
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            splash.style.transform = 'scale(1.1)';
            setTimeout(() => {
                splash.style.display = 'none';
                jumpToSlide(0);
                if(window.innerWidth > 1024) document.getElementById('sidebar').classList.add('active');
            }, 800);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('menu-icon').textContent = document.getElementById('sidebar').classList.contains('active') ? '✕' : '☰';
        }

        function jumpToSlide(index) {
            if (index < 0 || index >= studyPlan.length) return;
            
            currentIndex = index;
            speech.cancel();
            
            document.querySelectorAll('.nav-card').forEach(c => c.classList.remove('active'));
            const activeCard = document.getElementById(`nav-${index}`);
            if (activeCard) {
                activeCard.classList.add('active');
                if(!document.getElementById('sidebar').classList.contains('active') && window.innerWidth < 1024) {
                    // 點擊後自動收起目錄（手機版）
                }
            }

            document.getElementById('slide-progress').textContent = `${index + 1} / ${studyPlan.length}`;
            
            // 預載入圖片動畫
            const img = document.getElementById('current-slide');
            img.style.opacity = '0';
            img.src = studyPlan[index].img;
            img.onload = () => img.style.opacity = '1';

            document.getElementById('lecture-body').textContent = studyPlan[index].text;
            renderOverlay(studyPlan[index]);
            
            if (isAutoPlaying) playSpeech(studyPlan[index].text);
        }

        function renderOverlay(item) {
            const overlay = document.getElementById('overlay');
            overlay.innerHTML = '';
            
            let tags = [];
            if (item.special === 'theory') tags = ["心 ➔ 社 ➔ 認 ➔ 女"];
            if (item.special === 'kohlberg') tags = ["4-5 歲：恆定成熟點"];
            if (item.special === 'gia') tags = ["事前！需目溝行執檢"];
            if (item.special === 'diabetes') tags = ["糖尿病女：3 ~ 7 倍風險"];
            if (item.special === 'aaaq') tags = ["可用、可及、可接、品質"];
            if (item.labels) tags = [...tags, ...item.labels];

            tags.forEach((text, i) => {
                const tag = document.createElement('div');
                tag.className = 'data-tag';
                tag.textContent = text;
                overlay.appendChild(tag);
                setTimeout(() => tag.classList.add('show'), 200 * (i + 1));
            });
        }

        function playSpeech(text) {
            speech.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            const preferredVoice = voices.find(v => v.lang.includes('zh-TW') && (v.name.includes('Natural') || v.name.includes('Lekha') || v.name.includes('Yating')));
            if (preferredVoice) utter.voice = preferredVoice;
            
            utter.lang = 'zh-TW';
            utter.rate = document.getElementById('speech-rate').value;
            
            utter.onend = () => {
                if (isAutoPlaying && currentIndex < studyPlan.length - 1) {
                    setTimeout(() => jumpToSlide(currentIndex + 1), 1500);
                } else if (currentIndex === studyPlan.length - 1) {
                    isAutoPlaying = false;
                    updatePlayBtn();
                }
            };
            speech.speak(utter);
        }

        function toggleAuto() {
            isAutoPlaying = !isAutoPlaying;
            updatePlayBtn();
            if (isAutoPlaying) playSpeech(studyPlan[currentIndex].text);
            else speech.cancel();
        }

        function updatePlayBtn() {
            document.getElementById('play-btn').textContent = isAutoPlaying ? '⏸' : '▶';
        }

        function goNext() { if (currentIndex < studyPlan.length - 1) jumpToSlide(currentIndex + 1); }
        function goPrev() { if (currentIndex > 0) jumpToSlide(currentIndex - 1); }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'Enter') goNext();
            if (e.key === 'ArrowLeft') goPrev();
            if (e.key === ' ') { e.preventDefault(); toggleAuto(); }
        });

        init();
    </script>
</body>
</html>
