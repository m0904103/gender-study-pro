<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>114下學期 | 性別健康絕殺系統</title>
    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fbbf24;
            --secondary: #6366f1;
            --bg: #05070a;
            --card: rgba(255, 255, 255, 0.05);
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { 
            width: 100%; 
            height: 100%; 
            height: 100dvh;
            background: var(--bg); 
            color: #fff; 
            font-family: 'Noto Sans TC', sans-serif; 
            overflow: hidden; 
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            height: calc(60px + var(--safe-top));
            padding-top: var(--safe-top);
            background: rgba(10, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            padding-left: 15px; padding-right: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        .logo { font-family: 'Outfit', sans-serif; font-weight: 800; color: var(--primary); font-size: 1.2rem; }
        .menu-btn { 
            background: var(--primary); color: #000; border: none; 
            padding: 8px 15px; border-radius: 10px; font-weight: 900; font-size: 0.9rem;
        }
        .container {
            display: flex; height: 100%; padding-top: calc(60px + var(--safe-top));
        }
        .sidebar {
            position: fixed; left: -100%; top: 0; bottom: 0; width: 80%; max-width: 300px;
            background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(30px);
            z-index: 2000; transition: 0.3s; padding: 80px 20px 20px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar.active { left: 0; }
        .nav-item {
            background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px;
            font-weight: 700; border: 1px solid rgba(255,255,255,0.05);
        }
        .nav-item.active { background: var(--primary); color: #000; }
        .main { flex: 1; position: relative; display: flex; flex-direction: column; }
        .view-area { 
            flex: 1; display: flex; justify-content: center; align-items: center; 
            position: relative; padding: 20px;
        }
        #slide-img { max-width: 100%; max-height: 100%; border-radius: 15px; transition: 0.3s; opacity: 0; }
        .control-panel {
            background: rgba(15, 23, 42, 0.9); padding: 20px; padding-bottom: calc(20px + var(--safe-bottom));
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        #text-box { font-size: 1.1rem; line-height: 1.5; margin-bottom: 15px; height: 3.2em; overflow-y: auto; }
        .btns { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .btn-circle {
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            background: var(--card); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
        .btn-play { width: 60px; height: 60px; background: var(--primary); color: #000; border: none; font-size: 1.5rem; }
        .tags {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        .tag {
            background: #ef4444; color: #fff; padding: 5px 15px; border-radius: 8px;
            font-weight: 900; font-size: 1.2rem; border: 2px solid #fff;
            transform: scale(0); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .tag.show { transform: scale(1); }
        @media (orientation: landscape) {
            .sidebar { width: 200px; left: 0; position: relative; padding-top: 20px; }
            .header { display: none; }
            .container { padding-top: 0; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">114-2 MASTER</div>
        <button class="menu-btn" onclick="toggleMenu()">☰ 目錄</button>
    </header>
    <div class="container">
        <aside id="sidebar" class="sidebar"></aside>
        <main class="main">
            <div class="view-area">
                <img id="slide-img" src="">
                <div id="tag-area" class="tags"></div>
            </div>
            <div class="control-panel">
                <div id="text-box">點擊目錄開始特訓，目標 114 年下學期滿分！</div>
                <div class="btns">
                    <button class="btn-circle" onclick="prev()">⏮</button>
                    <button id="play-btn" class="btn-circle btn-play" onclick="togglePlay()">▶</button>
                    <button class="btn-circle" onclick="next()">⏭</button>
                    <input type="range" id="rate" min="0.8" max="2" step="0.1" value="1.3" style="width:50px; accent-color:var(--primary);">
                </div>
            </div>
        </main>
    </div>
    <script>
        const plan = [
            { title: "🏺 米德三部族性格解析", img: "ch1_theory_chart_tw_1775878090737.png", tags: ["阿:皆溫", "蒙:皆鬥", "德:反轉"], text: "114下特訓：米德研究證明性格是『文化編排』！阿拉佩什(兩性溫順)、蒙杜古馬(兩性好鬥)、德昌布利(女強男弱反轉)。打臉天生論最強武器！" },
            { title: "🛠️ 性別主流化六大工具", img: "cedaw_justice_symbol_1775875313437.png", tags: ["統析預評培機"], text: "滿分補強：統、析、預、評、培、機！⚠️ 掃雷注意：『配額制』或『保障名額』是暫行措施，不屬於核心工具箱，看到請直接秒殺它！" },
            { title: "🏥 AAAQ：可及性陷阱", img: "ch4_aaa_standard_icons_1775909974764.png", tags: ["付不起錢=可及性"], text: "老師提醒：『付不起錢/經濟負擔』屬於 Accessibility 可及性。這是 114 年考古題最愛挖的邏輯陷阱，千萬別選成品質問題！" },
            { title: "🦴 骨鬆紅線數據 T < -2.5", img: "male_fragility_fracture_trap_1775875425752.png", tags: ["T-score < -2.5"], text: "數據靶記：骨鬆確診分水嶺是 T-score 小於 -2.5。看到這道紅線別猶豫，數字題必拿分！" },
            { title: "🎯 絕殺觀念總結", img: "final_blessing_gold_1775901221619.png", tags: ["16歲同意", "男死22%", "GAD翻轉"], text: "最終校閱：16歲性同意、男髖部骨折死亡率22%、影子報告由 NGO 編寫。除了生理 Sex 數據，其餘選社會建構論。出發登頂封神榜！" }
        ];
        let idx = -1, isPlaying = false, synth = window.speechSynthesis;
        function renderNav() {
            const side = document.getElementById('sidebar');
            plan.forEach((p, i) => {
                const div = document.createElement('div'); div.className = 'nav-item'; div.id = 'nav-'+i;
                div.textContent = p.title; div.onclick = () => jump(i); side.appendChild(div);
            });
        }
        function jump(i) {
            idx = i; synth.cancel();
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-'+i).classList.add('active');
            const img = document.getElementById('slide-img'); img.style.opacity = '0';
            img.src = plan[i].img; img.onload = () => img.style.opacity = '1';
            document.getElementById('text-box').textContent = plan[i].text;
            renderTags(plan[i].tags);
            if (isPlaying) speak(plan[i].text);
            if (window.innerWidth < 768) toggleMenu();
        }
        function renderTags(ts) {
            const area = document.getElementById('tag-area'); area.innerHTML = '';
            ts.forEach((t, i) => {
                const tag = document.createElement('div'); tag.className = 'tag'; tag.textContent = t;
                area.appendChild(tag); setTimeout(() => tag.classList.add('show'), 200 * (i+1));
            });
        }
        function speak(t) {
            synth.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'zh-TW';
            u.rate = document.getElementById('rate').value;
            u.onend = () => { if (isPlaying && idx < plan.length - 1) setTimeout(() => jump(idx+1), 800); };
            synth.speak(u);
        }
        function togglePlay() { 
            isPlaying = !isPlaying; 
            document.getElementById('play-btn').textContent = isPlaying ? '⏸' : '▶';
            if (isPlaying && idx !== -1) speak(plan[idx].text); 
            else synth.cancel();
        }
        function next() { if (idx < plan.length - 1) jump(idx + 1); }
        function prev() { if (idx > 0) jump(idx - 1); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        // 強效初始化
        window.onload = () => { renderNav(); if (idx === -1) jump(0); };
    </script>
</body>
</html>
