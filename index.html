<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>性別健康多元文化 | 113年最新趨勢絕殺版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fbbf24;
            --primary-glow: rgba(251, 191, 36, 0.4);
            --secondary: #6366f1;
            --accent: #f472b6;
            --bg-dark: #05070a;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans TC', sans-serif; overflow: hidden; user-select: none; }
        .bg-glow { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%), radial-gradient(circle at 80% 80%, rgba(244, 114, 182, 0.1) 0%, transparent 40%); }
        .header { position: fixed; top: 0; left: 0; right: 0; height: calc(70px + var(--safe-top)); padding-top: var(--safe-top); display: flex; align-items: center; justify-content: space-between; padding-left: 20px; padding-right: 20px; background: rgba(5, 7, 10, 0.82); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .logo-text { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.4rem; background: linear-gradient(135deg, var(--primary), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .menu-btn { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 18px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .app-container { display: flex; height: 100vh; padding-top: calc(70px + var(--safe-top)); }
        .sidebar { width: 320px; background: rgba(10, 15, 25, 0.8); border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; transition: 0.4s; position: absolute; left: -320px; top: 0; bottom: 0; z-index: 2000; backdrop-filter: blur(35px); }
        .sidebar.active { left: 0; }
        .nav-content { padding: 20px; padding-top: 100px; }
        .nav-card { background: var(--surface); margin-bottom: 8px; padding: 14px; border-radius: 16px; cursor: pointer; }
        .nav-card.active { background: linear-gradient(135deg, var(--primary), #d97706); color: #000; }
        .main-view { flex: 1; position: relative; display: flex; flex-direction: column; background: #000; }
        .slide-container { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        #current-slide { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 12px; transition: 0.5s; }
        .control-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(30px); border-top: 1px solid rgba(255,255,255,0.1); padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .lecture-text { font-size: 1.3rem; line-height: 1.6; color: #fff; max-height: 120px; overflow-y: auto; }
        .overlay-tags { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; }
        .data-tag { background: linear-gradient(135deg, #ef4444, #b91c1c); color: #fff; padding: 8px 18px; border-radius: 12px; font-weight: 950; font-size: 1.5rem; border: 3px solid #fff; transform: scale(0); transition: 0.4s; }
        .data-tag.show { transform: scale(1); }
        @media (orientation: landscape) { .sidebar { position: relative; left: 0; width: 220px; } .control-panel { position: absolute; bottom: 10px; right: 10px; width: 320px; padding: 10px; border-radius: 15px; } .lecture-text { font-size: 0.9rem; max-height: 50px; } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <header class="header"><span class="logo-text">113 TREND MASTER</span><button class="menu-btn" onclick="toggleSidebar()">☰ 絕殺大綱</button></header>
    <div class="app-container">
        <aside id="sidebar" class="sidebar"><div id="nav-list" class="nav-content"></div></aside>
        <main class="main-view">
            <div class="slide-container"><img id="current-slide" src=""><div id="overlay" class="overlay-tags"></div></div>
            <div class="control-panel">
                <div id="lecture-body" class="lecture-text">系統拼圖中... 113 年滿分榜單見！</div>
                <div style="display:flex; justify-content:center; gap:20px;">
                    <button id="p-btn" style="background:var(--surface); color:white; border:1px solid rgba(255,255,255,0.1); width:50px; height:50px; border-radius:50%;" onclick="goPrev()">⏮</button>
                    <button id="play-btn" style="background:var(--primary); color:#000; border:none; width:65px; height:65px; border-radius:50%; font-size:1.5rem;" onclick="toggleAuto()">▶</button>
                    <button id="n-btn" style="background:var(--surface); color:white; border:1px solid rgba(255,255,255,0.1); width:50px; height:50px; border-radius:50%;" onclick="goNext()">⏭</button>
                    <input type="range" id="speech-rate" min="0.8" max="2" step="0.1" value="1.3" style="width:50px; accent-color:var(--primary);">
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "第一章", title: "🏺 米德三部族性格解析", img: "ch1_theory_chart_tw_1775878090737.png", labels: ["阿:皆溫", "蒙:皆鬥", "德:反轉"], text: "113年關鍵：米德研究證明性格是『文化編排』！阿拉佩什(兩性溫)、蒙杜古馬(兩性鬥)、德昌布利(女強男弱反轉)。打臉天生論的最強證據！" },
            { cat: "第二章", title: "🥗 全球在地化：113年爆量點", img: "salad_bowl_multiculturalism_1775873580685.png", labels: ["品牌+在地文化", "113年命中8次"], text: "113年趨勢：看到跨國品牌加上在地文化即為答案！實例：麥當勞米漢堡、泰國合掌麥當勞叔叔、勞動部多國語言職安手冊。認準實務標籤！" },
            { cat: "第三章", title: "⚖️ 主流化六大金剛", img: "cedaw_justice_symbol_1775875313437.png", labels: ["統析預評培機"], text: "絕殺清單：統、析、預、評、培、機！注意地雷：選項出現『配額制』或『保障名額』通通不是核心工具，那是暫行特別措施。" },
            { cat: "第四章", title: "🧩 交織性：113年靈議題型", img: "intersectionality_health_map_1775875386888.png", labels: ["性別x階級x族群"], text: "113年進化：健康弱勢是『乘積效應』！如偏鄉低收原民婦女多重受阻。不再考定義，考的是多元交叉的邏輯識別。" },
            { cat: "第五章", title: "🧬 113年醫學趨勢：女腺男小", img: "ch5_gendered_innovation_belt_1775910164894.png", labels: ["女肺腺癌", "男小細胞"], text: "113年絕殺：113-Q11肺癌型態？認準「女腺男小」！女性主得肺腺癌(與菸無關)；男性主得小細胞/鱗狀癌(與菸有關)。成因絕不相同！" },
            { cat: "第五章", title: "🏥 尿道炎：生理 Sex 問題", img: "female_heart_symptoms_1775875369499.png", labels: ["硬體問題"], text: "113-Q13：尿道炎高發是因『生理構造(Sex)短、直、近』的硬體問題，絕非後天衛生習慣(Gender)問題。認清 Sex 性質！" },
            { cat: "數據戰略", title: "🦴 骨鬆確診數據", img: "male_fragility_fracture_trap_1775875425752.png", labels: ["T-score < -2.5"], text: "保分題：看到這個負數別猶豫！T-score 小於 -2.5 確診為骨鬆。這是醫學數據題的必選靶心。" },
            { cat: "最終戰略", title: "🏆 本課核心：社會建構論", img: "final_blessing_gold_1775901221619.png", labels: ["全班100分"], text: "總口訣：除了醫學數據(男骨折死22%等)，其餘一律選『社會建構論』。看到天生/必然直接排除。4月25日奪冠出發！" }
        ];
        let cIndex = -1, isAuto = false, speech = window.speechSynthesis, voices = [];
        function init() { renderSidebar(); loadVoices(); if (speech.onvoiceschanged !== undefined) speech.onvoiceschanged = loadVoices; }
        function loadVoices() { voices = speech.getVoices(); }
        function renderSidebar() {
            const list = document.getElementById('nav-list');
            studyPlan.forEach((item, i) => {
                const card = document.createElement('div'); card.className = 'nav-card'; card.id = `nav-${i}`;
                card.innerHTML = `<div style="font-weight:800; font-size:0.85rem;">${item.title}</div>`; card.onclick = () => jumpToSlide(i); list.appendChild(card);
            });
        }
        function jumpToSlide(i) {
            cIndex = i; speech.cancel();
            document.querySelectorAll('.nav-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`nav-${i}`).classList.add('active');
            const img = document.getElementById('current-slide'); img.style.opacity='0'; img.src = studyPlan[i].img; img.onload=()=>img.style.opacity='1';
            document.getElementById('lecture-body').textContent = studyPlan[i].text; renderOverlay(studyPlan[i]);
            if (isAuto) playSpeech(studyPlan[i].text);
        }
        function renderOverlay(item) {
            const ov = document.getElementById('overlay'); ov.innerHTML = '';
            item.labels.forEach((text, i) => {
                const tag = document.createElement('div'); tag.className = 'data-tag'; tag.textContent = text; ov.appendChild(tag);
                setTimeout(() => tag.classList.add('show'), 150 * (i + 1));
            });
        }
        function playSpeech(text) {
            speech.cancel(); const utter = new SpeechSynthesisUtterance(text);
            const v = voices.find(v => v.lang.includes('zh-TW') && (v.name.includes('Natural') || v.name.includes('Yating')));
            if (v) utter.voice = v; utter.lang = 'zh-TW'; utter.rate = document.getElementById('speech-rate').value;
            utter.onend = () => { if (isAuto && cIndex < studyPlan.length - 1) setTimeout(()=>jumpToSlide(cIndex+1), 1000); };
            speech.speak(utter);
        }
        function toggleAuto() { isAuto = !isAuto; document.getElementById('play-btn').textContent = isAuto ? '⏸' : '▶'; if (isAuto) playSpeech(studyPlan[cIndex].text); else speech.cancel(); }
        function goNext() { if (cIndex < studyPlan.length - 1) jumpToSlide(cIndex + 1); }
        function goPrev() { if (cIndex > 0) jumpToSlide(cIndex - 1); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        init();
    </script>
</body>
</html>
