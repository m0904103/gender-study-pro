    <script>
        const studyPlan = [
            { cat: "數據戰略", title: "🚩 ALPHA：否定陷阱生存指南", img: "gender_health_balance_1775873567230.png", labels: ["看清何者錯誤"], text: "各位英雄學員，我是學長助教。iPhone 前方的動態島提醒我們：細節決定成敗！大數據顯示本門課『何者錯誤』題型極多。看到健康是個人努力、或是醫療中性的選項，請直接果斷打大叉。社會建構才是奪冠關鍵字！" },
            { cat: "第一章", title: "🏺 114-2 補丁：米德三部族", img: "ch1_mead_3_tribes_1775909916148.png", labels: ["阿:皆溫", "蒙:皆鬥", "徳:反轉"], text: "114下魔王題：米德研究證明性格是『文化編排』！阿拉佩什(兩性皆溫)、蒙杜古馬(兩性皆鬥)、德昌布利(角色反轉/女強男弱)。認準德昌布利，它是打臉天生論最強重錘！" },
            { cat: "第一章：辨析", title: "💡 補丁：Sex 硬體 vs Gender 軟體", img: "gender_health_balance_1775873567230.png", labels: ["Gender = 後天"], text: "必考！Sex 是先天硬體，Gender 是後天教育編寫的軟體。若考卷暗示性別氣質是基因使然，那是誘餌。記住：社會性別是可被挑戰與重新編寫的建構物。" },
            { cat: "第一章：辨析", title: "🧬 四大理論：絕對時序排序", img: "ch1_master_theory_tw_1775901143741.png", special: "theory", text: "排序題帝王：心理動力、社會學習、認知發展、女性主義。順序：心、社、認、女！出題老師最愛考這組時序，只要記住女性主義在最末端，您就贏了一半。" },
            { cat: "第一章：辨析", title: "🧒 柯爾伯格：數據地雷 4-5 歲", img: "ch1_master_theory_tw_1775901143741.png", special: "kohlberg", text: "數字靶心：4 到 5 歲。這是幼兒達成『性別恆定』的關鍵點。這代表小孩懂了：男孩穿裙子也不會變成女孩。113 年考古實測，數字題必考項！" },
            { cat: "第二章：權重最高", title: "🍱 1132 爆量點：全球在地化", img: "ch2_rice_burger_glocal_1775909945923.png", labels: ["權重 29% 優先區"], text: "4/25 當天請優先攻略此區！全球在地化 Glocalization。麥當勞米漢堡就是品牌融入本土的最佳證明。看到融入當地文化、正名承認，選這個專有名詞期望值最高。" },

            { cat: "第三章", title: "⚖️ CEDAW 與實質平等靈魂", img: "cedaw_justice_symbol_1775875313437.png", labels: ["社會建構論"], text: "CEDAW 只保障婦女。其魂在於實質平等，即『結果公平』。別被機會平等騙了。2011 年台灣施行法通過，具國內法律地位。除生殖數據外，其餘一律選社會建構論！" },

            { cat: "第三章", title: "🛠️ 114-2補丁：主流六大工具", img: "ch3_gender_quota_table_1775910362721.png", labels: ["統析預評培機"], text: "老師的陷阱：六大工具全名是統、析、預、評、培、機！⚠️ 警告：選項出現『配額制』或『保障名額』通通不是核心工具，那是暫行特別措施！" },
            { cat: "第三章：法制紅線", title: "🪑 門檻數據：1/3 法定比例", img: "ch3_gender_quota_table_1775901180201.png", labels: ["委員會 1/3 下限"], text: "行政院所屬委員會任一性別比例不得低於三分之一。這是為了實質平等的暫行矯正式措施。數字認準 1/3，錯選 1/4 的考生請多注意。" },
            { cat: "第四章：評估基準", title: "🔃 GIA 九字訣：事前預防屬性", img: "gia_process_flow_1775875345608.png", special: "gia", text: "口訣：需目溝行執檢。重要：GIA 必須是『事前』工具！計畫研擬初期的預防行為。看到事後才評估？直接判定為錯誤。溝通必須包含專家與婦女團體。" },
            { cat: "第四章：評估基準", title: "🏥 AAAQ：114-2 補救邏輯", img: "ch4_aaa_standard_icons_1775909974764.png", special: "aaaq", text: "魔王陷阱：『付不起錢/經濟負擔』屬於 Accessibility 可及性。不要選成品質不好。這是 113 年考古題的高頻陷阱！認準經濟負擔就是可及性。" },
            { cat: "第四章：評估基準", title: "⚠️ 間接歧視識別：高鑑別命中紅心", img: "ch4_aaa_standard_icons_1775909974764.png", labels: ["表面中立,結果不公"], text: "高鑑別題！表面對男女一樣（如身高規定），但實質卻排擠某個性別。這叫間接歧視。看到看似公平實則偏頗的例題，冷靜選答：間接歧視。5 分入袋！" },
            { cat: "第四章：評估基準", title: "🔞 性同意界線：16 歲法律靶心", img: "ch3_age_16_consent_1775910116195.png", labels: ["16歲同意權"], text: "18 歲成年不用看，16 歲性意願界線才是法律題的肉！未滿 16 即使自願也具法律責任。認準 16 歲，這是考古題最經典的數字陷阱。" },
            { cat: "第四章：評估基準", title: "🛒 交織性：弱勢的乘積效應", img: "intersectionality_health_map_1775875386888.png", labels: ["性別 × 階級 × 族群"], text: "健康弱勢是乘積。性別、階級、族群堆疊時，痛苦是相乘的。單解決性別問題無助於全人健康。這題選考慮社會梯度與交織影響的綜合選項。" },
            { cat: "第五章", title: "❤️ 女性心臟病：糖尿病風險變數", img: "female_heart_symptoms_1775875369499.png", special: "diabetes", text: "醫學最新補丁：糖尿病女性患心臟病風險是一般女性的 3 到 7 倍！預測指標看 HDL 好膽固醇。92% 女性發作呈現下顎痛、背痛非典型症狀。" },
            { cat: "第五章", title: "💀 數據奇襲：男死 22% 與 T 指數", img: "male_fragility_fracture_trap_1775875425752.png", labels: ["T < -2.5 確診", "男死 22%"], text: "數據靶心：T-score 小於 -2.5 確診骨鬆。男髖部骨折死亡率 22% 遠高於女性。認準負二點五與百分之二十二！肺腺癌則是『女腺男小』。" },
            { cat: "第五章：醫學學報", title: "🧪 性別化創新：目的在修正科學盲", img: "gender_medicine_innovation_1775873597537.png", labels: ["修正科學盲"], text: "它不是研發美容產品！它是要在科學設計初期就納入性別分析，修正阿斯匹靈、安全帶等忽略女性數據造成的科學偏差。糾正盲點才是真正的創新。" },
            { cat: "考古命中", title: "🎯 命中 27：女性健康指標？", img: "female_heart_symptoms_1775875369499.png", labels: ["選 HDL 膽固醇"], text: "直接命中：預測女性風險選 HDL。如果有 LDL 項，那是老師給的致命干擾誘餌，請保持冷靜排除。" },
            { cat: "考古命中", title: "🎯 命中 28：影子報告功能？", img: "ch3_ngo_shadow_report_1775910181779.png", labels: ["影子報告 Shadow"], text: "直接命中：監督政府 CEDAW 報告的人？就是 NGO 的影子報告。不要選成政府自己寫的。" },
            { cat: "考古命中", title: "🎯 命中 29：AAAQ 經濟面向？", img: "ch4_aaa_standard_icons_1775909974764.png", labels: ["選可及性"], text: "直接命中：付錢能利屬於？答：可及性 Accessibility。選品質或可用性的都是對數據理解不足。認準經濟負擔就是可及性。" },
            { cat: "大終局", title: "🏆 引領全班勇奪 114-2 滿分冠軍", img: "final_blessing_gold_1775901221619.png", labels: ["114-2 滿分"], text: "恭喜！特訓完成。我們拿到了 Glocalization、1/3、16、22、-2.5 與 3-7 倍。4 月 25 日，我們全班滿分榜單見。英雄凱旋！加油！" }
        ];
        let currentIndex = -1; let isAutoPlaying = false; let speech = window.speechSynthesis; let voices = [];
        function init() { renderSidebar(); loadVoices(); if (speech.onvoiceschanged !== undefined) speech.onvoiceschanged = loadVoices; }
        function loadVoices() { voices = speech.getVoices(); }
        function renderSidebar() {
            const nl = document.getElementById('nav-list'); let cCat = "";
            studyPlan.forEach((d, i) => {
                if(d.cat !== cCat) { const t = document.createElement('div'); t.className = 'nav-group-title'; t.innerText = d.cat; nl.appendChild(t); cCat = d.cat; }
                const c = document.createElement('div'); c.className = 'nav-card'; c.id = `nav-${i}`;
                c.innerHTML = `<div class="nav-title">${d.title}</div><div class="nav-subtitle">${d.text.substring(0,25)}...</div>`;
                c.onclick = () => jumpToSlide(i); nl.appendChild(c);
            });
        }
        function startApp() { const s = document.getElementById('splash'); s.style.opacity = '0'; setTimeout(() => { s.style.display = 'none'; jumpToSlide(0); }, 800); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function jumpToSlide(i) {
            if(i<0 || i>=studyPlan.length) return; currentIndex = i; speech.cancel();
            document.querySelectorAll('.nav-card').forEach(x => x.classList.remove('active'));
            document.getElementById(`nav-${i}`).classList.add('active');
            document.getElementById('slide-progress').innerText = `${i+1} / ${studyPlan.length}`;
            const img = document.getElementById('current-slide'); img.style.opacity = '0'; img.src = studyPlan[i].img; img.onload = () => img.style.opacity = '1';
            document.getElementById('lecture-body').innerText = studyPlan[i].text; renderOverlay(studyPlan[i]);
            if(isAutoPlaying) playSpeech(studyPlan[i].text);
            if(window.innerWidth < 1024) document.getElementById('sidebar').classList.remove('active');
        }
        function renderOverlay(it) {
            const ov = document.getElementById('overlay'); ov.innerHTML = ''; let ts = [];
            if(it.special==='theory') ts=["心 ➔ 社 ➔ 認 ➔ 女"]; if(it.special==='kohlberg') ts=["4-5 歲：恆定成熟點"];
            if(it.special==='gia') ts=["事前！需目溝行執檢"]; if(it.special==='diabetes') ts=["糖尿病女：3 ~ 7 倍風險"];
            if(it.special==='aaaq') ts=["可用、可及、可接、品質"]; if(it.labels) ts=[...ts, ...it.labels];
            ts.forEach((t, i) => { const tag = document.createElement('div'); tag.className = 'data-tag'; tag.innerText = t; ov.appendChild(tag); setTimeout(() => tag.classList.add('show'), 200 * (i+1)); });
        }
        function playSpeech(t) {
            speech.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'zh-TW';
            u.rate = document.getElementById('speech-rate').value;
            u.onend = () => { if(isAutoPlaying && currentIndex < studyPlan.length - 1) setTimeout(() => jumpToSlide(currentIndex+1), 2500); };
            speech.speak(u);
        }
        function toggleAuto() { isAutoPlaying = !isAutoPlaying; document.getElementById('play-btn').innerText = isAutoPlaying ? '⏸' : '▶'; if(isAutoPlaying) playSpeech(studyPlan[currentIndex].text); else speech.cancel(); }
        function goNext() { jumpToSlide(currentIndex + 1); }
        function goPrev() { jumpToSlide(currentIndex - 1); }
        init();
    </script>
</body>
</html>
