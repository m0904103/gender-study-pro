<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>性別健康多元文化 | 4/25 奪冠校閱版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fbbf24;
            --primary-glow: rgba(251, 191, 36, 0.4);
            --secondary: #6366f1;
            --accent: #f472b6;
            --bg-dark: #05070a;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans TC', sans-serif; overflow: hidden; user-select: none; }
        .bg-glow { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%), radial-gradient(circle at 80% 80%, rgba(244, 114, 182, 0.1) 0%, transparent 40%); }
        .header { position: fixed; top: 0; left: 0; right: 0; height: calc(70px + var(--safe-top)); padding-top: var(--safe-top); display: flex; align-items: center; justify-content: space-between; padding-left: 20px; padding-right: 20px; background: rgba(5, 7, 10, 0.82); backdrop-filter: blur(25px); border-bottom: 1px solid var(--glass-border); z-index: 1000; }
        .logo-text { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.4rem; background: linear-gradient(135deg, var(--primary), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .menu-btn { background: var(--surface); border: 1px solid var(--glass-border); color: white; padding: 10px 18px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .app-container { display: flex; height: 100vh; padding-top: calc(70px + var(--safe-top)); }
        .sidebar { width: 320px; background: rgba(10, 15, 25, 0.8); border-right: 1px solid var(--glass-border); overflow-y: auto; transition: 0.4s; position: absolute; left: -320px; top: 0; bottom: 0; z-index: 2000; backdrop-filter: blur(35px); }
        .sidebar.active { left: 0; }
        .nav-content { padding: 20px; padding-top: 100px; }
        .nav-card { background: var(--surface); margin-bottom: 8px; padding: 14px; border-radius: 16px; cursor: pointer; transition: 0.2s; }
        .nav-card.active { background: linear-gradient(135deg, var(--primary), #d97706); color: #000; }
        .main-view { flex: 1; position: relative; display: flex; flex-direction: column; background: #000; }
        .slide-container { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        #current-slide { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 12px; }
        .overlay-tags { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; }
        .data-tag { background: linear-gradient(135deg, #ef4444, #b91c1c); color: #fff; padding: 10px 20px; border-radius: 12px; font-weight: 900; font-size: 1.5rem; border: 3px solid #fff; transform: scale(0); transition: 0.4s; }
        .data-tag.show { transform: scale(1); }
        .control-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(30px); border-top: 1px solid var(--glass-border); padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .lecture-text { font-size: 1.25rem; line-height: 1.6; color: #fff; max-height: 120px; overflow-y: auto; }
        @media (orientation: landscape) { .sidebar { position: relative; left: 0; width: 220px; } .control-panel { position: absolute; bottom: 10px; right: 10px; width: 320px; padding: 10px; border-radius: 15px; } .lecture-text { font-size: 0.9rem; max-height: 50px; } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <header class="header">
        <span class="logo-text">100% SUCCESS 3.0</span>
        <button class="menu-btn" onclick="toggleSidebar()">☰ 目錄</button>
    </header>
    <div class="app-container">
        <aside id="sidebar" class="sidebar"><div id="nav-list" class="nav-content"></div></aside>
        <main class="main-view">
            <div class="slide-container"><img id="current-slide" src=""><div id="overlay" class="overlay-tags"></div></div>
            <div class="control-panel">
                <div id="lecture-body" class="lecture-text">英雄校閱完畢，準備開戰！</div>
                <div style="display:flex; align-items:center; justify-content:center; gap:20px;">
                    <button class="circle-btn" onclick="goPrev()" style="background:var(--surface); color:white; border:1px solid var(--glass-border); width:50px; height:50px; border-radius:50%; cursor:pointer;">⏮</button>
                    <button id="play-btn" onclick="toggleAuto()" style="background:var(--primary); color:#000; border:none; width:65px; height:65px; border-radius:50%; font-size:1.5rem; cursor:pointer;">▶</button>
                    <button class="circle-btn" onclick="goNext()" style="background:var(--surface); color:white; border:1px solid var(--glass-border); width:50px; height:50px; border-radius:50%; cursor:pointer;">⏭</button>
                    <input type="range" id="speech-rate" min="0.8" max="2" step="0.1" value="1.3" style="width:50px; accent-color:var(--primary);">
                </div>
            </div>
        </main>
    </div>
    <script>
        const studyPlan = [
            { cat: "第一章", title: "🏺 米德三部族性格補丁", img: "ch1_theory_chart_tw_1775878090737.png", labels: ["阿:皆溫", "蒙:皆鬥", "徳:反轉"], text: "100分補丁：米德研究證明性格是『文化編排』！阿拉佩什(兩性皆溫)、蒙杜古馬(兩性皆鬥)、德昌布利(女強男弱反轉)。認準德昌布利！這是打臉天生論最強證據。" },
            { cat: "第一章", title: "🧒 性別恆定：4-5 歲", img: "ch1_master_theory_tw_1775901143741.png", labels: ["4-5歲達成"], text: "神經元連結：幼兒在 4 到 5 歲達成性別恆定。這是選擇題的高頻數值題，必背！" },
            { cat: "第三章", title: "🛠️ 主流化六大金剛", img: "cedaw_justice_symbol_1775875313437.png", labels: ["統、析、預、評、培、機"], text: "絕殺清單：六大工具統析預評培機！(統計/分析/預算/影響評估/培力/機制)。⚠️ 雷區：選項若出現『配額制』或『保障名額』，通通『不是』核心工具，那是暫行特別措施！" },
            { cat: "第三章", title: "㊙️ NGO 影子報告", img: "ch3_cedaw_articles_scroll_1775910131854.png", labels: ["NGO 監督"], text: "命中關鍵：影子報告是民間 NGO 撰寫！用來監督官方 CEDAW 報告。不要選成政府自己寫的。" },
            { cat: "第四章", title: "🔞 16 歲法律線", img: "ch3_age_16_consent_1775910116195.png", labels: ["16歲性同意"], text: "法律靶心：16 歲是性同意權界線，不是 18 歲！認準 16 歲，未滿 16 即便自願也具法律責任。" },
            { cat: "第五章", title: "🦴 骨鬆確診分水嶺", img: "male_fragility_fracture_trap_1775875425752.png", labels: ["T-score < -2.5"], text: "醫學靶心：T-score 小於 -2.5 確診為骨鬆。看到這個負數別猶豫，直接得分！" },
            { cat: "第五章", title: "💀 男骨折死 22%", img: "ch5_gendered_innovation_belt_1775910164894.png", labels: ["男死率 22%"], text: "死亡數據：男髖部骨折一年內死亡率 22% 遠高於女性。認準 22%，這是生理 Sex 的實質差異證明。" },
            { cat: "綜合", title: "🏆 目標 100 分：全校冠軍", img: "final_blessing_gold_1775901221619.png", labels: ["GAD結構翻轉"], text: "最後叮嚀：GAD 理論是制度面權力結構翻轉！所有拼圖已到位，4月25日全班滿分榜單見！英雄們，出發奪冠！" }
        ];
        let currentIndex = -1, isAutoPlaying = false, speech = window.speechSynthesis, voices = [];
        function init() { renderSidebar(); loadVoices(); if (speech.onvoiceschanged !== undefined) speech.onvoiceschanged = loadVoices; }
        function loadVoices() { voices = speech.getVoices(); }
        function renderSidebar() {
            const list = document.getElementById('nav-list'); let currentCat = "";
            studyPlan.forEach((item, i) => {
                if (item.cat !== currentCat) {
                    const t = document.createElement('div'); t.className = 'nav-group-title'; t.textContent = item.cat; list.appendChild(t); currentCat = item.cat;
                }
                const card = document.createElement('div'); card.className = 'nav-card'; card.id = `nav-${i}`;
                card.innerHTML = `<div style="font-weight:800; font-size:0.85rem;">${item.title}</div>`; card.onclick = () => jumpToSlide(i); list.appendChild(card);
            });
        }
        function jumpToSlide(i) {
            currentIndex = i; speech.cancel();
            document.querySelectorAll('.nav-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`nav-${i}`).classList.add('active');
            const img = document.getElementById('current-slide'); img.style.opacity='0'; img.src = studyPlan[i].img; img.onload=()=>img.style.opacity='1';
            document.getElementById('lecture-body').textContent = studyPlan[i].text; renderOverlay(studyPlan[i]);
            if (isAutoPlaying) playSpeech(studyPlan[i].text);
        }
        function renderOverlay(item) {
            const ov = document.getElementById('overlay'); ov.innerHTML = '';
            item.labels.forEach((text, i) => {
                const tag = document.createElement('div'); tag.className = 'data-tag'; tag.textContent = text; ov.appendChild(tag);
                setTimeout(() => tag.classList.add('show'), 150 * (i + 1));
            });
        }
        function playSpeech(text) {
            speech.cancel(); const utter = new SpeechSynthesisUtterance(text);
            const v = voices.find(v => v.lang.includes('zh-TW') && (v.name.includes('Natural') || v.name.includes('Yating')));
            if (v) utter.voice = v; utter.lang = 'zh-TW'; utter.rate = document.getElementById('speech-rate').value;
            utter.onend = () => { if (isAutoPlaying && currentIndex < studyPlan.length - 1) setTimeout(()=>jumpToSlide(currentIndex+1), 1000); };
            speech.speak(utter);
        }
        function toggleAuto() { isAutoPlaying = !isAutoPlaying; document.getElementById('play-btn').textContent = isAutoPlaying ? '⏸' : '▶'; if (isAutoPlaying) playSpeech(studyPlan[currentIndex].text); else speech.cancel(); }
        function goNext() { if (currentIndex < studyPlan.length - 1) jumpToSlide(currentIndex + 1); }
        function goPrev() { if (currentIndex > 0) jumpToSlide(currentIndex - 1); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        init();
    </script>
</body>
</html>
